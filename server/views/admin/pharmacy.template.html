<head>

</head>
<body class="pharmarcy">
    <div class="container">
    <div class="container-1">
    <div class="sideBar">
    <div class="logo">
      <img class="logopic" src="/logo/logo.svg" alt="logo">
      <div>
        <h3>System Admin</h3>
        <p>Management System</p>
      </div>
    </div>

    {sidebar}
    <!-- <div class="menuItem">
        <button class="text setting"> Settings</button>
        <button class="text signOut"> Sign Out</button>
    </div> -->
  </div>
  </div>

  <div class="container-2">
  <div class="main">
    <header>
      <input type="text" style="height: 5rem; font-size: 2rem; font-weight: 400; color: var(--color-green-02);"  id="searchInput" placeholder="Search pharmacies..." />
      <!-- <div class="user-section">
        <span class="bell"></span>
        <div class="admin">AD</div>
      </div> -->
    </header>

    <section class="dashboard">
     <div class="sectionHeading">
    <div>
      <h1>Pharmarcies</h1>
      <p>Manage All pharmarcy locations and their details.</p>
      </div>
      <div>
      <!-- <button id="addPharmacyBtn" class="addBtn">Add Pharmarcy</button> -->
      </div>
      </div>
    
    <div class="content-wrapper">
    <div class="pharmacy-grid">
    

  
    

   </div>
  </div>
    </section>
  </div>
  </div>

  <!-- Image Popup Modal -->
  <div id="imagePopup" class="image-popup">
    <div class="popup-content">
      <button class="close-popup" onclick="closeImagePopup()">✕</button>
      <h3 id="popupPharmacyName"></h3>
      <img id="popupImage" src="" alt="Pharmacy Image">
    </div>
  </div>

  <script>
    const pathParts = window.location.pathname.split('/');
    const adminIdIndex = pathParts.indexOf('admin') + 1;
    const adminId = pathParts[adminIdIndex];
   

    async function renderPharmacies(){
      try{
      const res = await fetch(`${window.location.origin}/api/v1/admin/${adminId}/pharmacies`);
      console.log('Reponse Status :', res.status);
      const pharmacies = await res.json();
      
      if(!Array.isArray(pharmacies) || pharmacies.length === 0) return;

      const html = pharmacies.map(p =>`
      <a href = "/admin/pharmacy/view/${p.id}" class="pharmacy-card">
        <div class="header">
          <h3>${p.name} <span class="status inactive">inactive</span></h3>
          <button class="menu-btn">⋮</button>
        </div>
        <p>Manager: ${p.pharmacist || 'N/A'}</p>
        <ul class="details">
          <li><span class="address"></span>${p.street || 'N/A'}, ${p.town || ''}, ${p.province || ''}</li>
          <li><span class="email"></span> ${p.email || 'N/A'}</li>
          <li><span class="telephoneNo"></span> ${p.contact || 'N/A'}</li>
        </ul>
        <hr>
        <div class= "pharmacyCardFooter">
          <!-- <p>Inventory: <strong>N/A</strong></p> -->
          <button class="details-btn" data-img = "${p.image_url} || ${p.image} || ${p.img}}" data-name = "${p.name || ''}">View License</button>
        </div>
      </a>`).join('');
      document.querySelector('.pharmacy-grid').innerHTML = html;
    }catch (error) {
      console.error('Error fetching pharmacies : ', error);
      document.querySelector('.pharmacy-grid').innerHTML = "<p>Error loading pharmacies.</p>";
    }
  }
    renderPharmacies();
  </script>


  <script>
  // image popup helpers
  function openImagePopup(imgUrl, pharmacyName) {
    if (!imgUrl) {
      alert('No image available for this pharmacy.');
      return;
    }
    const popup = document.getElementById('imagePopup');
    const img = document.getElementById('popupImage');
    const name = document.getElementById('popupPharmacyName');

    img.src = imgUrl;
    name.textContent = pharmacyName || '';
    popup.classList.add('active');
  }

  function closeImagePopup() {
    const popup = document.getElementById('imagePopup');
    const img = document.getElementById('popupImage');
    img.src = '';
    popup.classList.remove('active');
  }

  // delegate click for dynamically created buttons
  document.addEventListener('click', function (e) {
    const btn = e.target.closest('.details-btn');
    if (!btn) return;
    e.preventDefault(); // prevent <a> navigation
    const imgUrl = btn.getAttribute('data-img');
    const name = btn.getAttribute('data-name');
    openImagePopup(imgUrl, name);
  });
  </script>


  <script>
  //Search filter
  document.getElementById('searchInput').addEventListener('keyup', function () {
  const filter = this.value.toLowerCase(); // what user types
  const rows = document.querySelectorAll('.pharmacy-card');

  rows.forEach(row => {
    const text = row.textContent.toLowerCase();
    if (text.includes(filter)) {
      row.style.display = ''; // show row
    } else {
      row.style.display = 'none'; // hide row
    }
  });
});
  </script>


  
    
</body>
</html>
