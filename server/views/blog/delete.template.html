<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delete Confirmation Modal</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <h1>Delete Confirmation Modal</h1>
    <!-- <p>Click the buttons below to see the modal in action</p>

    <div class="buttons">
      <button class="btn standard" id="standardDeleteBtn">Standard Delete</button>
      <button class="btn danger" id="dangerDeleteBtn">Dangerous Delete</button>
    </div>
  </div> -->

  <!-- Modal -->
  <div class="modal" id="deleteModal">
    <div class="modal-content">
      <img class="logopic" src="/public/logo/logo.svg" alt="logo">
      <h2>Are you sure you want to delete this item?</h2>
      <p>This action cannot be undone. Please confirm your decision.</p>
      <div class="modal-buttons">
        <button class="btn cancel" id="cancelBtn">Cancel</button>
        <button class="btn confirm" id="confirmBtn">Confirm Delete</button>
      </div>
    </div>
  </div>

  <script>
    const modal = document.getElementById('deleteModal');
    const standardBtn = document.getElementById('standardDeleteBtn');
    const dangerBtn = document.getElementById('dangerDeleteBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const confirmBtn = document.getElementById('confirmBtn');

    // Open modal
    standardBtn.onclick = () => modal.classList.add('show');
    dangerBtn.onclick = () => modal.classList.add('show');

    // Close modal
    cancelBtn.onclick = () => modal.classList.remove('show');
    confirmBtn.onclick = () => {
      alert('Item deleted!');
      modal.classList.remove('show');
    };

    // Click outside to close
    window.onclick = (e) => {
      if (e.target === modal) modal.classList.remove('show');
    };
  </script>
</body>
</html>
