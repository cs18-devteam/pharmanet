  <script>
    // Toggle dropdown menu
    document.querySelectorAll('.dots').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        document.querySelectorAll('.dropdown').forEach(dropdownMenu => dropdownMenu.classList.remove('show'));
        const dropdownMenu = btn.nextElementSibling;
        dropdownMenu.classList.toggle('show');
      });
    });

    // Hide dropdown when clicking outside
    document.addEventListener('click', () => {
      document.querySelectorAll('.dropdown').forEach(dropdownMenu => dropdownMenu.classList.remove('show'));
    });

  
  const modal = document.getElementById("addUserModal");
  const btn = document.getElementById("openAddUserModal");
  const closeBtn = document.querySelector(".modal .close");

  btn.addEventListener("click", () => {
    modal.style.display = "flex";
  });

  closeBtn.addEventListener("click", () => {
    modal.style.display = "none";
  });

  // Close when click outside
  window.addEventListener("click", (e) => {
    if (e.target === modal) {
      modal.style.display = "none";
    }
  });


  const API_URL = "http://localhost:3000/api/admin/createUsers";

  //FETCH ALL BLOGS
  async function loadBlogs(){
    const res = await fetch(API_URL);
    const users = await res.json();

    const tableBody = document.getElementById("#users-table-body");
    tableBody.innerHTML = "";

    users.forEach(user =>{
      const row = document.createElement("tr");
      row.innerHTML =`
        <td>
            <div class="user-info">
              <div class="avatar">JS</div>
              <div class="details">
                <div class="name">${user.name}</div>
                <div class="email">${user.email}</div>
              </div>
            </div>
          </td>
          <td><span class="role">${user.role}</span></td>
          <td>${user.pharmacy}</td>
          <td><span class="status">${user.status}</span></td>
          <td>2 hours ago</td>
          <td class="actions">
            <div class="dropdownMenu">
              <button class="dots">⋮</button>
              <ul class="dropdown">
                <a href="/admin/viewProfile">View Profile</a>
                <a href="">Edit User</a>
                <a href="">Change Role</a>
                <a href="">Reset Password</a>
                <a href="" class="danger">Deactivate</a>
              </ul>
            </div>
          </td>
      
      `;
      tableBody.appendChild(row);  
    });
    
    //Add event listeners to buttons
     document.querySelectorAll(".delete-btn").forEach(btn =>
    btn.addEventListener("click", () => deleteBlog(btn.dataset.id))
  );

  document.querySelectorAll(".edit-btn").forEach(btn =>
    btn.addEventListener("click", () => editBlog(btn.dataset.id))
  );
  }

  //Delete User
  async function deleteBlog(id) {
  if (!confirm("Are you sure you want to delete this User?")) return;

  const res = await fetch(`${API_URL}/${id}`, { method: "DELETE" });
  if (res.ok) {
    alert("User deleted!");
    loadBlogs();
  } else {
    alert("Failed to delete User");
  }
}

//Add new user
document.querySelector("#addUserForm")?.addEventListener("submit", async (e) => {
  e.preventDefault();
  const fname = document.querySelector("#fname").value;
  const lname = document.querySelector("#lname").value;
  const name = fname + " " + lname;
  const email = document.querySelector("#email").value;
  const pharmacy = document.querySelector("#pharmacy").value;
  const role = document.querySelector("#role").value;

  const res = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name, email, pharmacy, role })
  });

  if (res.ok) {
    alert("user created successfully!");
    e.target.reset();
    loadBlogs();
  } else {
    alert("Error creating user");
  }
});
