<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PharmaCare Blog</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="editBlog">
  <header class="navbar">
    <div class="logo">
      <img class="logopic" src="/public/logo/logo.svg" alt="logo">
      <span>PharmaNet</span>
    </div>
    <div class="nav-buttons">
      <a href="blogView.html"><button class="btn btn-filled">All Blogs</button></a>
      <a href="blogManage.html"><button class="btn btn-icon"><i class="settings-icon">⚙</i> Manage</button></a>
    </div>
  </header>

  <div class="edit-container">
    <div class="edit-card">
      <h2>Edit Blog</h2>

      <form class="edit-form">
        <!-- Title -->
        <div class="form-group">
          <label for="title">Title</label>
          <input type="text" id="title" value="Understanding Diabetes: Types and Management" />
        </div>

        <!-- Category and Author -->
        <div class="form-row">
          <div class="form-group">
            <label for="category">Category</label>
            <select id="category">
              <option>Diseases</option>
              <option>Medicines</option>
              <option>Nutrition</option>
            </select>
          </div>

          <div class="form-group">
            <label for="author">Author</label>
            <input type="text" id="author" value="Dr. Sarah Johnson" />
          </div>
        </div>

        <!-- Excerpt -->
        <div class="form-group">
          <label for="excerpt">Excerpt</label>
          <textarea id="excerpt" rows="2">
A comprehensive guide to understanding diabetes, its types, and effective management strategies for better health outcomes.
          </textarea>
        </div>

        <!-- Content -->
        <div class="form-group">
          <label for="content">Content</label>
          <textarea id="content" rows="6">Diabetes is a chronic condition...</textarea>
        </div>

        <!-- Buttons -->
        <div class="form-actions">
          <a href="blogManage.html"><button type="button" class="btn-cancel">Cancel</button></a>
          <button type="submit" class="btn-save"> Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  </body>
</html>
