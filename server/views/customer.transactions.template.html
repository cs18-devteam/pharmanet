<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Pharmanet — Transaction History</title>
	<style>
		:root{
			--green:#2ecc71; --green-dark:#21b76a; --yellow:#f1c40f; --orange:#e67e22;
			--bg:#fbfdf9; --card:#fff; --muted:#f4f6f7; --text:#263238; --radius:10px;
			font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial;
		}
		html,body{height:100%;margin:0;background:linear-gradient(180deg,var(--bg),#fff);color:var(--text)}
		.wrapper{max-width:1100px;margin:28px auto;padding:18px;display:flex;flex-direction:column;gap:14px}
		.header{display:flex;align-items:center;justify-content:space-between;gap:12px}
		.brand{display:flex;align-items:center;gap:12px}
		.logo{width:48px;height:48px;border-radius:10px;background:linear-gradient(135deg,var(--green),var(--orange));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800}
		h1{margin:0;font-size:18px}
		.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
		.input,select{padding:10px 12px;border-radius:10px;border:1px solid #e9eef0;background:white;font-size:14px}
		.btn{padding:9px 12px;border-radius:10px;border:0;cursor:pointer;font-weight:700}
		.btn-primary{background:linear-gradient(90deg,var(--green),var(--green-dark));color:#fff}
		.btn-ghost{background:transparent;border:1px solid #e9eef0}
		.card{background:var(--card);border-radius:var(--radius);padding:14px;box-shadow:0 8px 28px rgba(20,30,40,0.06)}
		.table-wrap{overflow:auto}
		table{width:100%;border-collapse:collapse;font-size:14px}
		th,td{padding:10px 12px;border-bottom:1px solid #f3f5f6;text-align:left}
		th{font-size:13px;color:#556}
		.row-actions{display:flex;gap:8px;justify-content:center}
		.tag{display:inline-block;padding:6px 8px;border-radius:999px;font-weight:700;font-size:12px;color:#fff}
		.tag-success{background:var(--green-dark)}
		.tag-warn{background:var(--yellow);color:#222}
		.tag-danger{background:var(--orange)}
		.empty{padding:30px;text-align:center;color:#666}
		.overlay{position:fixed;inset:0;background:rgba(10,12,14,0.45);display:none;align-items:center;justify-content:center;z-index:80}
		.overlay.open{display:flex}
		.modal{background:var(--card);border-radius:12px;padding:18px;max-width:720px;width:96%;box-shadow:0 20px 48px rgba(10,12,14,0.3)}
		.meta{color:#666;font-size:13px}
		.toast{position:fixed;right:20px;bottom:20px;background:#111;color:#fff;padding:10px 12px;border-radius:10px;display:none;align-items:center;gap:10px;z-index:90}
		.toast.show{display:flex}
		.undo{background:transparent;border:1px solid rgba(255,255,255,0.2);color:#fff;padding:6px 8px;border-radius:8px;cursor:pointer}
		@media (max-width:760px){ .controls{flex-direction:column;align-items:stretch} }
	</style>
</head>
<body>
	<div class="wrapper">
		<div class="header">
			<div class="brand">
				<div class="logo">PN</div>
				<div>
					<h1>Transaction history</h1>
					<div style="font-size:13px;color:#666">All customer transactions — search, filter and view details</div>
				</div>
			</div>
			<div style="display:flex;gap:10px;align-items:center">
				<button id="export-btn" class="btn btn-ghost">Export CSV</button>
				<button id="refresh-btn" class="btn btn-primary">Refresh</button>
			</div>
		</div>

		<div class="card">
			<div class="controls" style="margin-bottom:12px">
				<input id="search" class="input" placeholder="Search by txn id, item or customer" />
				<select id="status" class="input" style="width:160px">
					<option value="">All statuses</option>
					<option value="completed">Completed</option>
					<option value="pending">Pending</option>
					<option value="refunded">Refunded</option>
				</select>
				<input id="from" class="input" type="date" />
				<input id="to" class="input" type="date" />
				<div style="flex:1"></div>
				<button id="clear-filters" class="btn btn-ghost">Clear</button>
			</div>

			<div id="table-wrap" class="table-wrap">
				<table aria-describedby="txn-desc">
					<thead>
						<tr>
							<th>Date</th>
							<th>Txn ID</th>
							<th>Customer</th>
							<th>Items</th>
							<th>Total</th>
							<th>Payment</th>
							<th>Status</th>
							<th style="width:120px;text-align:center">Actions</th>
						</tr>
					</thead>
					<tbody id="body">
						<!-- populated by JS -->
					</tbody>
				</table>
				<div id="empty" class="empty" style="display:none">No transactions found.</div>
			</div>
		</div>
	</div>

	<!-- detail modal -->
	<div id="overlay" class="overlay" aria-hidden="true">
		<div class="modal" role="dialog" aria-modal="true">
			<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
				<div>
					<div id="m-title" style="font-weight:800;font-size:18px">Transaction</div>
					<div id="m-txn" class="meta">TXN</div>
				</div>
				<div style="display:flex;gap:8px;align-items:center">
					<button id="m-refund" class="btn btn-ghost">Refund</button>
					<button id="m-close" class="btn btn-ghost">Close</button>
				</div>
			</div>
			<div style="display:flex;gap:18px;flex-wrap:wrap">
				<div style="flex:1">
					<div class="meta" style="margin-bottom:8px"><strong>Customer:</strong> <span id="m-customer"></span></div>
					<div class="meta" style="margin-bottom:8px"><strong>Payment:</strong> <span id="m-payment"></span></div>
					<div class="meta" style="margin-bottom:8px"><strong>Total:</strong> <span id="m-total"></span></div>
					<div class="meta" style="margin-bottom:8px"><strong>Status:</strong> <span id="m-status"></span></div>
				</div>
				<div style="min-width:220px">
					<div style="font-weight:700;margin-bottom:8px">Items</div>
					<div id="m-items" class="meta" style="white-space:pre-wrap"></div>
				</div>
			</div>
		</div>
	</div>

	<div id="toast" class="toast" role="status" aria-live="polite">
		<div id="toast-text">Action</div>
		<button id="toast-undo" class="undo">Undo</button>
	</div>

	<script>
		(() => {
			// elements
			const body = document.getElementById('body');
			const empty = document.getElementById('empty');
			const searchEl = document.getElementById('search');
			const statusEl = document.getElementById('status');
			const fromEl = document.getElementById('from');
			const toEl = document.getElementById('to');
			const clearFilters = document.getElementById('clear-filters');
			const exportBtn = document.getElementById('export-btn');
			const refreshBtn = document.getElementById('refresh-btn');

			const overlay = document.getElementById('overlay');
			const mTitle = document.getElementById('m-title');
			const mTxn = document.getElementById('m-txn');
			const mCustomer = document.getElementById('m-customer');
			const mPayment = document.getElementById('m-payment');
			const mTotal = document.getElementById('m-total');
			const mStatus = document.getElementById('m-status');
			const mItems = document.getElementById('m-items');
			const mClose = document.getElementById('m-close');
			const mRefund = document.getElementById('m-refund');

			const toast = document.getElementById('toast');
			const toastText = document.getElementById('toast-text');
			const toastUndo = document.getElementById('toast-undo');

			let transactions = loadTxns();
			let lastAction = null;
			let undoTimer = null;

			function loadTxns(){
				try {
					const raw = localStorage.getItem('pharm_txns');
					if(raw) return JSON.parse(raw);
				} catch(e){}
				// seed sample data
				return [
					{ id:'t1', date:'2025-01-15', txn:'TXN-1001', customer:'Alice J', items:['Paracetamol x2','Vitamin D x1'], total:7.00, payment:'Card', status:'completed' },
					{ id:'t2', date:'2025-02-09', txn:'TXN-1002', customer:'Bob K', items:['Amoxicillin x1'], total:4.75, payment:'Cash', status:'completed' },
					{ id:'t3', date:'2025-02-20', txn:'TXN-1003', customer:'Carol M', items:['Ibuprofen x3'], total:9.75, payment:'Card', status:'pending' },
					{ id:'t4', date:'2025-03-01', txn:'TXN-1004', customer:'Dave R', items:['Hydrocortisone x1'], total:6.50, payment:'Card', status:'refunded' }
				];
			}

			function saveTxns(){ try { localStorage.setItem('pharm_txns', JSON.stringify(transactions)); } catch(e){} }

			function tagFor(status){
				if(status === 'completed') return '<span class="tag tag-success">Completed</span>';
				if(status === 'pending') return '<span class="tag tag-warn">Pending</span>';
				return '<span class="tag tag-danger">Refunded</span>';
			}

			function render(){
				body.innerHTML = '';
				const q = (searchEl.value || '').trim().toLowerCase();
				const statusFilter = statusEl.value;
				const from = fromEl.value;
				const to = toEl.value;
				const list = transactions.filter(t => {
					if(statusFilter && t.status !== statusFilter) return false;
					if(from && t.date < from) return false;
					if(to && t.date > to) return false;
					if(!q) return true;
					return (t.txn + ' ' + t.customer + ' ' + t.items.join(' ')).toLowerCase().includes(q);
				});
				if(list.length === 0){ empty.style.display = 'block'; return; }
				empty.style.display = 'none';
				list.forEach(t => {
					const tr = document.createElement('tr');
					tr.innerHTML = `
						<td>${t.date}</td>
						<td><a href="#txn:${t.id}" style="text-decoration:none;color:inherit" data-id="${t.id}">${t.txn}</a></td>
						<td>${escapeHtml(t.customer)}</td>
						<td>${escapeHtml(t.items.join(', '))}</td>
						<td>$${(t.total||0).toFixed(2)}</td>
						<td>${escapeHtml(t.payment)}</td>
						<td>${tagFor(t.status)}</td>
						<td style="text-align:center" class="row-actions">
							<button class="btn btn-ghost" data-action="view" data-id="${t.id}">View</button>
							<button class="btn btn-ghost" data-action="refund" data-id="${t.id}" ${t.status === 'refunded' ? 'disabled' : ''}>Refund</button>
						</td>
					`;
					body.appendChild(tr);
				});
			}

			function escapeHtml(s=''){ return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

			function showDetail(id){
				const t = transactions.find(x=>x.id===id);
				if(!t) return;
				mTitle.textContent = `Transaction • ${t.txn}`;
				mTxn.textContent = t.txn + ' • ' + t.date;
				mCustomer.textContent = t.customer;
				mPayment.textContent = t.payment;
				mTotal.textContent = '$' + (t.total||0).toFixed(2);
				mStatus.innerHTML = tagFor(t.status);
				mItems.textContent = t.items.join('\\n');
				mRefund.dataset.id = t.id;
				overlay.classList.add('open'); overlay.setAttribute('aria-hidden','false');
			}

			function closeDetail(){
				overlay.classList.remove('open'); overlay.setAttribute('aria-hidden','true');
				// clear hash
				if(location.hash.startsWith('#txn:')) history.replaceState(null,'',location.pathname + location.search);
			}

			function doRefund(id){
				const idx = transactions.findIndex(x=>x.id===id);
				if(idx === -1) return;
				const prev = JSON.parse(JSON.stringify(transactions[idx]));
				transactions[idx].status = 'refunded';
				saveTxns();
				render();
				lastAction = { type:'refund', data: prev, index: idx };
				showToast(`${prev.txn} refunded`, true);
			}

			function undoLast(){
				if(!lastAction) return;
				if(lastAction.type === 'refund'){
					transactions[lastAction.index] = lastAction.data;
					saveTxns();
					render();
					lastAction = null;
					hideToast();
				}
			}

			function showToast(text, allowUndo=false){
				toastText.textContent = text;
				toast.classList.add('show');
				toastUndo.style.display = allowUndo ? 'inline-block' : 'none';
				if(undoTimer) clearTimeout(undoTimer);
				undoTimer = setTimeout(()=>{ toast.classList.remove('show'); lastAction = null; }, 6000);
			}
			function hideToast(){ toast.classList.remove('show'); if(undoTimer) clearTimeout(undoTimer); undoTimer = null; }

			// CSV export
			function exportCSV(){
				const q = (searchEl.value || '').trim().toLowerCase();
				const statusFilter = statusEl.value;
				const from = fromEl.value;
				const to = toEl.value;
				const list = transactions.filter(t => {
					if(statusFilter && t.status !== statusFilter) return false;
					if(from && t.date < from) return false;
					if(to && t.date > to) return false;
					if(!q) return true;
					return (t.txn + ' ' + t.customer + ' ' + t.items.join(' ')).toLowerCase().includes(q);
				});
				const rows = [['date','txn','customer','items','total','payment','status']];
				list.forEach(r => rows.push([r.date,r.txn,r.customer,r.items.join('|'),r.total,r.payment,r.status]));
				const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\\n');
				const blob = new Blob([csv], {type:'text/csv'});
				const url = URL.createObjectURL(blob);
				const a = document.createElement('a'); a.href = url; a.download = 'transactions.csv'; document.body.appendChild(a); a.click();
				a.remove(); URL.revokeObjectURL(url);
			}

			// events
			document.getElementById('table-wrap').addEventListener('click', (e) => {
				const btn = e.target.closest('button');
				if(btn){
					const action = btn.dataset.action;
					const id = btn.dataset.id;
					if(action === 'view') showDetail(id);
					if(action === 'refund' && confirm('Refund this transaction?')) doRefund(id);
				}
				const link = e.target.closest('a[data-id]');
				if(link){ const id = link.dataset.id; location.hash = '#txn:' + id; }
			});

			// hash routing for details
			window.addEventListener('hashchange', ()=> {
				const h = location.hash || '';
				if(h.startsWith('#txn:')) showDetail(h.split(':')[1]);
				else closeDetail();
			});

			// modal controls
			mClose.addEventListener('click', closeDetail);
			mRefund.addEventListener('click', (e) => {
				const id = e.currentTarget.dataset.id;
				if(id && confirm('Refund this transaction?')){ doRefund(id); closeDetail(); }
			});

			// toast undo
			toastUndo.addEventListener('click', undoLast);

			// filters
			[searchEl, statusEl, fromEl, toEl].forEach(el => el.addEventListener('input', render));
			clearFilters.addEventListener('click', ()=> { searchEl.value=''; statusEl.value=''; fromEl.value=''; toEl.value=''; render(); });
			exportBtn.addEventListener('click', exportCSV);
			refreshBtn.addEventListener('click', ()=> { transactions = loadTxns(); render(); showToast('Refreshed', false); });

			// keyboard escape closes modal
			document.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeDetail(); });

			// initial render
			render();

			// expose for debugging
			window.__pharm_txns = { getAll: ()=>transactions, reset: ()=>{ transactions = []; saveTxns(); render(); } };
		})();
	</script>
</body>
</html>
