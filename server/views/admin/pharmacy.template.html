<!DOCTYPE html>

    <style>
      /* Image popup styles */
      .image-popup {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.8);
        z-index: 9999;
        justify-content: center;
        align-items: center;
      }
      
      .image-popup.active {
        display: flex;
      }
      
      .popup-content {
        display: flex;
        align-items: center;
        flex-direction: column;
        justify-content: center;
        position: relative;
        width: min(600px, 96vw);   
        max-height: 92vh;
        background: white;
        padding: 20px;
        border-radius: 8px;
        overflow-y: auto;
      }
      #regDocPopup, #ownerDocPopup, #addressDocPopup {
        width: 100%;
      }
      .popup-content .accept-Btn{
        background-color: green;
        border-radius: 0.5rem;
        border: none;
        color: white;
        margin-top: 0.5rem;
    
        }
      .popup-content img {
        max-width: 90%;
        max-height: 75vh;
        padding-top: 0.5rem;
      }
      
      .close-popup {
        position: absolute;
        top: 10px;
        right: 10px;
        background: #ff4444;
        color: white;
        border: none;
        padding: 10px 15px;
        cursor: pointer;
        border-radius: 4px;
        font-size: 18px;
      }
      
      .close-popup:hover {
        background: #cc0000;
      }
    </style>
    <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
</head>

  <!-- Image Popup Modal -->
  <div id="imagePopup" class="image-popup">
    <div class="popup-content">
      <button class="close-popup" onclick="closeImagePopup()">✕</button>
      <h3 id="popupPharmacyName"></h3>
      <h4>Registration Document</h4>
      <iframe src="" id="regDocPopup" width="100%" height="800px" style="border:0;"></iframe>
      <h4>Owner Details Document</h4>
      <iframe src="" id="ownerDocPopup" width="100%" height="600px" style="border:0;"></iframe>
      <h4>Address Confirmation Document</h4>
      <iframe src="" id="addressDocPopup" width="100%" height="600px" style="border:0;"></iframe>
      <!-- <img id="popupImage" src="" alt="Pharmacy Image"> -->
      <button class="accept-Btn" id="accept-Btn" >Accept</button>
    </div>

  <script>
    const pathParts = window.location.pathname.split('/');
    const adminIdIndex = pathParts.indexOf('admin') + 1;
    const adminId = pathParts[adminIdIndex];
   

    async function renderPharmacies(){
      try{
      const res = await fetch(`${window.location.origin}/api/v1/admin/${adminId}/pharmacies`);
      const pharmacies = await res.json();
      
      const sortedPharmacies = [...pharmacies].sort((a, b) => {
      const aStatus = Number(a.status || 0); // 0 = inactive
      const bStatus = Number(b.status || 0); // 1 = active
      if (aStatus !== bStatus) return aStatus - bStatus; // inactive first
      return (a.name || '').localeCompare(b.name || ''); // optional stable order
     
    });
      
      
      if(!Array.isArray(pharmacies) || pharmacies.length === 0) return;

      const html = sortedPharmacies.map(p =>{
      const isActive = Number(p.status) === 1;
      return`
      <a href = "/admin/${adminId}/pharmacies/${p.id}/viewPharmacy">
       <div class = "pharmacy-card">
        <div class="header">
          <h3>${p.name} ${isActive? `<span class="status inactive">active</span>` : `<span class="status inactive">inactive</span>`}</h3>
          <button class="menu-btn">⋮</button>
        </div>
        <p>Manager: ${p.pharmacist || 'N/A'}</p>
        <ul class="details">
          <li><span class="address"></span>${p.street || 'N/A'}, ${p.town || ''}, ${p.province || ''}</li>
          <li><span class="email"></span> ${p.email || 'N/A'}</li>
          <li><span class="telephoneNo"></span> ${p.contact || 'N/A'}</li>
        </ul>
        <hr>
        <div class= "pharmacyCardFooter">
          <!-- <p>Inventory: <strong>N/A</strong></p> -->
          <button class="details-btn" data-regDoc="${p.registrationDoc}" data-ownerDoc="${p.ownerDoc}" data-addressDoc="${p.addressDoc}" data-name="${p.name || ''}" data-id="${p.id}" data-status="${isActive ? '1' : '0'}">View Docs</button>
            ${isActive ? `<button class="deactivate-Btn" data-id="${p.id}">Deactivate</button>` : ''}
        </div>
      </div></a>`}).join('');
      document.querySelector('.pharmacy-grid').innerHTML = html;

      
      
    }catch (error) {
      console.error('Error fetching pharmacies : ', error);
      document.querySelector('.pharmacy-grid').innerHTML = "<p>Error loading pharmacies.</p>";
    }

  }
    renderPharmacies();
  </script>


  <script>
  // image popup helpers
  function openImagePopup(regDocUrl, ownerDocUrl, addressDocUrl, pharmacyName, status) {
    if (!regDocUrl) {
      alert('No image available for this pharmacy.');
      return;
    }
    const popup = document.getElementById('imagePopup');
    const regDoc = document.getElementById('regDocPopup');
    const ownerDoc = document.getElementById('ownerDocPopup');
    const addressDoc = document.getElementById('addressDocPopup');
    const name = document.getElementById('popupPharmacyName');
    const acceptBtn = document.getElementById('accept-Btn');

    console.log(typeof status);
    if(Number(status) === 1){
      acceptBtn.style.display = 'none';
    }else{
      acceptBtn.style.display = 'flex';
    }

    ownerDoc.src = encodeURI(ownerDoc);
    addressDoc.src = encodeURI(addressDoc);
    regDoc.src = encodeURI(regDocUrl);
    

    name.textContent = (pharmacyName || '').toUpperCase();
    popup.classList.add('active');
  }

  function closeImagePopup() {
    const popup = document.getElementById('imagePopup');
    const regDoc = document.getElementById('regDocPopup');
    const ownerDoc = document.getElementById('ownerDocPopup');
    const addressDoc = document.getElementById('addressDocPopup');
    regDoc.src = '';
    ownerDoc.src = '';
    addressDoc.src = '';
    popup.classList.remove('active');
  }

  let selectedPharmacyId = null;
  // delegate click for dynamically created buttons
  document.addEventListener('click', function (e) {
    const btn = e.target.closest('.details-btn');
    if (!btn) return;
    e.preventDefault(); // prevent <a> navigation
    const regDocUrl = btn.getAttribute('data-regDoc');
    const ownerDocUrl = btn.getAttribute('data-ownerDoc');
    const addressDocUrl = btn.getAttribute('data-addressDoc');
    console.log(regDocUrl);
    console.log(ownerDocUrl);
    console.log(addressDocUrl);
    const name = btn.getAttribute('data-name');
    const status = btn.getAttribute('data-status');
    selectedPharmacyId = btn.getAttribute('data-id');
    openImagePopup(regDocUrl, ownerDocUrl, addressDocUrl, name, status);
  });
  document.querySelector('.accept-Btn').addEventListener('click',
  function () {
    swal({
      title: "Are you sure you want to Activate this Pharmacy ?",
      icon: "/logo/logo.svg",
      buttons:{
        cancel:{
          text: "Cancel",
          visible: true
        },
        confirm: {
          text: "OK",
          value: true
        }
      },
      dangerMode: false
    }).then(async (confirmed) => {
      if(!confirmed) {
        swal("Declined","Pharmacy Activation Declined", "warning");
        closeImagePopup();
        return;
      };

      fetch(`${window.location.origin}/api/v1/admin/${adminId}/pharmacies/${selectedPharmacyId}`,{
        method: 'PATCH',
        headers: {"Content-type": "application/json"},
        body: JSON.stringify({status: "1",
        id: selectedPharmacyId})
      });
      swal("Activated","Pharmacy activated succesfully.","success");
      closeImagePopup();
      renderPharmacies();
    })
  })
 
  </script>

  <script>
  document.addEventListener('click', async function (e) {
  const deactivateBtn = e.target.closest('.deactivate-Btn');
  if (!deactivateBtn) return;

  e.preventDefault();
  const pharmacyId = deactivateBtn.getAttribute('data-id');

  const confirmed = await swal({
    title: "Are you sure you want to deactivate this Pharmacy?",
    icon: "/logo/logo.svg",
    buttons: {
      cancel: { text: "Cancel", visible: true },
      confirm: { text: "Ok", value: true }
    },
    dangerMode: false
  });

  if(!confirmed) {
    swal("Declined", "Pharmacy Deactivation Declined", "warning");
    return;
  }

  await fetch(`${window.location.origin}/api/v1/admin/${adminId}/pharmacies/${pharmacyId}`, {
    method: 'PATCH',
    headers: { "Content-type": "application/json" },
    body: JSON.stringify({ status: "0", id: pharmacyId })
  });
  
  swal("Deactivated", "Pharmacy Deactivated Successfully", "success");
  renderPharmacies(); // Re-render to hide deactivate, but doesn't matter since status=0
});
  </script>


  <script>
  //Search filter
 document.getElementById('searchInput').addEventListener('keyup', function () {
    const filter = this.value.toLowerCase().trim();
    const grid = document.querySelector('.pharmacy-grid');

    // Each pharmacy card is inside an <a> wrapper
    const items = Array.from(grid.querySelectorAll(':scope > a'));

    const matched = [];
    const unmatched = [];

    items.forEach(item => {
      const card = item.querySelector('.pharmacy-card');
      const text = (card?.textContent || '').toLowerCase();

      if (!filter || text.includes(filter)) {
        item.style.display = '';
        matched.push(item);
      } else {
        item.style.display = 'none';
        unmatched.push(item);
       
      }
    });

    // Reorder DOM: matched first, then unmatched
    [...matched, ...unmatched].forEach(item => grid.appendChild(item));
   
  });
  
  </script>
