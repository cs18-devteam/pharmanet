<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Medicines — Management</title>
	<style>
		:root{
			--bg:#fbfcfb;
			--card:#fff;
			--accent:#2ecc71;
			--muted:#f4f6f7;
			--text:#222;
			--muted-text:#666;
			--radius:10px;
			font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
		}
		html,body{height:100%;margin:0;background:var(--bg);color:var(--text)}
		.wrapper{max-width:1100px;margin:28px auto;padding:16px;display:grid;grid-template-columns:360px 1fr;gap:18px}
		h1{margin:0 0 6px;font-size:20px}
		.card{background:var(--card);border-radius:var(--radius);padding:14px;box-shadow:0 10px 30px rgba(20,30,40,0.05)}
		label{display:block;font-size:13px;margin:8px 0 6px;color:var(--muted-text)}
		input[type="text"], input[type="number"], select, textarea{
			width:100%;padding:10px;border-radius:8px;border:1px solid #ececec;background:white;font-size:14px;
		}
		textarea{min-height:80px;resize:vertical}
		.form-actions{display:flex;gap:8px;margin-top:12px;align-items:center}
		.btn{padding:9px 12px;border-radius:8px;border:0;cursor:pointer;font-weight:700}
		.btn-add{background:linear-gradient(90deg,var(--accent),#21b76a);color:white}
		.btn-ghost{background:transparent;border:1px solid #e9e9e9;color:var(--text)}
		.small{font-size:13px;color:var(--muted-text)}
		.list-header{display:flex;justify-content:space-between;align-items:center;gap:12px}
		.search{display:flex;gap:8px;align-items:center}
		.search input{padding:8px;border-radius:8px;border:1px solid #eee;min-width:220px}
		table{width:100%;border-collapse:collapse;margin-top:12px}
		th,td{padding:10px 12px;border-bottom:1px solid #f3f3f3;text-align:left;font-size:14px}
		th{font-size:13px;color:#555;font-weight:700}
		tr:hover td{background:#fafafa}
		.actions{display:flex;gap:8px;justify-content:flex-end}
		.action-btn{padding:6px 8px;border-radius:6px;border:0;cursor:pointer;font-weight:700}
		.action-edit{background:#f0fdf6;border:1px solid #dff3e6;color:#0a6a3a}
		.action-delete{background:#fff6f2;border:1px solid #ffd9c9;color:#b24400}
		.empty{padding:20px;text-align:center;color:var(--muted-text)}
		@media (max-width:980px){ .wrapper{grid-template-columns:1fr;padding:12px} }
	</style>
    <link rel="stylesheet" href="/css/style.css">
</head>

    <div class="popup">
        <h1>hello</h1>

 <script>
        const form = document.getElementById('medicine-form');
        const data = {};
        form.addEventListener("submit" ,async (e)=>{
          e.preventDefault();
          const formData = new FormData(form);
          for(const [key , value] of formData.entries()){
            data[key] = value;
          };


          const respond = await fetch("/medicines" , {
            method:"POST",
            body: JSON.stringify(data),
          }); 

          const results = await respond.json();
          popup.classList.add('visible');

          if(results.status == "success"){
           const popup =  document.querySelector('.popup');
           popup.textContent = "Medicine Added Successfully";
           popup.classList.add('success');
           
           setTimeout(()=>{
               window.location.href = "/users/medicines";
            } , 2000);
        }else{
            popup.classList.add('error');
            popup.textContent = "Medicine not added";
          }
        })


    </script>
