          <textarea id="content" rows="6">Hypertension, or high blood pressure, affects millions of people worldwide. Understanding its causes and treatment options is essential for prevention and management.

Understanding Antibiotics
Antibiotics are drugs that kill bacteria or inhibit their growth. They work by targeting specific bacterial structures or processes that don't exist in human cells, making them relatively safe for us while deadly for bacteria.

When to Use Antibiotics
Antibiotics should only be used for bacterial infections, not viral infections like colds or flu. Common bacterial infections that require antibiotics include:

Strep throat
Urinary tract infections
Pneumonia
Skin infections
Ear infections
Safe Usage Guidelines
**Take as Prescribed**: Complete the full course even if you feel better.
**Don't Share**: Never use someone else's antibiotics or share yours.
**Store Properly**: Keep in a cool, dry place away from direct sunlight.
**Report Allergies**: Always inform your doctor of any antibiotic allergies.
**Ask Questions**: Understand why you're taking the antibiotic and what to expect.
Antibiotic Resistance
Overuse and misuse of antibiotics have led to resistant bacteria that are harder to treat. This is why it's crucial to use antibiotics only when necessary and as directed.</textarea>
