<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Cashier — Orders</title>
<style>
	:root{
		--bg:#fbfcfb; --card:#fff; --text:#222;
		--accent:#2ecc71; --accent-dark:#21b76a; --muted:#f2f4f3;
		font-family:Inter,system-ui,Arial,sans-serif;
	}
	html,body{height:100%;margin:0;background:var(--bg);color:var(--text)}
	.wrapper{max-width:1100px;margin:20px auto;padding:12px;display:grid;grid-template-columns:1fr 420px;gap:16px}
	.header{grid-column:1/-1;display:flex;justify-content:space-between;align-items:center;gap:12px}
	.card{background:var(--card);border-radius:10px;padding:12px;box-shadow:0 8px 24px rgba(10,20,30,0.04)}
	h1{margin:0;font-size:18px}
	.controls{display:flex;gap:8px;align-items:center}
	.search{display:flex;gap:8px;align-items:center}
	.search input{padding:10px;border-radius:8px;border:1px solid #e6e6e6;width:320px}
	.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-top:12px}
	.prod{background:var(--muted);padding:10px;border-radius:8px;display:flex;flex-direction:column;gap:6px}
	.prod .name{font-weight:700}
	.small{font-size:13px;color:#666}
	.cart{display:flex;flex-direction:column;gap:8px;height:calc(100vh - 140px);overflow:auto}
	.cart-list{display:flex;flex-direction:column;gap:8px}
	.cart-item{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:8px;border-radius:8px;border:1px solid #f0f0f0}
	.qty{display:flex;align-items:center;gap:6px}
	.qty button{padding:6px 8px;border-radius:6px;border:1px solid #ddd;background:#fff;cursor:pointer}
	.total-row{display:flex;justify-content:space-between;align-items:center;padding-top:8px;border-top:1px dashed #eee}
	.checkout{display:flex;flex-direction:column;gap:8px}
	.btn{padding:10px;border-radius:8px;border:0;cursor:pointer;font-weight:700}
	.btn-primary{background:linear-gradient(90deg,var(--accent),var(--accent-dark));color:#fff}
	.btn-ghost{background:transparent;border:1px solid #e6e6e6}
	.small-muted{font-size:13px;color:#777}
	.toast{position:fixed;right:20px;bottom:20px;background:#111;color:#fff;padding:10px 12px;border-radius:8px;display:none;align-items:center;gap:8px;z-index:90}
	.toast.show{display:flex}
	@media (max-width:980px){ .wrapper{grid-template-columns:1fr;padding:12px} .search input{width:100%} }
</style>
</head>
<body>
	<div class="wrapper">
		<header class="header">
			<div>
				<h1>Cashier • Order Management</h1>
				<div class="small">Quick checkout, print receipts & manage cart</div>
			</div>
			<div class="controls">
				<div class="search">
					<input id="search" placeholder="Search products by name or SKU" />
					<button id="clear-search" class="btn btn-ghost">Clear</button>
				</div>
				<div style="width:12px"></div>
			</div>
		</header>

		<!-- products / left -->
		<section class="card" aria-label="Products">
			<div style="display:flex;justify-content:space-between;align-items:center">
				<div style="font-weight:800">Products</div>
				<div class="small-muted">Tap to add</div>
			</div>

			<div id="products" class="products" aria-live="polite"></div>

			<div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
				<button id="seed" class="btn btn-ghost">Seed sample</button>
				<button id="refresh" class="btn btn-ghost">Reload</button>
			</div>
		</section>

		<!-- cart / right -->
		<aside class="card" aria-label="Cart">
			<div style="display:flex;justify-content:space-between;align-items:center">
				<div style="font-weight:800">Cart</div>
				<div class="small-muted" id="cart-count">0 items</div>
			</div>

			<div class="cart" id="cart">
				<div class="cart-list" id="cart-list"></div>

				<div class="total-row">
					<div class="small-muted">Subtotal</div>
					<div id="subtotal" style="font-weight:800">$0.00</div>
				</div>
				<div class="total-row">
					<div class="small-muted">Discount</div>
					<div><input id="discount" type="number" min="0" step="0.01" placeholder="0.00" style="width:90px;padding:6px;border-radius:6px;border:1px solid #eee" /></div>
				</div>
				<div class="total-row" style="font-size:16px">
					<div style="font-weight:800">Total</div>
					<div id="total" style="font-weight:800">$0.00</div>
				</div>

				<div class="checkout">
					<button id="place-order" class="btn btn-primary">Place order</button>
					<div style="display:flex;gap:8px">
						<button id="print" class="btn btn-ghost">Print receipt</button>
						<button id="clear-cart" class="btn btn-ghost">Clear cart</button>
					</div>
					<div class="small-muted">Orders are saved to localStorage for demo.</div>
				</div>
			</div>
		</aside>
	</div>

	<div id="toast" class="toast" role="status" aria-live="polite"><span id="toast-text"></span><button id="toast-undo" class="btn btn-ghost" style="padding:6px 8px">Undo</button></div>

	<script>
		(() => {
			const PROD_KEY = 'pharm_products_demo';
			const CART_KEY = 'pharm_cart';
			const ORDERS_KEY = 'pharm_orders';

			const productsEl = document.getElementById('products');
			const searchEl = document.getElementById('search');
			const clearSearch = document.getElementById('clear-search');
			const seedBtn = document.getElementById('seed');
			const refreshBtn = document.getElementById('refresh');

			const cartListEl = document.getElementById('cart-list');
			const cartCountEl = document.getElementById('cart-count');
			const subtotalEl = document.getElementById('subtotal');
			const totalEl = document.getElementById('total');
			const discountEl = document.getElementById('discount');

			const placeBtn = document.getElementById('place-order');
			const printBtn = document.getElementById('print');
			const clearCartBtn = document.getElementById('clear-cart');

			const toast = document.getElementById('toast');
			const toastText = document.getElementById('toast-text');
			const toastUndo = document.getElementById('toast-undo');

			let products = loadProducts();
			let cart = loadCart();
			let lastOrder = null;

			function uid(p='o'){ return p + Math.random().toString(36).slice(2,9); }

			function loadProducts(){
				try{ const raw = localStorage.getItem(PROD_KEY); if(raw) return JSON.parse(raw); } catch(e){}
				return [
					{id:'p1', name:'Paracetamol 500mg', sku:'PARA-500', price:2.5, qty:120},
					{id:'p2', name:'Amoxicillin 250mg', sku:'AMOX-250', price:4.75, qty:30},
					{id:'p3', name:'Vitamin D 1000IU', sku:'VITD-1000', price:8.00, qty:200},
					{id:'p4', name:'Ibuprofen 200mg', sku:'IBU-200', price:3.25, qty:10},
					{id:'p5', name:'Hydrocortisone Cream 1%', sku:'HYDRO-1', price:6.50, qty:55}
				];
			}
			function saveProducts(){ try{ localStorage.setItem(PROD_KEY, JSON.stringify(products)); } catch(e){} }

			function loadCart(){ try{ const raw = localStorage.getItem(CART_KEY); if(raw) return JSON.parse(raw); } catch(e){} return []; }
			function saveCart(){ try{ localStorage.setItem(CART_KEY, JSON.stringify(cart)); } catch(e){} }

			function loadOrders(){ try{ const raw = localStorage.getItem(ORDERS_KEY); if(raw) return JSON.parse(raw); } catch(e){} return []; }
			function saveOrders(arr){ try{ localStorage.setItem(ORDERS_KEY, JSON.stringify(arr)); } catch(e){} }

			function renderProducts(filter=''){
				productsEl.innerHTML = '';
				const q = (filter||'').trim().toLowerCase();
				const list = products.filter(p => {
					if(!q) return true;
					return (p.name + ' ' + (p.sku||'')).toLowerCase().includes(q);
				});
				list.forEach(p => {
					const div = document.createElement('div');
					div.className = 'prod';
					div.innerHTML = `
						<div class="name">${escape(p.name)}</div>
						<div class="small">${escape(p.sku)} • $${(p.price||0).toFixed(2)}</div>
						<div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px">
							<div class="small">Stock: ${p.qty}</div>
							<div>
								<button class="btn btn-ghost" data-act="add" data-id="${p.id}">Add</button>
							</div>
						</div>
					`;
					productsEl.appendChild(div);
				});
			}

			function renderCart(){
				cartListEl.innerHTML = '';
				if(cart.length === 0){ cartListEl.innerHTML = '<div class="small-muted">Cart is empty</div>'; }
				let subtotal = 0;
				cart.forEach((it, idx) => {
					subtotal += (it.price || 0) * (it.qty || 0);
					const div = document.createElement('div');
					div.className = 'cart-item';
					div.innerHTML = `
						<div style="flex:1">
							<div style="font-weight:700">${escape(it.name)}</div>
							<div class="small">${escape(it.sku || '')}</div>
						</div>
						<div style="display:flex;align-items:center;gap:8px">
							<div class="qty">
								<button data-act="dec" data-idx="${idx}">−</button>
								<span style="padding:0 8px">${it.qty}</span>
								<button data-act="inc" data-idx="${idx}">+</button>
							</div>
							<div style="width:80px;text-align:right">$${((it.price||0)*it.qty).toFixed(2)}</div>
							<button data-act="remove" data-idx="${idx}" class="btn btn-ghost" style="margin-left:8px">Remove</button>
						</div>
					`;
					cartListEl.appendChild(div);
				});
				cartCountEl.textContent = `${cart.reduce((s,i)=>s+(i.qty||0),0)} items`;
				subtotalEl.textContent = '$' + subtotal.toFixed(2);
				const disc = Number(discountEl.value || 0);
				const total = Math.max(0, subtotal - disc);
				totalEl.textContent = '$' + total.toFixed(2);
				saveCart();
			}

			// events
			document.body.addEventListener('click', (e) => {
				const btn = e.target.closest('button');
				if(!btn) return;
				// product add
				if(btn.dataset.act === 'add'){ const id = btn.dataset.id; const p = products.find(x=>x.id===id); if(p){ addToCart(p,1); } }
				// cart qty manip
				if(btn.dataset.act === 'inc' || btn.dataset.act === 'dec' || btn.dataset.act === 'remove'){
					const idx = Number(btn.dataset.idx);
					if(btn.dataset.act === 'inc'){ cart[idx].qty = (cart[idx].qty||0) + 1; }
					if(btn.dataset.act === 'dec'){ cart[idx].qty = Math.max(1, (cart[idx].qty||1) - 1); }
					if(btn.dataset.act === 'remove'){ cart.splice(idx,1); }
					renderCart();
				}
			});

			function addToCart(p, qty=1){
				const idx = cart.findIndex(x=>x.id === p.id);
				if(idx >= 0){ cart[idx].qty = (cart[idx].qty||0) + qty; }
				else { cart.unshift({ id: p.id, name: p.name, sku: p.sku, price: p.price, qty: qty }); }
				renderCart(); showToast(`${p.name} added`);
			}

			// search & control buttons
			searchEl.addEventListener('input', ()=> renderProducts(searchEl.value));
			clearSearch.addEventListener('click', ()=> { searchEl.value=''; renderProducts(); });
			seedBtn.addEventListener('click', ()=> { products = loadProducts(); saveProducts(); renderProducts(); showToast('Seeded products'); });
			refreshBtn.addEventListener('click', ()=> { products = loadProducts(); renderProducts(); showToast('Reloaded'); });

			discountEl.addEventListener('input', renderCart);

			clearCartBtn.addEventListener('click', () => { if(!cart.length) return; if(confirm('Clear cart?')){ cart = []; saveCart(); renderCart(); } });

			placeBtn.addEventListener('click', () => {
				if(cart.length === 0){ alert('Cart is empty'); return; }
				const subtotal = Number(subtotalEl.textContent.replace(/[^0-9.-]+/g,"")) || 0;
				const discount = Number(discountEl.value || 0);
				const total = Math.max(0, subtotal - discount);
				const order = {
					id: uid('ORD'),
					date: new Date().toISOString().slice(0,10),
					items: JSON.parse(JSON.stringify(cart)),
					subtotal,
					discount,
					total,
					status: 'pending'
				};
				const orders = loadOrders();
				orders.unshift(order);
				saveOrders(orders);
				lastOrder = order;
				cart = [];
				saveCart();
				renderCart();
				showToast(`Order ${order.id} placed`, true);
			});

			printBtn.addEventListener('click', () => {
				const orders = loadOrders();
				const o = lastOrder || orders[0];
				if(!o){ alert('No recent order to print'); return; }
				const win = window.open('', '_blank');
				win.document.write(`<pre style="font-family:monospace">Receipt\nOrder: ${o.id}\nDate: ${o.date}\n\nItems:\n${o.items.map(i=> `${i.name} x${i.qty} @ $${i.price}`).join('\n')}\n\nSubtotal: $${(o.subtotal||0).toFixed(2)}\nDiscount: $${(o.discount||0).toFixed(2)}\nTotal: $${(o.total||0).toFixed(2)}\n\nThank you!</pre>`);
				win.document.close();
				win.print();
			});

			// toast with undo for last order
			toastUndo.addEventListener('click', () => {
				if(!lastOrder) return;
				let orders = loadOrders();
				orders = orders.filter(o => o.id !== lastOrder.id);
				saveOrders(orders);
				showToast('Order undone', false);
				lastOrder = null;
			});

			function showToast(txt, allowUndo=false){
				toastText.textContent = txt;
				toast.classList.add('show');
				toastUndo.style.display = allowUndo ? 'inline-block' : 'none';
				setTimeout(()=> { toast.classList.remove('show'); if(!allowUndo) lastOrder = null; }, 5000);
			}

			// utilities
			function escape(s=''){ return String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

			// initial
			renderProducts();
			renderCart();

			// expose for debug
			window.__cashier = { products, cart, loadProducts, loadCart, loadOrders };
		})();
	</script>
</body>
</html>
