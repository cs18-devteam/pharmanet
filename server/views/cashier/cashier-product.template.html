<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cashier product</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>

<body class="product">
  <!-- ---------------- Header ---------------- -->
  <header>
    <nav>
      <div class="logo">
        <img class="logopic" src="/public/logo/logo.svg" alt="Pharmacy Logo" />
      </div>

      <div id="toggle-placeholder"></div>

      <nav class="nav-links">
        <button class="tab">Store</button>
        <button class="tab">Dashboard</button>
        <button class="tab active">Cashier</button>
      </nav>

      <div class="profile">
        <div class="profileName">
          <a href="#">Chamani Niroshani</a>
          <div class="welcome">Welcome</div>
        </div>
        <div class="profilePic">
          <a href="/signup.html">
            <img src="/public/logo/profile_pic.jpg" alt="Profile Picture" />
          </a>
        </div>
      </div>
    </nav>
  </header>

  <!-- ---------------- Dashboard Layout ---------------- -->
  <div class="dashboard">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="menu-section">
        <h4 class="section-title">MAIN MENU</h4>
        <ul>
          <li onclick="window.location.href='cashier-dashboard'"><i class="icon"></i><span>Dashboard</span></li>
          <li class="active" onclick="window.location.href='cashier-product'"><i class="icon"></i><span>Products</span></li>
        </ul>
      </div>

      <div class="menu-section">
        <h4 class="section-title">LEADS</h4>
        <ul>
          <li onclick="window.location.href='cashier-order'"><i class="icon"></i><span>Orders</span></li>
          <li onclick="window.location.href='cashier-sales'"><i class="icon"></i><span>Sales</span></li>
          <li onclick="window.location.href='cashier-customer'"><i class="icon"></i><span>Customers</span></li>
        </ul>
      </div>

      <!--<div class="menu-section">
        <h4 class="section-title">COMMS</h4>
        <ul>
          <li><i class="icon"></i><span>Reports</span></li>
          <li><i class="icon"></i><span>Settings</span></li>
        </ul>
      </div>-->
    </aside>

    <!-- Right Side Content -->
    <div class="right-side">
      <main class="content">
        
        <!-- Top Bar -->
        <header class="top-bar">
          <div class="search-bar">
            <form action="" method="post">
              <label for="category">
                <span>Category:</span>
                <select name="category" id="category" class="selector">
                  <option value="Antibiotics">Antibiotics</option>
                  <option value="Pain Relievers">Pain Relievers</option>
                  <option value="Antipyretics (Fever Medicines)">Antipyretics (Fever Medicines)</option>
                  <option value="Antacids & Digestive Medicines">Antacids & Digestive Medicines</option>
                  <option value="Anti-Allergic Medicines">Anti-Allergic Medicines</option>
                  <option value="Cough & Cold Medicines">Cough & Cold Medicines</option>
                  <option value="Vitamins & Supplements">Vitamins & Supplements</option>
                  <option value="Diabetes Medicines">Diabetes Medicines</option>
                  <option value="Blood Pressure Medicines">Blood Pressure Medicines</option>
                  <option value="Heart & Cardiac Care">Heart & Cardiac Care</option>
                  <option value="Skin Care Medicines">Skin Care Medicines</option>
                  <option value="Eye & Ear Drops">Eye & Ear Drops</option>
                  <option value="First Aid & Emergency">First Aid & Emergency</option>
                  <option value="Ayurvedic & Herbal Medicines">Ayurvedic & Herbal Medicines</option>
                  <option value="Baby & Child Care">Baby & Child Care</option>
                  <option value="Personal Hygiene">Personal Hygiene</option>
                  <option value="Medical Devices & Equipment">Medical Devices & Equipment</option>
                  <option value="Veterinary Medicines">Veterinary Medicines</option>
                </select>
              </label>

              <label for="Search">
                <input type="search" class="searchmedi" id="Search" placeholder="Search by name, description or brand" />
              </label>

              <label for="filter">
                <button type="submit" class="searchButton" name="filter">Filter</button>
              </label>

              <label for="createBill">
                <button type="button" class="createBill" onclick="window.location.href='cashier-createBill'">Create Bill</button>
              </label>
              <label for="addProduct">
                <button type="button" class="addProduct" onclick="openPopup()"> Add Product</button>
              </label>
              
            </form>

            <!-- Add Product Popup -->
          <div class="popup-overlay" id="popupOverlay">
            <div class="popup-box">
              <h2>Add New Product</h2>
              

              <div class="form-row">
                <label>Name</label>
                <input type="text" id="addProductName" placeholder="Enter product name">
              </div>

              <div class="form-row">
                <label>Brand</label>
                <input type="text" id="addProductBrand" placeholder="Enter brand name">
              </div>

              <div class="form-row">
                <label>Category</label>
                <input type="text" id="addProductCategory" placeholder="Enter category">
              </div>

              <div class="form-row">
                <label>Price (Rs)</label>
                <input type="number" id="addProductPrice" placeholder="Enter price">
              </div>

              <div class="form-row">
                <label>Available Quantity</label>
                <input type="number" id="addProductQty" placeholder="Enter available stock">
              </div>


              <div class="actions">
                <button class="save" onclick="saveProduct()">Save</button>
                <button class="close" onclick="closePopup()">Close</button>
              </div>
            </div>
          </div>

          </div>
        </header>

      </main>

      <!-- All product Table -->
        <div class="product-list">
         <div class="product-result">
            <table class="product-result-table">
            <thead>
              <tr>
                <th>Id</th>
                <th>Name</th>
                <th>Brand</th>
                <th>Category</th>
                <th>Price</th>
                <th>Available</th>
                <td>Action</td>
              </tr>
            </thead>
            <tbody>
              {rows}

              
            </tbody>
          </table>

          <!-- Pagination -->
          <div class="pagination">
            <button class="page-btn">Prev</button>
            <button class="page-btn active">1</button>
            <button class="page-btn">2</button>
            <button class="page-btn">...</button>
            <button class="page-btn">9</button>
            <button class="page-btn">Next</button>

            <div class="entries">Showing of 20 Entries</div>
            <select class="show-count">
              <option>Show 3</option>
              <option>Show 5</option>
              <option>Show 10</option>
            </select>
          </div>
          </div>
        </div>
      
</div>
  </div>
  <!-- Edit Product Popup -->
<div class="popup-overlay" id="editPopupOverlay">
  <div class="popup-box">
    <h2>Edit Product</h2>

    <div class="form-row">
      <label>Product ID</label>
      <input type="text" id="editProductId" readonly />
    </div>

    <div class="form-row">
      <label>Name</label>
      <input type="text" id="editProductName" />
    </div>

    <div class="form-row">
      <label>Brand</label>
      <input type="text" id="editProductBrand" />
    </div>

    <div class="form-row">
      <label>Category</label>
      <input type="text" id="editProductCategory" />
    </div>

    <div class="form-row">
      <label>Price (Rs)</label>
      <input type="number" id="editProductPrice" />
    </div>

    <div class="form-row">
      <label>Available Quantity</label>
      <input type="number" id="editProductQty" />
    </div>

    <div class="actions">
      <button class="save" onclick="saveEdit()">Save Changes</button>
      <button class="close" onclick="closeEditPopup()">Cancel</button>
    </div>
  </div>
</div>

  <script>
  let editRow = null;

  // ------- Add Product Popup -------
  function openPopup() {
    document.getElementById("popupOverlay").classList.add("active");
  }

  function closePopup() {
    document.getElementById("popupOverlay").classList.remove("active");
  }

  // ------- Edit Product Popup -------
  function openEditPopup(row) {
    editRow = row;

    const cells = row.querySelectorAll("td");
    document.getElementById("editProductId").value = cells[0].textContent.trim();
    document.getElementById("editProductName").value = cells[1].textContent.trim();
    document.getElementById("editProductBrand").value = cells[2].textContent.trim();
    document.getElementById("editProductCategory").value = cells[3].textContent.trim();
    document.getElementById("editProductPrice").value = cells[4].textContent.trim();
    document.getElementById("editProductQty").value = cells[5].textContent.trim();
   // document.getElementById("editProductExpiry").value = cells[6].textContent.trim();

    document.getElementById("editPopupOverlay").classList.add("active");
  }

  function closeEditPopup() {
    document.getElementById("editPopupOverlay").classList.remove("active");
    editRow = null;
  }

  // ------- Save Edited Product -------
  function saveEdit() {
    if (editRow) {
      const cells = editRow.querySelectorAll("td");

      cells[1].textContent = document.getElementById("editProductName").value;
      cells[2].textContent = document.getElementById("editProductBrand").value;
      cells[3].textContent = document.getElementById("editProductCategory").value;
      cells[4].textContent = document.getElementById("editProductPrice").value;
      cells[5].textContent = document.getElementById("editProductQty").value;
      //cells[6].textContent = document.getElementById("editProductExpiry").value;

      closeEditPopup();
    } else {
      alert("No product selected to edit!");
    }
  }

  // ------- Attach Listeners AFTER page loads -------
  document.addEventListener("DOMContentLoaded", () => {
    const editButtons = document.querySelectorAll(".Edit-btn");
    const removeButtons = document.querySelectorAll(".remove-btn");

    // Edit button listener
    editButtons.forEach((btn) => {
      btn.addEventListener("click", (e) => {
        const row = e.target.closest("tr");
        openEditPopup(row);
      });
    });

    // Remove button listener
    removeButtons.forEach((btn) => {
      btn.addEventListener("click", (e) => {
        if (confirm("Are you sure you want to delete this product?")) {
          e.target.closest("tr").remove();
        }
      });
    });
  });
  function saveProduct() {
  const productData = {
    //id: document.getElementById("addProductId").value,
    name: document.getElementById("addProductName").value,
    brand: document.getElementById("addProductBrand").value,
    category: document.getElementById("addProductCategory").value,
    price: parseFloat(document.getElementById("addProductPrice").value),
    quantity: parseInt(document.getElementById("addProductQty").value),
    //expiry: document.getElementById("addProductExpiry").value
  };

  console.log(productData);
  fetch("/api/products", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(productData)
  })
  .then(response => response.json())
  .then(data => {
    if (data.status == "success") {
      alert("Product added successfully!");
      window.location.href = "/cashier-product"
      
    } else {
      alert("Failed to add product: " + data.message);
    }
  })
  .catch(err => {
    console.error(err);
    alert("Error adding product!");
  });
}

</script>


</body>
</html>
