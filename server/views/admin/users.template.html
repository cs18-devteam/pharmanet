          <script>
  // Hide dropdown when clicking outside
  document.addEventListener('click', () => {
    document.querySelectorAll('.dropdown').forEach(dropdownMenu => dropdownMenu.classList.remove('show'));
  });

  const modal = document.getElementById("addUserModal");
  const btn = document.getElementById("openAddUserModal");
  const closeBtn = document.querySelector(".modal .close");

  btn.addEventListener("click", () => {
    modal.style.display = "flex";
  });

  closeBtn.addEventListener("click", () => {
    modal.style.display = "none";
  });

  // Close when click outside
  window.addEventListener("click", (e) => {
    if (e.target === modal) {
      modal.style.display = "none";
    }
  });

  //listen for messages from the iframe
  window.addEventListener('message', (event) => {
    if (event.data.action === 'closeModalAndReload') {
      modal.style.display = "none";
      loadUsers();
    }
  })

  const pathParts = window.location.pathname.split('/');
  const adminIdIndex = pathParts.indexOf('admin') + 1;
  const adminId = pathParts[adminIdIndex];
  const API_URL = `${window.location.origin}/admin/${adminId}/api/users`;

  
  window.addEventListener('load', loadUsers);

  //FETCH ALL USERS
  async function loadUsers() {
    try {
      const res = await fetch(API_URL);
      const users = await res.json();
      console.log(users);

      const tableBody = document.getElementById("users-table-body");
      tableBody.innerHTML = "";

      if (!Array.isArray(users) || users.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="6">No users found</td></tr>';
        return;
      }

      users.forEach(user => {
        const initials = (user.firstName || user.lastName || user.fullName || 'U').split(' ').map(n => n[0]).join('').toUpperCase();
        const avatar = user.avatar || initials;
        const status = user.status || 'Active';
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>
            <div class="user-info">
              <div class="avatar">${avatar}</div>
              <div class="details">
                <div class="name">${user.firstName +" " + user.lastName || user.fullName}</div>
                <div class="email">${user.email}</div>
              </div>
            </div>
          </td>
          <td><span class="role">${user.role || 'N/A'}</span></td>
          <td>${user.pharmacy || 'N/A'}</td>
          <td><span class="status ${status.toLowerCase()}">${status}</span></td>
          <!-- <td>2 hours ago</td> -->
          <td class="actions">
            <div class="dropdownMenu">
              <button class="dots">⋮</button>
              <ul class="dropdown">
                <!-- <a href="/admin/viewProfile?id=${user.id}">View Profile</a> -->
                <a href="#" class="view-profile-btn" data-id="${user.id}" data-name="${user.name || user.fullName}" data-email="${user.email}" data-role="${user.role}" data-pharmacy="${user.pharmacy}" data-status="${status}">View Profile</a>
                <a href="" class="edit-btn" data-id="${user.id}">Edit User</a>
                <!-- <a href="">Change Role</a> -->
                <a href="">Reset Password</a>
                <a href="#" class="deactivate-btn danger" data-id="${user.id}">Deactivate</a>
              </ul>
            </div>
          </td>
        `;
        tableBody.appendChild(row);
      });

      // Toggle dropdown menu
      document.querySelectorAll('.dots').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          document.querySelectorAll('.dropdown').forEach(dropdownMenu => dropdownMenu.classList.remove('show'));
          const dropdownMenu = btn.nextElementSibling;
          dropdownMenu.classList.toggle('show');
        });
      });

      //Add event listeners to buttons
      document.querySelectorAll(".deactivate-btn").forEach(btn =>
        btn.addEventListener("click", (e) => {
          e.preventDefault();
          deactivateUser(btn.dataset.id);
        })
      );

      document.querySelectorAll(".edit-btn").forEach(btn =>
        btn.addEventListener("click", () => editUser(btn.dataset.id))
      );
    } catch (error) {
      console.error('Error loading users:', error);
      document.getElementById("users-table-body").innerHTML = '<tr><td colspan="6">Error loading users</td></tr>';
    }
  }

  //Deactivate User
  async function deactivateUser(id) {
    if (!confirm("Are you sure you want to deactivate this User?")) return;

    const res = await fetch(`${API_URL}/${id}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ status: "Inactive" })
    });
    if (res.ok) {
      alert("User deactivated");
      loadUsers();
    } else {
      alert("Failed to deactivate User");
    }
  }

  //Add new user
  document.querySelector("#addUserForm")?.addEventListener("submit", async (e) => {
    e.preventDefault();
    const fname = document.querySelector("#fname").value;
    const lname = document.querySelector("#lname").value;
    const avatar = generateAvatar(fname, lname);
    const name = fname + " " + lname;
    const email = document.querySelector("#email").value;
    const pharmacy = document.querySelector("#pharmacy").value;
    const role = document.querySelector("#role").value;
    console.log(avatar);

    const res = await fetch(`${window.location.origin}/admin/${adminId}/api/users`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, email, pharmacy, role, avatar })
    });

    if (res.ok) {
      alert("user created successfully!");
      e.target.reset();
      loadUsers(); // Changed from loadBlogs to loadUsers
    } else {
      alert("Error creating user");
    }

    function generateAvatar(fname, lname) {
      const fletter = fname.trim().charAt(0).toUpperCase();
      const lletter = lname.trim().charAt(0).toUpperCase();
      const avatar = fletter + lletter;
      console.log(avatar);
      return avatar;
    }
  });


  
document.addEventListener('click', function(e) {
  if (e.target.classList.contains('view-profile-btn')) {
    e.preventDefault();
    const userId = e.target.dataset.id;
    const userName = e.target.dataset.name;
    const userEmail = e.target.dataset.email;
    const userRole = e.target.dataset.role;
    const userPharmacy = e.target.dataset.pharmacy;
    const userStatus = e.target.dataset.status;

    // Store user data in sessionStorage
    sessionStorage.setItem('currentUser', JSON.stringify({
      id: userId,
      name: userName,
      email: userEmail,
      role: userRole,
      pharmacy: userPharmacy,
      status: userStatus
    }));

    // Navigate to view profile page
    window.location.href = `/admin/${adminId}/viewProfile/${userId}`;
  }
});
</script>
