<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Medicine</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body class="AddMedi">

    <!--header section-->
  <header class="top-bar">
    <nav>
        <div class="logo">
            <img class="logopic" src="/public/logo/logo.svg" alt="logo">
            <p class="logoname">PharmaNet</p>
        </div>

        <div id="toggle-placeholder"></div>


    </nav>
  </header>

    <div class="container">
        <!-- Medicine Details Form -->
        <div class="medicine-details">
            <h2>Medicine Details</h2>
            <form action="/medicine" method="POST">
                <div class="col">
                    <label>Medicine Name</label>
                    <input type="text" name="name" placeholder="Enter medicine name">
                </div>
                

                <div class="row">
                    <div class="col">
                        <label>Category</label>
                        <select name="categoryId">
                            <option>Select category</option>
                            <option>Pain Relief</option>
                            <option>Antibiotics</option>
                            <option>Cough & Cold</option>
                            <option>Digestive Health</option>
                            <option>Skin Care</option>
                            <option>Vitamin & Minerals</option>
                        </select>
                    </div>
                    <div class="col">
                        <label>Type</label>
                        <select name="typeId">
                            <option>Select type</option>
                            <option>Tablet</option>
                            <option>Capsule</option>
                            <option>Syrup</option>
                            <option>injection</option>
                            <option>Ointment</option>
                            <option>Drop</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col">
                        <label>Price ($)</label>
                        <input type="number" name="price" value="0.00">
                    </div>
                    <div class="col">
                        <label>Stock Quantity</label>
                        <input type="number" name="stock" value="0">
                    </div>
                </div>

                <div class="col">
                    <label>Manufacturer</label>
                    <input type="text" name="manufacturer" placeholder="Enter manufacturer name">
                </div>
                

                <div class="row">
                    <div class="col">
                        <label>Expiry Date</label>
                        <input type="date" name="expiryDate">
                    </div>
                    <div class="col">
                        <label>Batch Number</label>
                        <input type="text" name="datchNumber" placeholder="Batch #">
                    </div>
                </div>
                <div class="col">
                    <label>Description</label>
                    <textarea placeholder="Enter medicine description" name="description"></textarea>
                </div>
                

                <button type="submit">+ Add Medicine</button>
            </form>
        </div>

        <!-- Medicine Inventory -->
        <div class="medicine-inventory">
            <div class="inventory-header">
                <span>Medicine Inventory</span>
                <input type="text" class="searchBar" placeholder="Search medicines">
                <select>
                    <option>All Categories</option>
                </select>
            </div>
            <div class="inventory-body">
                <div class="medicine-card">
                    <div class="col">
                        <label id="title">Paracetamol</label>
                    </div>
                    <div class="col">
                        <label id="title">Category:</label> 
                        <label>Relief</label> 
                    </div>
                    <div class="col">
                        <label id="title">Type:</label>
                        <label>Tablet</label>  
                    </div>
                    <div class="col">
                        <label id="title">Price:</label> 
                        <label>$5.00</label>
                    </div>
                    <div class="col">
                        <label id="title">Stock:</label>
                        <label>100</label>
                    </div>
                    <div class="col">
                        <label id="title">Manufacturer:</label>
                         <label>ABC Pharma</label>
                    </div>
                    <div class="col">
                        <label id="title">Expiry:</label>
                        <label>2026-01-01</label> 
                    </div>
                    <div class="actions">
                        <button class="update-btn">Update</button>
                        <button class="delete-btn">Delete</button>
                    </div>
                </div>

            
            </div>
        </div>
    </div>
</body>
</html>
