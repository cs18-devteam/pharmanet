{header}
<body  class="addPharmarcy03">

  <div class="registration-container">
    <header>
      <img class="logopic" src="/public/logo/logo.svg" alt="logo">
      <h1>PharmaNet</h1>
      <p>Register your pharmacy to get started</p>
    </header>

    <div class="steps">
      <div class="step">
        <div class="circle">1</div>
        <span>Pharmacy Details</span>
      </div>
      <div class="step">
        <div class="circle">2</div>
        <span>Owner Information</span>
      </div>
      <div class="step  active">
        <div class="circle">3</div>
        <span>Location</span>
      </div>
      <div class="step">
        <div class="circle">4</div>
        <span>Pharmacist & Services</span>
      </div>
    </div>

    <div class="form-card">
      <div class="card-header">
        <i class="fa-solid fa-location-dot"></i>
        <span>Location Information</span>
        <p>Enter your pharmacy location</p>
      </div>

      <form id="form">
        <div class="form-row">
          <label>Street Address *</label>
          <input name="street" type="text" placeholder="123 Main Street" required>
          <p></p>
        </div>

        <div class="form-row two-cols">
          <div>
            <label>Province *</label>
            <input name="province" type="text" placeholder="Western" required>
            <p></p>
          </div>
          <div>
            <label>District *</label>
            <!-- <input type="telephoneNo." placeholder="+94 78 141 3123" required> -->
             <select name="road" required>
              <option>Select 'District'</option>
              <option value="gampaha">Gampaha</option>
              <option value="colombo">Colombo</option>
              <option value="kaluthara">Kaluthara</option>
             </select>
             <p></p>
          </div>
        </div>

        <div class="form-row two-cols">
          <div>
            <label>Zip Code *</label>
            <input type="number" placeholder="1001" name="postalCode" required>
            <p></p>
          </div>
          <div>
            <label>City *</label>
            <!-- <input type="telephoneNo." placeholder="+94 78 141 3123" required> -->
             <select name="town" required>
              <option>Select City</option>
              <option>Gampaha</option>
              <option>Colombo</option>
              <option>Kaluthara</option>
             </select>
             <p></p>
          </div>
        </div>

        <div class="form-buttons">
         <a href="/admin/pharmacy/step/2"><button type="button" class="btn prev btn-previous">Previous</button></a>
          <button type="button" class="btn next btn-next">Next
            <img class="spinner" src="/logo/spinner.png"/>
          </button>
        </div>
      </form>
    </div>

    <footer>
      Need help? <a href="#">Contact support</a>
    </footer>
  </div>

  <script>
    // import "/js/utilities/Popup.js";
// import Notify from "/js/view/Notify.js";
try{



const form = document.getElementById('form');
const btn_next = document.querySelector('.btn-next');

const data = JSON.parse(localStorage.getItem('pharmacy')) || {};
console.log(data);
for(const [key,value] of Object.entries(data)){
    const field = document.querySelector(`[name=${key}]`);
    if(field){
    field.value = value;
    }
}

function renderError(input , msg){
    input.parentElement.querySelector('p').textContent = "";
    input.classList.remove('utility-success');
    input.classList.add('utility-warn');
    input.parentElement.querySelector('p').textContent = msg;
}
function renderSuccess(input , msg){
  input.parentElement.querySelector('p').textContent = "";
    input.classList.remove('utility-success');
    input.classList.add('utility-warn');
    input.parentElement.querySelector('p').textContent = msg;
}

btn_next.addEventListener('click' , (e)=>{
    e.preventDefault();
    const formData = new FormData(form);

    for( const [key , value] of formData.entries()){
    const field = document.querySelector(`[name=${key}]`);
    if(key != "street" &&/[^A-Za-z0-9]/.test(value)){
        renderError( field,"letter and number are only allowed")
        return;
    }
    if(key=="province" && /[^A-Za-z]/.test(value)){
        renderError( field ,"letters are only allowed");
        return;
    }
    if(key == "street"  &&  /[@#$%^&*()!;?]/.test(value)){
      renderError(field ,"'@#$%^&*()!;?' don't  allowed");
        return;
    }

    
    if(!value){
        renderError(field , "values can't be empty")
        return;
    }else{
        renderSuccess(field );
        
    }
    data[key] = value;
    }
    
    //save to storage
    const previous = JSON.parse(localStorage.getItem('pharmacy'));
    if(!previous) window.location.href = "/admin/pharmacy/step/3";
    localStorage.setItem("pharmacy" , JSON.stringify({...previous , ...data }));

    window.location.href = "/admin/pharmacy/step/4"
    

})
}catch(e){
    console.log(e);
    Swal.fire({
      icon: "error",
      title: "something went wrong",
      text: e.message,
      footer: '<a href="/contactus">Why do I have this issue?</a>'
    })
}

  </script>

</body>
</html>
