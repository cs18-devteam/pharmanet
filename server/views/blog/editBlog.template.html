<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/style.css" />
    <title>Document</title>
    <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
  </head>
  <body class="createNewBlog">
    <header class="page-header">
      <a href="/admin/{id}/blogs/manage" class="back-btn">←</a>
      <div class="title-group">
        <h1>Update Blog Post</h1>
        <p>Share health tips and pharmacy insights with your community</p>
      </div>
    </header>

    <main class="container">
      <div class="container1">
        <form class="form-section" id="createBlog">
          <div class="card">
            <h3>Post Details</h3>
            <p class="subtitle">
              Enter the basic information for your blog post
            </p>

            <label>Medicine Name</label>
            <input
              type="text"
              name="title"
              value="{title}"
              readonly
            />

            <label>Reference Link</label>
            <input type="text" id="websiteUrl" value="{slug}" name="slug" placeholder="eg: www.google.com" required/>
            <small id="urlError" style="color: red; display: none;">Enter a valid link like www.google.com or https://google.com</small>

            <label>Excerpt</label>
            <textarea
              name="excerpt"
              placeholder="Brief summary of your post (shown in listings)"
              name="excerpt"
            >
{excerpt}</textarea
            >
          </div>

          <div class="card">
            <h3>Content</h3>
            <p class="subtitle">Write your blog post content here</p>

            <label>Post Content</label>
            <textarea
              name="content"
              placeholder="Write your blog post content here. You can use markdown formatting..."
            >
{content}</textarea
            >
          </div>
        </form>
      </div>

      <aside class="sidebar">
        <div class="card">
          <h3>Publish Settings</h3>

          <!-- <label>Status</label>
          <input type="date" name="status" value="{date}" /> -->
          <!-- <select name="status">
          <option>Draft</option>
          <option>Published</option>
        </select> -->

          <label>Category</label>
          <select value="" name="category" form="createBlog">
            <option>{category}</option>
            <option>Medicine</option>
            <option>Disease</option>
          </select>

          <label>Author</label>
          <input
            type="text"
            value="{author}"
            name="author"
            form="createBlog"
            placeholder="Your name"
          />

          <!-- <label>Tags</label>
          <input
            type="text"
            value="{tags}"
            name="tag"
            placeholder="Separate with commas"
          /> -->
        </div>

        <div class="buttons">
          <button class="save"><span></span> update Post</button>
          
        </div>

       
        </div>
      </aside>
    </main>

    <script>
      const pathParts = window.location.pathname.split("/");
      const adminIdIndex = pathParts.indexOf("admin") + 1;
      const adminId = pathParts[adminIdIndex];
      const blogIdIndex = pathParts.indexOf("blogs") + 1;
      const blogId = pathParts[blogIdIndex];
      const form = document.getElementById("createBlog");

      try {
        document.addEventListener("click", async function (e) {
          const saveBtn = e.target.closest(".save");
          if (!saveBtn) return;

          e.preventDefault();
          const confirmed = await swal({
            title: "Are you sure you want to update this blog?",
            icon: "/logo/logo.svg",
            buttons: {
              cancel: { text: "cancel", visible: true },
              confirm: { text: "Ok", value: "true" },
            },
            dangerMode: false,
          });

          if (!confirmed) {
            swal("Declined", "Blog update Declined", "warning");
            return;
          }

          const formData = new FormData(form);
          const data = Object.fromEntries(formData.entries());
          console.log(data);

          const res = await fetch(`${window.location.origin}/admin/${adminId}/blogs/${blogId}/edit`, {
                method: 'PATCH',
                headers: {"content-type":"application/json"},
                body: JSON.stringify(data),
          });
          if(res.ok){
            window.location.href = `${window.location.origin}/admin/${adminId}/blogs/manage`;
            swal("Updated", "Updated medicine Successfully","success");
            
          } else{
        const err = await res.json().catch(() => ({}));
        swal("Failed", "Medicine Update Failed","fail");
        
      }
        });
        
        
      } catch (error) {
        console.log("error in updating blog : ", error);
      }
    </script>

    <script>
      async function renderBlogDetails() {
        try {
          const res = await fetch(`${windows.location.origin}`);
        } catch (error) {
          console.error("Error fetching pharmacies :", error);
          document.getElementById("createBlog").innerHTML =
            "<p>Error in loading Blog details</p>";
        }
      }
    </script>


    <script>
      const websiteUrlInput = document.getElementById("websiteUrl");
      const urlError = document.getElementById("urlError");

      function validateWebsiteUrl() {
        const value = websiteUrlInput.value.trim();
        console.log(value);
        const urlPattern =
          /^(https?:\/\/)?([a-z0-9-]+\.)+[a-z]{2,}(:\d+)?(\/.*)?$/i;

        const isValid = urlPattern.test(value);
        urlError.style.display = isValid ? "none" : "block";
        return isValid;
      }

      websiteUrlInput.addEventListener("input", validateWebsiteUrl);
    </script>

</html>
