{header}
<body class="signup">
    <header>
        <nav class="nav">
        <a class="logo" href="/">
            <img class="logopic" src="/logo/logo.svg" alt="logo">
            <p class="logoname">PharmaNet</p>
        </a>
    </nav>

    </header>
    <div class = "container">
    <div class = "signupImage">
        <img src="/signup/signup.jpg" alt="signup image">
        <div class="signupText">"Take Control of Your Medication Journey"</div>
    </div>
    <div class = "signupForm" >
    <form autocomplete="off"  id="form" class="signup" autocomplete="off" action="/signup" method="post" novalidate aria-autocomplete="none" >
     
    <h1 class="signupTitle">Get Start Now</h1>
    <p class="signupMoto" >Your Digital Journey To Seamless Prescriptions, Smarter Inventory, And Happier Patients Begins Here.</p>
    <div class="nameFields">
    
    <div>
    <label for="fName">First Name</label><br>
    <input type="text" id="fName" name="firstName" placeholder="Chathura" required/><br>
    <span id="feedbackname" ></span><br>
    </div>

    <div>
    <label for="lName">Last Name</label><br>
    <input type="text" value="" id="lName" name="lastName" placeholder="Priyashan" required/><br>
    <span id="feedbackname"></span><br>
    </div>     

    </div>
   
    <label for="email">Email</label><br>
    <input type="text" id="email" name="email" placeholder="Example@Gmail.com" required/><br>
    <span id="feedbackEmail"></span><br>
    
    <label for="birthDay">BirthDay</label><br>
    <input type="date" id="birthDay" name="dateOfBirth" placeholder="2003/07/11" required/><br>
    <span id="feedbackdateOfBirth"></span><br>

    <label for="nic">National Identification Number(NIC)</label><br>
    <input type="text" id="nic" name="nic" placeholder="200412309889" required/><br>
    <span id="feedbackNic"></span><br>
    
    <label for="password">Password</label><br>
    <input type="password" id="password" name="password" placeholder="********" required/><br>
    <span id="feedbackPassword"></span><br>

    <label for="confirmPassword">Confirm Password</label><br>
    <input type="password" id="confirmPassword" name="conformPassword" placeholder="********" required/><br>
    <span id="feedbackPassword"></span><br>
    
    <span id="form-error" class="utility-error"></span>
    <button type="submit" id="submitButton">Create Account</button>
    <a type="submit" id="forgetPassword">Do you need any help ?</a><br>
    
    <div style="text-align: center;" class="links">
    <p>I Have An Account
        <a href="/login"  class="logInButton" >Log In</a>
    </p>
    </div>


  </form>
  
    </div>
    </div>
    
        


      
    </header>  
<!--     
    <div class="congrats">
        Welcome to <span>Pharmanet</span>
    </div> -->



    <script>
        try{

        
            let clearToSubmit = true;
            
            const birthDay = document.getElementById('birthDay');
            const birthDayFeedback = document.getElementById('feedbackdateOfBirth');
            const submit_btn = document.getElementById('submitButton');
            const form = document.getElementById('form');
            // form.addEventListener('submit' , (e)=>e.preventDefault());
            birthDay.addEventListener('change' , ()=>{
            const age = (new Date(Date.now()).getFullYear() - new Date(birthDay.value).getFullYear());

            if(age < 16){
                birthDay.classList.remove('utility-success');
                birthDay.classList.add('utility-warn');
                birthDayFeedback.textContent = "Sorry! This feature is only available for users aged 16 or above.";
                clearToSubmit = clearToSubmit && false;
                console.log('from date');
                return;
            }else{
                birthDay.classList.add('utility-success');
                birthDay.classList.remove('utility-warn');
                birthDayFeedback.textContent = '';
                clearToSubmit = clearToSubmit && true;
            }
        })


        form.addEventListener('submit' ,async (e)=>{
            try{
                e.preventDefault(e);
                e.stopPropagation();
                clearToSubmit = true;
                document.getElementById('form-error').textContent = '';

                form.querySelectorAll('input').forEach(el=>{
                    console.log(el.value);
                    if(el?.hasAttribute('required') && el.value=='' ){
                        el?.classList.remove('utility-success');
                        el?.classList.add('utility-warn');
                        document.getElementById('form-error').textContent ="Oops! It looks like some fields are missing 😝. Please fill out the form before submitting.";
                        clearToSubmit = false;
                        return;
                    }

                    // First Name validation
                    if(el?.id == "fName"){
                        const value = el?.value.trim();
                        if(value.length < 2){
                            el.classList.remove('utility-success');
                            el.classList.add('utility-warn');
                            document.getElementById('feedbackname').textContent = 'First name must be at least 2 characters.';
                            clearToSubmit = false;
                        } else {
                            el.classList.add('utility-success');
                            el.classList.remove('utility-warn');
                            document.getElementById('feedbackname').textContent = '';
                        }
                        return;
                    }

                    // Last Name validation
                    if(el?.id == "lName"){
                        const value = el?.value.trim();
                        if(value.length < 2){
                            el.classList.remove('utility-success');
                            el.classList.add('utility-warn');
                            document.getElementById('feedbackname').textContent = 'Last name must be at least 2 characters.';
                            clearToSubmit = false;
                        } else {
                            el.classList.add('utility-success');
                            el.classList.remove('utility-warn');
                            document.getElementById('feedbackname').textContent = '';
                        }
                        return;
                    }

                    // Email validation
                    if(el?.id == "email"){
                        const value = el?.value;
                        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                        if(emailRegex.test(value)){
                            el.classList.remove('utility-warn');
                            el.classList.add('utility-success');
                            document.getElementById('feedbackEmail').textContent = '';
                        } else {
                            el.classList.remove('utility-success');
                            el.classList.add('utility-warn');
                            document.getElementById('feedbackEmail').textContent = 'Please enter a valid email address (e.g., example@gmail.com).';
                            clearToSubmit = false;
                        }
                        return;
                    }

                    // Birth Date validation
                    if(el?.id == "birthDay"){
                        const age = (new Date(Date.now()).getFullYear() - new Date(el.value).getFullYear());
                        if(age < 16){
                            el.classList.remove('utility-success');
                            el.classList.add('utility-warn');
                            document.getElementById('feedbackdateOfBirth').textContent = "Sorry! This feature is only available for users aged 16 or above.";
                            clearToSubmit = false;
                        } else {
                            el.classList.add('utility-success');
                            el.classList.remove('utility-warn');
                            document.getElementById('feedbackdateOfBirth').textContent = '';
                        }
                        return;
                    }

                    // NIC validation
                    if(el?.id == "nic"){
                        const value = el?.value;
                        const nicRegex = /^(\d{12}|\d{10}[Vv])$/;
                        if(nicRegex.test(value)){
                            el.classList.remove('utility-warn');
                            el.classList.add('utility-success');
                            document.getElementById('feedbackNic').textContent = '';
                        } else {
                            el.classList.remove('utility-success');
                            el.classList.add('utility-warn');
                            document.getElementById('feedbackNic').textContent = 'Invalid NIC format. Must be 12 digits or 10 digits followed by V/v.';
                            clearToSubmit = false;
                        }
                        return;
                    }

                    // Password validation
                    if(el?.id == "password"){
                        const value = el?.value;
                        if(value.length < 8){
                            el.classList.remove('utility-success');
                            el.classList.add('utility-warn');
                            document.getElementById('feedbackPassword').textContent = 'Password must be at least 8 characters long.';
                            clearToSubmit = false;
                        } else {
                            el.classList.add('utility-success');
                            el.classList.remove('utility-warn');
                            document.getElementById('feedbackPassword').textContent = '';
                        }
                        return;
                    }

                    // Confirm Password validation
                    if(el?.id == "confirmPassword"){
                        const value = el?.value;
                        const password = document.getElementById('password').value;
                        if(value.length < 8){
                            el.classList.remove('utility-success');
                            el.classList.add('utility-warn');
                            document.getElementById('feedbackPassword').textContent = 'Password must be at least 8 characters long.';
                            clearToSubmit = false;
                        } else if(value !== password){
                            el.classList.remove('utility-success');
                            el.classList.add('utility-warn');
                            document.getElementById('feedbackPassword').textContent = 'Passwords do not match.';
                            clearToSubmit = false;
                        } else {
                            el.classList.add('utility-success');
                            el.classList.remove('utility-warn');
                            document.getElementById('feedbackPassword').textContent = '';
                        }
                        return;
                    }
                })
                
                if(!clearToSubmit) {
                    Swal.fire({
                        icon:"error",
                        title:"Invalid Form Data",
                        body:"Please check all fields and try again.",
                    })
                    return;
                }

                const data = {};
                const formData = new FormData(form);
                for(const [key , value] of formData.entries()){
                    data[key] = value;
                }
                
                console.log({clearToSubmit, data});
                const respond = await fetch("/signup" , {
                    method:"POST",
                    headers:{
                        "Content-Type" : "application/json",
                    },
                    body : JSON.stringify(data),
                });
                

                const result = await respond.json();
                console.log(result , respond);



                if(result.status != "success" ) {
                    if(result.field == "email") {
                        document.getElementById('feedbackEmail').textContent = "Oops! It looks like this email is already registered. Try logging in instead.";
                        document.getElementById('email').classList.add('utility-warn');
                        document.getElementById('email').classList.remove('utility-success');
                    }else if(result.field == "nic"){
                        document.getElementById('feedbackNic').textContent = "Oops! It looks like this nic is already registered. Try logging in instead.";
                        document.getElementById('nic').classList.add('utility-warn');
                        document.getElementById('nic').classList.remove('utility-success');
                    }else{
                        Swal.fire({
                            icon:"error",
                            title:"Internal Server Error",
                            body:'Please try again',
                        })
                    }
                    
                    // throw new Error(result.message)
                }else{
                    // document.body.classList.add('success');
                    console.log(result);
                    Swal.fire({
                        icon:"success",
                        title:"Account Created Successfully",
                    }).then(()=>{
                        window.location.href = `/verify/${result.results.id}/email`;
                    })

                    setTimeout(()=>{
                        window.location.href = `/verify/${result.results.id}/email`;
                    } , 3000)
                    
                }

                
            }catch(error){
                console.error(error);
                Swal.fire({
                    icon: "error",
                    title: "Something Went Wrong",
                    text: error.message || 'Please try again',
                    footer: '<a href="/contactus">Why do I have this issue?</a>'
                }); 
            }
            


            
        })

    }catch(e){
        console.error(e);
        Swal.fire({
            icon: "error",
            title: "Something Went Wrong",
            text: e.message || 'Please refresh the page and try again',
            footer: '<a href="/contactus">Why do I have this issue?</a>'
        });    
    }



    </script>

</body>
</html>
