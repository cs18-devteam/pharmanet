{header}
<body  class="addPharmarcy04">

  

  <div class="registration-container">
    <header>
      <img class="logopic" src="/logo/logo.svg" alt="logo">
      <h1>PharmaNet</h1>
      <p>Register your pharmacy to get started</p>
    </header>

    <div class="steps">
      <div class="step">
        <div class="circle">1</div>
        <span>Pharmacy Details</span>
      </div>
      <div class="step">
        <div class="circle">2</div>
        <span>Owner Information</span>
      </div>
      <div class="step">
        <div class="circle">3</div>
        <span>Location</span>
      </div>
      <div class="step active">
        <div class="circle">4</div>
        <span>Pharmacist & Services</span>
      </div>
    </div>

    <div class="form-card">
      <div class="card-header">
        <i class="fa-solid fa-building-columns"></i>
        <span>Pharmacist & Services</span>
        <p>Add pharmacist details and service information</p>
      </div>

      <form id="form">
        <div class="form-row">
          <label>Head Pharmacist Name *</label>
          <input type="text"  name="pharmacist" placeholder="Enter pharmacist name" required>
          <p></p>
        </div>

        <div class="form-row">
          <label>Pharmacist License Number *</label>
          <input type="text" name="pharmacistLicense" placeholder="Eg: RPH-2024-001" required>
          <p></p>
        </div>

        <div class="form-row">
          <label>Primary Service Type *</label>
          <select name="type" value="{type}" required>
            <option >Select service type</option>
            <option value="retail">Retail Pharamarcy</option>
            <option value="hospital">Hospital Pharamarcy</option>
            <option value="clinical">Clinical Pharamrcy</option>
            <option value="mail">Mail Pharamrcy</option>
            <p></p>
          </select>
        </div>

        <div class="form-buttons">
        <a href="/admin/pharmacy/step/3"><button type="button" class="btn prev btn-previous">Previous</button></a>
         <button type="button" class="btn btn-submit submit">Next
          <img class="spinner" src="/logo/spinner.png"/>
         </button>
        </div>
      </form>
    </div>

    <footer>
      Need help? <a href="#">Contact support</a>
    </footer>
  </div>

  <script>
    // import "/js/utilities/Popup.js";
// import Notify from "/js/view/Notify.js";
try{

    const form = document.getElementById('form');
    const btn_submit = document.querySelector('.btn-submit');

    const data = JSON.parse(localStorage.getItem('pharmacy')) || {};
    console.log(data);
    for(const [key,value] of Object.entries(data)){
      const field = document.querySelector(`[name='${key}']`);
      if(field){
        field.value = value;
      }
    }



    btn_submit.addEventListener('click' , (e)=>{
      e.preventDefault();
      const formData = new FormData(form);

      for( const [key , value] of formData.entries()){
        const field = document.querySelector(`[name='${key}']`);

        if(/[^A-Za-z0-9 ]/.test(value)){
          field.classList.remove('utility-success');
          field.classList.add('utility-warn');
          field.parentElement.querySelector('p').textContent = "letters and numbers are only allowed";
          return;
        }
        if(key=="pharmacist" && /[^A-Za-z ]/.test(value)){
          field.classList.remove('utility-success');
          field.classList.add('utility-warn');
          field.parentElement.querySelector('p').textContent = "letters are only allowed";
          return;
        }

        
        if(!value){
          field.classList.add('utility-warn');
          field.classList.remove('utility-success');
          console.log(field);
          return;
        }else{
          field.classList.add('utility-success');
          field.classList.remove('utility-warn');
        }
        data[key] = value;
      }
      
      //save to storage
      const previous = JSON.parse(localStorage.getItem('pharmacy'));
      if(!previous) window.location.href = "/admin/pharmacy/step/3";
      localStorage.setItem("pharmacy" , JSON.stringify({...previous , ...data }));

      fetch("/admin/pharmacy/create" , {
        method:"POST",
        body: localStorage.getItem("pharmacy"),
      }).then(data=>data.json()).then(data=>{
        if(data.status == "error"){
          throw new Error(data.message);
          return;
        }
        
        if(typeof (data?.[0]) == "object"){
          localStorage.setItem('pharmacy' , JSON.stringify({}));
          Swal.fire({
              title: "Pharmacy Created Successfully",
              icon: "success",
              draggable: true
          }).then(()=>{
            window.location.href = "/admin/pharmacy";
          });
          // Notify.showSuccess('/admin/pharmacy');
          

        }
      }).catch(e=>{
        console.log(e);
        Swal.fire({
        icon: "error",
        title: "something went wrong",
        text: e.message,
        footer: '<a href="/contactus">Why do I have this issue?</a>'
    }); 

        

      }).finally(()=>{
        console.log(localStorage.getItem("pharmacy"))
      });      
    });

    }catch(e){
      console.log(e);
      Swal.fire({
        icon: "error",
        title: "something went wrong",
        text: e.message,
        footer: '<a href="/contactus">Why do I have this issue?</a>'
    }); 
    }
  </script>


</body>
</html>
