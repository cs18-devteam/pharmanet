<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Admin — Manage Transactions</title>
<style>
	:root{
		--green:#2ecc71; --yellow:#f1c40f; --orange:#e67e22;
		--bg:#fbfdf9; --card:#fff; --muted:#f6f7f8; --text:#222; --radius:10px;
		font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial;
	}
	html,body{height:100%;margin:0;background:linear-gradient(180deg,var(--bg),#fff);color:var(--text)}
	.wrapper{max-width:1200px;margin:24px auto;padding:18px;display:flex;flex-direction:column;gap:12px}
	.header{display:flex;justify-content:space-between;align-items:center}
	.logo{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,var(--green),var(--orange));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800}
	.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
	input,select{padding:9px 10px;border-radius:8px;border:1px solid #eee;background:white}
	.btn{padding:9px 12px;border-radius:8px;border:0;cursor:pointer;font-weight:700}
	.btn-primary{background:linear-gradient(90deg,var(--green),#21b76a);color:#fff}
	.btn-ghost{background:transparent;border:1px solid #eee}
	.card{background:var(--card);border-radius:var(--radius);padding:14px;box-shadow:0 10px 28px rgba(20,30,40,0.06)}
	.table-wrap{overflow:auto}
	table{width:100%;border-collapse:collapse;margin-top:12px}
	th,td{padding:10px 12px;border-bottom:1px solid #f3f5f6;text-align:left}
	th{font-size:13px;color:#555}
	.tag{display:inline-block;padding:6px 8px;border-radius:999px;font-weight:700;color:#fff;font-size:12px}
	.tag-success{background:var(--green)}
	.tag-warn{background:var(--yellow);color:#222}
	.tag-danger{background:var(--orange)}
	.empty{padding:28px;text-align:center;color:#666}
	.overlay{position:fixed;inset:0;background:rgba(10,12,14,0.45);display:none;align-items:center;justify-content:center;z-index:80}
	.overlay.open{display:flex}
	.modal{background:var(--card);border-radius:12px;padding:16px;max-width:760px;width:96%;box-shadow:0 20px 48px rgba(10,12,14,0.3);max-height:90vh;overflow:auto}
	.meta{color:#666;font-size:13px}
	.toast{position:fixed;right:20px;bottom:20px;background:#111;color:#fff;padding:10px 12px;border-radius:10px;display:none;align-items:center;gap:10px;z-index:90}
	.toast.show{display:flex}
	.undo{background:transparent;border:1px solid rgba(255,255,255,0.2);color:#fff;padding:6px 8px;border-radius:8px;cursor:pointer}
	.row-actions{display:flex;gap:8px;justify-content:center}
	@media (max-width:900px){ .controls{flex-direction:column;align-items:stretch} table{font-size:13px} }
</style>
</head>
<body>
	<div class="wrapper">
		<div class="header">
			<div style="display:flex;gap:12px;align-items:center">
				<div class="logo">ADM</div>
				<div>
					<div style="font-weight:800">Admin — Transactions</div>
					<div class="meta" style="font-size:13px">View, read and cancel or refund transactions</div>
				</div>
			</div>

			<div class="controls">
				<button id="export" class="btn btn-ghost">Export CSV</button>
				<button id="refresh" class="btn btn-primary">Refresh</button>
			</div>
		</div>

		<div class="card">
			<div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap">
				<input id="q" placeholder="Search txn id, customer, item..." style="min-width:260px"/>
				<select id="status">
					<option value="">All statuses</option>
					<option value="completed">Completed</option>
					<option value="pending">Pending</option>
					<option value="refunded">Refunded</option>
				</select>
				<input id="from" type="date" />
				<input id="to" type="date" />
				<div style="flex:1"></div>
				<button id="clear" class="btn btn-ghost">Clear</button>
			</div>

			<div id="table-wrap" class="table-wrap">
				<table aria-describedby="txn-desc">
					<thead>
						<tr>
							<th>Date</th><th>Txn ID</th><th>Customer</th><th>Items</th><th>Total</th><th>Status</th><th style="width:160px;text-align:center">Actions</th>
						</tr>
					</thead>
					<tbody id="body"></tbody>
				</table>
				<div id="empty" class="empty" style="display:none">No transactions found.</div>
			</div>
		</div>
	</div>

	<!-- detail modal -->
	<div id="overlay" class="overlay" aria-hidden="true">
		<div class="modal" role="dialog" aria-modal="true">
			<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
				<div>
					<div id="m-title" style="font-weight:800;font-size:16px">Transaction</div>
					<div id="m-desc" class="meta"></div>
				</div>
				<div style="display:flex;gap:8px;align-items:center">
					<button id="m-refund" class="btn btn-ghost">Refund</button>
					<button id="m-cancel" class="btn btn-danger">Cancel</button>
					<button id="m-close" class="btn btn-ghost">Close</button>
				</div>
			</div>

			<div style="display:flex;gap:18px;flex-wrap:wrap">
				<div style="flex:1">
					<div class="meta"><strong>Customer:</strong> <span id="m-customer"></span></div>
					<div class="meta"><strong>Payment:</strong> <span id="m-payment"></span></div>
					<div class="meta"><strong>Total:</strong> <span id="m-total"></span></div>
					<div class="meta"><strong>Status:</strong> <span id="m-status"></span></div>
				</div>
				<div style="min-width:220px">
					<div style="font-weight:700;margin-bottom:6px">Items</div>
					<pre id="m-items" class="meta" style="white-space:pre-wrap"></pre>
				</div>
			</div>
		</div>
	</div>

	<!-- undo toast -->
	<div id="toast" class="toast" role="status" aria-live="polite" >
		<div id="toast-text">Action</div>
		<button id="toast-undo" class="undo">Undo</button>
	</div>

<script>
(() => {
	const body = document.getElementById('body');
	const empty = document.getElementById('empty');
	const q = document.getElementById('q');
	const statusEl = document.getElementById('status');
	const fromEl = document.getElementById('from');
	const toEl = document.getElementById('to');
	const clearBtn = document.getElementById('clear');
	const exportBtn = document.getElementById('export');
	const refreshBtn = document.getElementById('refresh');

	const overlay = document.getElementById('overlay');
	const mTitle = document.getElementById('m-title');
	const mDesc = document.getElementById('m-desc');
	const mCustomer = document.getElementById('m-customer');
	const mPayment = document.getElementById('m-payment');
	const mTotal = document.getElementById('m-total');
	const mStatus = document.getElementById('m-status');
	const mItems = document.getElementById('m-items');
	const mRefund = document.getElementById('m-refund');
	const mCancel = document.getElementById('m-cancel');
	const mClose = document.getElementById('m-close');

	const toast = document.getElementById('toast');
	const toastText = document.getElementById('toast-text');
	const toastUndo = document.getElementById('toast-undo');

	let transactions = loadTxns();
	let lastAction = null;
	let undoTimer = null;

	function loadTxns(){
		try {
			const raw = localStorage.getItem('pharm_txns');
			if(raw) return JSON.parse(raw);
		} catch(e){}
		// seed
		return [
			{ id:'t1', date:'2025-01-15', txn:'TXN-1001', customer:'Alice J', items:['Paracetamol x2','Vitamin D x1'], total:7.00, payment:'Card', status:'completed' },
			{ id:'t2', date:'2025-02-09', txn:'TXN-1002', customer:'Bob K', items:['Amoxicillin x1'], total:4.75, payment:'Cash', status:'completed' },
			{ id:'t3', date:'2025-02-20', txn:'TXN-1003', customer:'Carol M', items:['Ibuprofen x3'], total:9.75, payment:'Card', status:'pending' },
			{ id:'t4', date:'2025-03-01', txn:'TXN-1004', customer:'Dave R', items:['Hydrocortisone x1'], total:6.50, payment:'Card', status:'refunded' }
		];
	}

	function saveTxns(){ try { localStorage.setItem('pharm_txns', JSON.stringify(transactions)); } catch(e){} }

	function tagFor(status){
		if(status === 'completed') return '<span class="tag tag-success">Completed</span>';
		if(status === 'pending') return '<span class="tag tag-warn">Pending</span>';
		return '<span class="tag tag-danger">Refunded</span>';
	}

	function render(){
		body.innerHTML = '';
		const qv = (q.value || '').trim().toLowerCase();
		const statusFilter = statusEl.value;
		const from = fromEl.value;
		const to = toEl.value;
		const list = transactions.filter(t => {
			if(statusFilter && t.status !== statusFilter) return false;
			if(from && t.date < from) return false;
			if(to && t.date > to) return false;
			if(!qv) return true;
			return (t.txn + ' ' + t.customer + ' ' + t.items.join(' ')).toLowerCase().includes(qv);
		});
		if(list.length === 0){ empty.style.display = 'block'; return; }
		empty.style.display = 'none';
		list.forEach(t => {
			const tr = document.createElement('tr');
			tr.innerHTML = `
				<td>${t.date}</td>
				<td><a href="#txn:${t.id}" data-id="${t.id}" style="text-decoration:none;color:inherit">${t.txn}</a></td>
				<td>${escapeHtml(t.customer)}</td>
				<td>${escapeHtml(t.items.join(', '))}</td>
				<td>$${(t.total||0).toFixed(2)}</td>
				<td>${tagFor(t.status)}</td>
				<td style="text-align:center" class="row-actions">
					<button class="btn btn-ghost" data-act="view" data-id="${t.id}">View</button>
					<button class="btn btn-ghost" data-act="refund" data-id="${t.id}" ${t.status==='refunded' ? 'disabled' : ''}>Refund</button>
					<button class="btn btn-danger" data-act="cancel" data-id="${t.id}" ${t.status==='refunded' ? 'disabled' : ''}>Cancel</button>
				</td>
			`;
			body.appendChild(tr);
		});
	}

	function escapeHtml(s=''){ return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

	function openDetail(id){
		const t = transactions.find(x=>x.id===id);
		if(!t) return;
		mTitle.textContent = t.txn;
		mDesc.textContent = t.date;
		mCustomer.textContent = t.customer;
		mPayment.textContent = t.payment;
		mTotal.textContent = '$' + (t.total||0).toFixed(2);
		mStatus.innerHTML = tagFor(t.status);
		mItems.textContent = t.items.join('\n');
		mRefund.dataset.id = t.id;
		mCancel.dataset.id = t.id;
		overlay.classList.add('open'); overlay.setAttribute('aria-hidden','false');
	}

	function closeDetail(){
		overlay.classList.remove('open'); overlay.setAttribute('aria-hidden','true');
		if(location.hash.startsWith('#txn:')) history.replaceState(null,'',location.pathname + location.search);
	}

	function doChangeStatus(id, newStatus, label){
		const idx = transactions.findIndex(x=>x.id===id);
		if(idx === -1) return;
		const prev = JSON.parse(JSON.stringify(transactions[idx]));
		transactions[idx].status = newStatus;
		saveTxns();
		render();
		lastAction = { type:'status', id, prev };
		showToast(`${label} applied to ${prev.txn}`, true);
	}

	function showToast(text, allowUndo=false){
		toastText.textContent = text;
		toast.classList.add('show');
		toastUndo.style.display = allowUndo ? 'inline-block' : 'none';
		if(undoTimer) clearTimeout(undoTimer);
		undoTimer = setTimeout(()=>{ hideToast(); lastAction = null; }, 6000);
	}
	function hideToast(){ toast.classList.remove('show'); if(undoTimer){ clearTimeout(undoTimer); undoTimer = null; } }

	// delegation for table actions & links
	document.getElementById('table-wrap').addEventListener('click', (e) => {
		const btn = e.target.closest('button');
		if(btn){
			const act = btn.dataset.act;
			const id = btn.dataset.id;
			if(act === 'view') openDetail(id);
			if(act === 'refund' && confirm('Mark transaction as refunded?')) doChangeStatus(id, 'refunded', 'Refund');
			if(act === 'cancel' && confirm('Cancel this transaction?')) doChangeStatus(id, 'cancelled', 'Cancel');
		}
		const link = e.target.closest('a[data-id]');
		if(link){ const id = link.dataset.id; location.hash = '#txn:' + id; }
	});

	// overlay controls
	mClose.addEventListener('click', closeDetail);
	mRefund.addEventListener('click', (e) => { const id = e.currentTarget.dataset.id; if(id && confirm('Mark transaction as refunded?')){ doChangeStatus(id,'refunded','Refund'); closeDetail(); } });
	mCancel.addEventListener('click', (e) => { const id = e.currentTarget.dataset.id; if(id && confirm('Cancel this transaction?')){ doChangeStatus(id,'cancelled','Cancel'); closeDetail(); } });

	// toast undo
	toastUndo.addEventListener('click', () => {
		if(!lastAction) return;
		if(lastAction.type === 'status'){
			const idx = transactions.findIndex(x=>x.id===lastAction.id);
			if(idx !== -1){
				transactions[idx] = lastAction.prev;
				saveTxns(); render();
				showToast(`Action undone for ${lastAction.prev.txn}`, false);
			}
		}
		lastAction = null; hideToast();
	});

	// filters/events
	[q,statusEl,fromEl,toEl].forEach(el => el.addEventListener('input', render));
	clearBtn.addEventListener('click', ()=>{ q.value=''; statusEl.value=''; fromEl.value=''; toEl.value=''; render(); });
	refreshBtn.addEventListener('click', ()=>{ transactions = loadTxns(); render(); showToast('Refreshed', false); });

	// CSV export
	exportBtn.addEventListener('click', ()=> {
		const rows = [['date','txn','customer','items','total','payment','status']];
		transactions.forEach(t => rows.push([t.date,t.txn,t.customer,t.items.join('|'),t.total,t.payment,t.status]));
		const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
		const blob = new Blob([csv], {type:'text/csv'}); const url = URL.createObjectURL(blob);
		const a = document.createElement('a'); a.href = url; a.download = 'transactions.csv'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
	});

	// hash routing for detail view
	window.addEventListener('hashchange', ()=> {
		const h = location.hash || '';
		if(h.startsWith('#txn:')) openDetail(h.split(':')[1]);
		else closeDetail();
	});

	// initial render
	render();

	// expose for debug
	window.__admin_txns = { transactions, render, loadTxns, saveTxns };
})();
</script>
</body>
</html>
