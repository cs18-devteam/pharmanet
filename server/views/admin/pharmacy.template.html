    <style>
      /* Image popup styles */
      .image-popup {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.8);
        z-index: 9999;
        justify-content: center;
        align-items: center;
      }
      
      .image-popup.active {
        display: flex;
      }
      
      .popup-content {
        display: flex;
        align-items: center;
        flex-direction: column;
        justify-content: center;
        position: relative;
        max-width: 90%;
        max-height: 90%;
        background: white;
        padding: 20px;
        border-radius: 8px;
      }
      .popup-content .accept-Btn{
        background-color: green;
        border-radius: 0.5rem;
        border: none;
        color: white;
        margin-top: 0.5rem;
    
        }
      .popup-content img {
        max-width: 90%;
        max-height: 75vh;
        padding-top: 0.5rem;
      }
      
      .close-popup {
        position: absolute;
        top: 10px;
        right: 10px;
        background: #ff4444;
        color: white;
        border: none;
        padding: 10px 15px;
        cursor: pointer;
        border-radius: 4px;
        font-size: 18px;
      }
      
      .close-popup:hover {
        background: #cc0000;
      }
    </style>

  <script>
    const pathParts = window.location.pathname.split('/');
    const adminIdIndex = pathParts.indexOf('admin') + 1;
    const adminId = pathParts[adminIdIndex];
   

    async function renderPharmacies(){
      try{
      const res = await fetch(`${window.location.origin}/api/v1/admin/${adminId}/pharmacies`);
      const pharmacies = await res.json();
      
      
      if(!Array.isArray(pharmacies) || pharmacies.length === 0) return;

      const html = pharmacies.map(p =>{
      const isActive = Number(p.status) === 1;
      return`
      <a href = "/admin/${adminId}/pharmacies/${p.id}/viewPharmacy">
       <div class = "pharmacy-card">
        <div class="header">
          <h3>${p.name} ${isActive? `<span class="status inactive">active</span>` : `<span class="status inactive">inactive</span>`}</h3>
          <button class="menu-btn">⋮</button>
        </div>
        <p>Manager: ${p.pharmacist || 'N/A'}</p>
        <ul class="details">
          <li><span class="address"></span>${p.street || 'N/A'}, ${p.town || ''}, ${p.province || ''}</li>
          <li><span class="email"></span> ${p.email || 'N/A'}</li>
          <li><span class="telephoneNo"></span> ${p.contact || 'N/A'}</li>
        </ul>
        <hr>
        <div class= "pharmacyCardFooter">
          <!-- <p>Inventory: <strong>N/A</strong></p> -->
          <button class="details-btn" data-img="${p.ownerDoc}" data-name="${p.name || ''}" data-id="${p.id}" }">View Owner Document</button>
          <button class="details-btn" data-img="${p.addressDoc}" data-name="${p.name || ''}" data-id="${p.id}" data-status="${isActive ? '1' : '0'}">View Address Document</button>
          <button class="details-btn" data-img="${p.img}" data-name="${p.name || ''}" data-id="${p.id}" data-status="${isActive ? '1' : '0'}">View License</button>

           ${isActive 
            ? `<button class="deactivate-Btn" data-id="${p.id}">Deactivate</button>` 
            : `<button class="activate-Btn" data-id="${p.id}">Activate</button>`}
        </div>
      </div></a>`}).join('');
      document.querySelector('.pharmacy-grid').innerHTML = html;

      
      
    }catch (error) {
      console.error('Error fetching pharmacies : ', error);
      document.querySelector('.pharmacy-grid').innerHTML = "<p>Error loading pharmacies.</p>";
    }

  }
    renderPharmacies();
  </script>


  <script>
  // image popup helpers
  function openImagePopup(fileUrl, pharmacyName, status) {
    if (!fileUrl) {
      alert('No files available for this pharmacy.');
      return;
    }
    const popup = document.getElementById('imagePopup');
    const img = document.getElementById('popupImage');
    const pdf = document.getElementById('popupPdf');
    const name = document.getElementById('popupPharmacyName');
    // const acceptBtn = document.getElementById('accept-Btn');

    let normalized = String(fileUrl).trim();
  normalized = normalized.replace(/^(\.\.\/)+/, '/');
  if (!normalized.startsWith('/')) normalized = '/' + normalized;

  const safeUrl = encodeURI(normalized);

  // detect pdf even with query/hash
  const isPdf = /\.pdf(\?|#|$)/i.test(safeUrl);

  // reset visibility
  img.style.display = 'none';
  pdf.style.display = 'none';
  img.src = '';
  pdf.src = '';

  if (isPdf) {
    pdf.src = safeUrl;
    pdf.style.display = 'block';
  } else {
    img.src = safeUrl;
    img.style.display = 'block';
  }

  // acceptBtn.style.display = Number(status) === 1 ? 'none' : 'flex';
  name.textContent = (pharmacyName || '').toUpperCase();
  popup.classList.add('active');
  }

  function closeImagePopup() {
    const popup = document.getElementById('imagePopup');
    const img = document.getElementById('popupImage');
    const pdf = document.getElementById('popupPdf');
    img.src = '';
    pdf.src = '';
    img.style.display = 'none';
    pdf.style.display = 'none';
    popup.classList.remove('active');
  }


  let selectedPharmacyId = null;
  // delegate click for dynamically created buttons
  document.addEventListener('click', function (e) {
    const btn = e.target.closest('.details-btn');
    if (!btn) return;
    e.preventDefault(); // prevent <a> navigation
    const imgUrl = btn.getAttribute('data-img');
    const name = btn.getAttribute('data-name');
    const status = btn.getAttribute('data-status');
    selectedPharmacyId = btn.getAttribute('data-id');
    openImagePopup(imgUrl, name, status);
  });

  <script>
  document.addEventListener('click', async function (e) {
  const deactivateBtn = e.target.closest('.deactivate-Btn');
  if (!deactivateBtn) return;

    if (!activateBtn && !deactivateBtn) return;
    e.preventDefault();

    const isActivate = !!activateBtn;
    const btn = activateBtn || deactivateBtn;
    const pharmacyId = btn.getAttribute('data-id');

    if (!pharmacyId) {
      swal("Error", "Pharmacy ID not found.", "error");
      return;
    }

    const confirmed = await swal({
      title: isActivate
        ? "Are you sure you want to activate this Pharmacy?"
        : "Are you sure you want to deactivate this Pharmacy?",
      icon: "/logo/logo.svg",
      buttons: {
        cancel: { text: "Cancel", visible: true },
        confirm: { text: "Ok", value: true }
      },
      dangerMode: false
    });

    if (!confirmed) {
      swal(
        "Declined",
        isActivate
          ? "Pharmacy Activation Declined"
          : "Pharmacy Deactivation Declined",
        "warning"
      );
      return;
    }

    try {
      const res = await fetch(
        `${window.location.origin}/api/v1/admin/${adminId}/pharmacies/${pharmacyId}`,
        {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            status: isActivate ? "1" : "0",
            id: pharmacyId
          })
        }
      );

      if (!res.ok) throw new Error("Request failed");

      swal(
        isActivate ? "Activated" : "Deactivated",
        isActivate
          ? "Pharmacy Activated Successfully"
          : "Pharmacy Deactivated Successfully",
        "success"
      );

      renderPharmacies();
    } catch (err) {
      console.error(err);
      swal("Error", "Failed to update pharmacy status.", "error");
    }
  });
</script>
  


  <script>
  //Search filter
  document.getElementById('searchInput').addEventListener('keyup', function () {
  const filter = this.value.toLowerCase(); // what user types
  const rows = document.querySelectorAll('.pharmacy-card');

  rows.forEach(row => {
    const text = row.textContent.toLowerCase();
    if (text.includes(filter)) {
      row.style.display = ''; // show row
    } else {
      row.style.display = 'none'; // hide row
    }
  });
});
  </script>
