<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PharmaNet Registration</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body  class="addPharmarcy03">

  <div class="registration-container">
    <header>
      <img class="logopic" src="/public/logo/logo.svg" alt="logo">
      <h1>PharmaNet</h1>
      <p>Register your pharmacy to get started</p>
    </header>

    <div class="steps">
      <div class="step">
        <div class="circle">1</div>
        <span>Pharmacy Details</span>
      </div>
      <div class="step">
        <div class="circle">2</div>
        <span>Owner Information</span>
      </div>
      <div class="step  active">
        <div class="circle">3</div>
        <span>Location</span>
      </div>
      <div class="step">
        <div class="circle">4</div>
        <span>Pharmacist & Services</span>
      </div>
    </div>

    <div class="form-card">
      <div class="card-header">
        <i class="fa-solid fa-location-dot"></i>
        <span>Location Information</span>
        <p>Enter your pharmacy location</p>
      </div>

      <form>
        <div class="form-row">
          <label>Street Address *</label>
          <input type="text" placeholder="123 Main Street" required>
        </div>

        <div class="form-row two-cols">
          <div>
            <label>Province *</label>
            <input type="text" placeholder="Western" required>
          </div>
          <div>
            <label>District *</label>
            <!-- <input type="telephoneNo." placeholder="+94 78 141 3123" required> -->
             <select required>
              <option>Select 'District'</option>
              <option>Gampaha</option>
              <option>Colombo</option>
              <option>Kaluthara</option>
             </select>
          </div>
        </div>

        <div class="form-row two-cols">
          <div>
            <label>Zip Code *</label>
            <input type="text" placeholder="1001" required>
          </div>
          <div>
            <label>City *</label>
            <!-- <input type="telephoneNo." placeholder="+94 78 141 3123" required> -->
             <select required>
              <option>Select City</option>
              <option>Gampaha</option>
              <option>Colombo</option>
              <option>Kaluthara</option>
             </select>
          </div>
        </div>

        <div class="form-buttons">
         <a href="addPharmarcy02.html"><button type="button" class="btn prev">Previous</button></a>
          <a href="addPharmarcy04.html"><button type="button" class="btn next">Next</button></a>
        </div>
      </form>
    </div>

    <footer>
      Need help? <a href="#">Contact support</a>
    </footer>
  </div>

</body>
</html>
