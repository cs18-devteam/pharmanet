<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PharmaNet Registration</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body  class="addPharmarcy03">

  <div class="registration-container">
    <header>
      <img class="logopic" src="/public/logo/logo.svg" alt="logo">
      <h1>PharmaNet</h1>
      <p>Register your pharmacy to get started</p>
    </header>

    <div class="steps">
      <div class="step">
        <div class="circle">1</div>
        <span>Pharmacy Details</span>
      </div>
      <div class="step">
        <div class="circle">2</div>
        <span>Owner Information</span>
      </div>
      <div class="step  active">
        <div class="circle">3</div>
        <span>Location</span>
      </div>
      <div class="step">
        <div class="circle">4</div>
        <span>Pharmacist & Services</span>
      </div>
    </div>

    <div class="form-card">
      <div class="card-header">
        <i class="fa-solid fa-location-dot"></i>
        <span>Location Information</span>
        <p>Enter your pharmacy location</p>
      </div>

      <form id="form">
        <div class="form-row">
          <label>Street Address *</label>
          <input name="street" type="text" placeholder="123 Main Street" required>
        </div>

        <div class="form-row two-cols">
          <div>
            <label>Province *</label>
            <input name="province" type="text" placeholder="Western" required>
          </div>
          <div>
            <label>District *</label>
            <!-- <input type="telephoneNo." placeholder="+94 78 141 3123" required> -->
             <select name="town" required>
              <option>Select 'District'</option>
              <option value="gampaha">Gampaha</option>
              <option value="colombo">Colombo</option>
              <option value="kaluthara">Kaluthara</option>
             </select>
          </div>
        </div>

        <div class="form-row two-cols">
          <div>
            <label>Zip Code *</label>
            <input type="text" placeholder="1001" required>
          </div>
          <div>
            <label>City *</label>
            <!-- <input type="telephoneNo." placeholder="+94 78 141 3123" required> -->
             <select required>
              <option>Select City</option>
              <option>Gampaha</option>
              <option>Colombo</option>
              <option>Kaluthara</option>
             </select>
          </div>
        </div>

        <div class="form-buttons">
         <a href="/admin/pharmacy/edit/step/2"><button type="button" class="btn prev btn-previous">Previous</button></a>
          <button type="button" class="btn next btn-next">Next</button>
        </div>
      </form>
    </div>

    <footer>
      Need help? <a href="#">Contact support</a>
    </footer>
  </div>

  <script>
    const form = document.getElementById('form');
    const btn_next = document.querySelector('.btn-next');

    const data = {}
    btn_next.addEventListener('click' , (e)=>{
      e.preventDefault();
      const formData = new FormData(form);

      for( const [key , value] of formData.entries()){
        
        if(!value){
          document.querySelector(`[name=${key}]`).classList.add('utility-warn');
          document.querySelector(`[name="${key}"]`).classList.remove('utility-success');
          console.log(document.querySelector(`input[name=${key}]`));
          return;
        }else{
          document.querySelector(`[name="${key}"]`).classList.add('utility-success')
          document.querySelector(`[name="${key}"]`).classList.remove('utility-warn')
        }
        data[key] = value;
      }
      
      //save to storage
      const previous = JSON.parse(localStorage.getItem('pharmacy'));
      if(!previous) window.location.href = "/admin/pharmacy/{id}/edit/step/3";
      localStorage.setItem("pharmacy" , JSON.stringify({...previous , ...data }));

      window.location.href = "/admin/pharmacy/{id}/edit/step/4"
      




    })</script>

</body>
</html>
