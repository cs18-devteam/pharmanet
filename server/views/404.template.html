<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>404 | Page Not Found</title>

  <style>
    :root {
      --green: #1abc9c;
      --dark-green: #148f77;
      --light-green: #e8f8f5;
      --white: #ffffff;
      --gray: #555;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, var(--light-green), var(--white));
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page {
      padding: 60px 70px;
      border-radius: 18px;
      text-align: center;
      animation: fadeIn 1s ease;
      position: relative;
    }

    .icon {
      font-size: 52px;
      margin-bottom: 15px;
      animation: pulse 2s infinite;
    }

    h1 {
      font-size: 110px;
      color: var(--green);
      line-height: 1;
    }

    h2 {
      font-size: 26px;
      color: var(--dark-green);
      margin: 10px 0;
    }

    p {
      color: var(--gray);
      font-size: 15px;
      max-width: 420px;
      margin: 0 auto 30px;
    }

    a {
      display: inline-block;
      padding: 12px 28px;
      background: var(--green);
      color: var(--white);
      text-decoration: none;
      border-radius: 25px;
      font-weight: 600;
      transition: 0.3s ease;
    }

    a:hover {
      background: var(--dark-green);
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(26, 188, 156, 0.4);
    }

    /* Animations */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

  <div class="page">
    <div class="icon">🏥</div>
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>
      Sorry, the page you are looking for doesn’t exist
      or may have been moved.
    </p>
    <a href="/">Back to Home</a>
  </div>

</body>
</html>
