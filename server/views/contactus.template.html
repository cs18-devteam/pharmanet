<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <title>Contact Us || Pharmanet </title>
</head>
<body class="contact-us">
        <!--nav bar for all page-->
    <header>
    <nav>
        <a href="/index.html" class="logo">
            <img class="logopic" src="/public/logo/logo.svg" alt="logo">
            <p class="logoname">PharmaNet</p>
        </a>


        

        
    <div class="profile">
            <div class="profileName">
                <a href="">Chamani Niroshani</a>
                <div class="welcome">Welcome</div>
            </div>
            
            <div class="profilePic"><a href="/signup.html"><img src="/public/logo/profile_pic.jpg"></a>
            </div>
    </div>


    </nav>
        

    </header>



    <div class="container">
        <h1>Contact Us</h1>
        <form>
            <div>
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div>
                <label for="message">Message</label>
                <textarea  id="message" name="message" required>

                </textarea>
            </div>

            <button type="submit">Send Message</button>
        </form>
    </div>
</body>
</html>
