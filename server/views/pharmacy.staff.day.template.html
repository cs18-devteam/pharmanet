<popup-open for="date-%%DAY%%" class="date">%%DAY%%</popup-open>
<popup-window id="date-%%DAY%%">
    <div class="popup-top">
        <h2>
            Day %%DAY%% || %%DATE%%
        </h2>
    </div>
    <div class="attendance">
        <h3>Attendance Logs</h3>

        <div>
            <div class="time checkin">
                <h4>check in</h4>
                <time datetime="%%TIME%%">%%CTIME%%</time>
                
            </div>
            <div class="time dispatch">
                <h4>dispatched</h4>
                <time datetime="%%TIME%%">%%DTIME%%</time>
            </div>
        </div>
    </div>

    <form action="/pharmacy/staff/attendance?id=1&uid=1" method="post">
        <h3>Update Attendance</h3>


        <div>

            <div class="time checkin">
                <label>
                    <h4>check-in Time</h4>
                    <input type="time" name="checkIn">
                </label>
            </div>
            <div>
                <label>
                    <h4>Dispatch Time</h4>
                    <input type="time" name="checkIn">
                </label>
            </div>

        </div>

        <input type="reset" value="Clear">
        <input type="submit" value="Save Changes">

    </form>
    


</popup-window>
