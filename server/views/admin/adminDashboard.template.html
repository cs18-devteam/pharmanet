  <script>
    const pathParts = window.location.pathname.split('/');
    const adminId = pathParts[pathParts.indexOf('admin')+1];

    async function loadDashboardStats() {
      try{
        console.log('Fetching from:',`/api/v1/admin/${adminId}/dashboard`);
        const res = await fetch(`/api/v1/admin/${adminId}/dashboard`);
        const data = await res.json();

        console.log('Dashboard data:', data);
        const stats = data.data || data;

        if(stats) {
          document.getElementById('totalPharmacies').textContent = stats.totalPharmacies ?? 0;
          document.getElementById('totalMedicines').textContent = stats.totalMedicines ?? 0;
          document.getElementById('totalUsers').textContent = stats.totalUsers ?? 0;
        }
      }catch (e) {
        console.error('Error loading dashboard stats:', e);
      }
    }
    loadDashboardStats();
  </script>


  <script>
    async function loadRecentActivities() {
        try {
            const pathParts = window.location.pathname.split('/');
            const adminId = pathParts[pathParts.indexOf('admin') + 1];

            console.log('Fetching activities from:', `/api/v1/admin/${adminId}/activities`);
            const res = await fetch(`/api/v1/admin/${adminId}/activities`);
            const data = await res.json();

            
            const activities = data.activities || [];
            const admin = data.admin || [];
            const firstName = admin.firstName || '';
            const lastName = admin.lastName || '';
            const avatar = firstName[0].toUpperCase() + lastName[0].toUpperCase(); 
            console.log(avatar);
            const activityList = document.getElementById('activityList');
            activityList.innerHTML = '';

            if (activities.length === 0) {
                activityList.innerHTML = '<li class="activity-item"><p>No activities found</p></li>';
                return;
            }

            activities.forEach(activity => {
                const listItem = document.createElement('li');
                listItem.className = 'activity-item';
                listItem.innerHTML = `
                    <div class="avatar">${avatar || 'XX'}</div>
                    <div class="details">
                        <div class="info">
                            <strong>${admin.firstName.toUpperCase() + ' ' + admin.lastName.toUpperCase() || 'Unknown User'}</strong>
                            <span class="tag ${activity.category}">${activity.category}</span>
                        </div>
                        <p>${activity.description} ${activity.entityName ? `<strong>${activity.entityName}</strong>` : ''}</p>
                        <span class="time">${activity.timeAgo || 'Recently'}</span>
                    </div>
                `;
                activityList.appendChild(listItem);
            });
        } catch (e) {
            console.error('Error loading activities:', e);
            const activityList = document.getElementById('activityList');
            activityList.innerHTML = '<li class="activity-item"><p>Error loading activities</p></li>';
        }
    }

    loadRecentActivities();
    // Refresh activities every 30 seconds
    setInterval(loadRecentActivities, 30000);
</script>
