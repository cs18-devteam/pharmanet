    <script>
      // Extract admin ID from URL: /admin/{id}/blogs/manage
      const pathParts = window.location.pathname.split("/");
      const adminIdIndex = pathParts.indexOf("admin") + 1;
      const adminId = pathParts[adminIdIndex];

      const API_URL = `${window.location.origin}/admin/${adminId}/blogs/api/create`;

      // ================== FETCH ALL BLOGS ==================
      async function loadBlogs() {
        const res = await fetch(API_URL);
        const blogs = await res.json();

        const tableBody = document.querySelector("#blogs-table-body");
        tableBody.innerHTML = "";

        blogs.forEach((blog) => {
          const row = document.createElement("tr");
          row.innerHTML = `
      <td>${blog.title}</td>
      <td>${blog.category || "-"}</td>
      <td>${blog.author}</td>
      <td>${blog.status}</td>
      <td class = "actions">
        <button class="edit-btn" data-id="${blog.id}" >Edit</button>
        <button class="delete-btn" data-id="${blog.id}">Delete</button>
      </td>
    `;
          tableBody.appendChild(row);
        });

        // Add event listeners to buttons
        document
          .querySelectorAll(".delete-btn")
          .forEach((btn) =>
            btn.addEventListener("click", () => deleteBlog(btn.dataset.id)),
          );

        document
          .querySelectorAll(".edit-btn")
          .forEach((btn) =>
            btn.addEventListener("click", () => editBlog(btn.dataset.id)),
          );
      }

      // ================== DELETE BLOG ==================
      async function deleteBlog(blogId) {
        if (!confirm("Are you sure you want to delete this blog?")) return;

        const res = await fetch(
          `${window.location.origin}/admin/${adminId}/blogs/${blogId}/delete`,
          {
            method: "DELETE",
          },
        );
        if (res.ok) {
          alert("Blog deleted!");
          loadBlogs();
        } else {
          alert("Failed to delete blog");
        }
      }

      // ================== ADD NEW BLOG ==================
      document
        .querySelector("#createBlogForm")
        ?.addEventListener("submit", async (e) => {
          e.preventDefault();
          const title = document.querySelector("#title").value;
          const content = document.querySelector("#content").value;
          const author = document.querySelector("#author").value;
          const category = document.querySelector("#category").value;

          const res = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ title, date, content, author, category }),
          });

          if (res.ok) {
            alert("Blog created successfully!");
            e.target.reset();
            loadBlogs();
          } else {
            alert("Error creating blog");
          }
        });

      // ================== EDIT BLOG ==================
      async function editBlog(id) {
        const blogId = id;
        window.location.href = `/admin/${adminId}/blogs/${blogId}/edit`;
        
      }


      // Load blogs when page opens
      loadBlogs();
    </script>
