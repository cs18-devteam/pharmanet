{header}
<body class="pharmarcy">
    <div class="container">
    <div class="container-1">
    <div class="sideBar">
    <div class="logo">
      <img class="logopic" src="/logo/logo.svg" alt="logo">
      <div>
        <h3>System Admin</h3>
        <p>Management System</p>
      </div>
    </div>

    {sidebar}
    <div class="menuItem">
        <button class="text setting"> Settings</button>
        <button class="text signOut"> Sign Out</button>
    </div>
  </div>
  </div>

  <div class="container-2">
  <div class="main">
    <!-- <header>
      <input type="text" id="searchInput" placeholder="Search pharmacies..." />
      <div class="user-section">
        <span class="bell"></span>
        <div class="admin">AD</div>
      </div>
    </header> -->

    <section class="dashboard">
     <div class="sectionHeading">
    <div>
      <h1>Pharmarcies</h1>
      <p>Manage All pharmarcy locations and their details.</p>
      </div>
      <div>
      <a href="/admin/pharmacy/create" class="addBtn">Add Pharmarcy</a>
      </div>
      </div>
    
    <div class="content-wrapper">
    <div class="pharmacy-grid">
    
      <table class="pharmacy-table">
        <thead>
          <th>name</th>
          <th>licenseNumber</th>
          <th>email</th>
          <th>address</th>
          <th>location</th>
          <th>contact</th>
          <th>type</th>
          <th>pharmacist</th>
        </thead>
        <tbody>
          {rows}
        </tbody>
      </table>
  
    

   </div>
  </div>
    </section>
  </div>
  </div>

  <script>
    async function renderPharmacies(){
      const respond = await fetch("/admin/pharmacy/list" , {
        method:"GET",
      });

      const  results = await respond.json();
      console.log(results);

      if(!results.data) return;
      if(!results.data[0])return;

      const pharmacies = results.data.map(pharmacy=>{
        const pharmacyCard = `
        <a href="/admin/pharmacy/view/${pharmacy.id}" class="pharmacy-card">
          <div class="header">
            <h3>${pharmacy.name} <span class="status inactive">inactive</span></h3>
            <button class="menu-btn">⋮</button>
          </div>
          <p>Manager: Lisa Anderson</p>
          <ul class="details">
            <li><span class="address"></span>${pharmacy.street} , ${pharmacy.town} , ${pharmacy.province}</li>
            <li><span class="email"></span> ${pharmacy.email}</li>
          </ul>
          <div class="footer">
            <p>Inventory: <strong>423 items</strong></p>
            <button class="details-btn">View Details</button>
          </div>
        </a>`;

        return pharmacyCard;

          })
          const pharmacyBody = document.querySelector('.pharmacy-grid');
          if(pharmacyBody){
            pharmacyBody.innerHTML = pharmacies.join(' ');
          }
          
        }



    renderPharmacies();



  </script>


  <script>
    try{

      
      //Search filter
      document.getElementById('searchInput').addEventListener('keyup', function () {
        const filter = this.value.toLowerCase(); // what user types
        const rows = document.querySelectorAll('.pharmacy-card');
        
        rows.forEach(row => {
          const text = row.textContent.toLowerCase();
          if (text.includes(filter)) {
            row.style.display = ''; // show row
          } else {
            row.style.display = 'none'; // hide row
          }
        });
      });
    }catch(e){
      console.log(e);
      Notify.showError(e.message);
    }
  </script>


  
    
</body>
</html>
