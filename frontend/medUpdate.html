<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>medicine Creation Form</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="medUpdate">
    <div class="medUpdate-container">
        <div class="header">
            <div class="logo-container">
                <img src="/public/images/logo.png" alt="PharmaNet Logo">
                <div id = "toggle-placeholder"> </div>
            </div>
            <div class="title-container">
                <img src="/public/images/award.svg" alt="Award" class="award-icon">
                <h2><span>Medicine</span> Update Form</h2>
            </div>
        </div>
      
        <div class="form-layout">
            <div>
                <div class="section-title">Basic Info</div>
                <div class="form-grid two-separate-col">
                    <div class="form-group">
                        <label>Generic Name</label>
                        <input type="text" placeholder="0.45% W/V SODIUM CHLORIDE AND 5% W/V GLUCOSE INTRAVENOUS INFUSION BP">
                    </div>
                    <div class="form-group">
                        <label>Schedule</label>
                        <input type="text" placeholder="II B">
                    </div>
                </div>
                <div class="form-grid two-col">
                    <div class="form-group">
                        <label>Reg No</label>
                        <input type="text" placeholder="MOI4307">
                    </div>
                    <div class="form-group">
                        <label>Serial No</label>
                        <input type="text" placeholder="NP4408M">
                    </div>
                </div>
                <div class="form-grid three-col">
                    <div class="form-group">
                        <label>Brand Name</label>
                        <input type="text" placeholder="EFIREN-600">
                    </div>
                    <div class="form-group">
                        <label>Dosage Code</label>
                        <input type="text" placeholder="SOLUTION FOR INFUSION">
                    </div>
                    <div class="form-group">
                        <label>Country Code</label>
                        <input type="text" placeholder="INDIA">
                    </div>
                </div>
                <div class="form-grid two-col">
                    <div class="form-group">
                        <label>Pack Size</label>
                        <input type="text" placeholder="500ML">
                    </div>
                    <div class="form-group">
                        <label>Pack Type</label>
                        <input type="text" placeholder="PE CONTAINER">
                    </div>
                </div>
                <div class="form-grid two-col">
                    <div class="form-group">
                        <label>Manucode</label>
                        <input type="text" placeholder="Fresenius Kabi India Pvt Ltd">
                    </div>
                    <div class="form-group">
                        <label>Agent Code</label>
                        <input type="text" placeholder="Hemas Pharmaceuticals (Pvt) Ltd">
                    </div>
                </div>
            </div>
        
            <div class="sidebar">
                <div>
                    <div class="section-title">Pricing Info</div>
                    <div class="form-grid one-col">
                        <div class="form-group">
                            <label>Price</label>
                            <input type="text" placeholder="1200">
                        </div>
                        <div class="form-group">
                            <label>Discount</label>
                            <input type="text" placeholder="20%">
                        </div>
                    </div>
                </div>
                    
                <div>
                    <div class="section-title">Stock Details</div>
                    <div class="form-grid one-col">
                        <div class="form-group">
                            <label>Full Stock</label>
                            <input type="text" placeholder="1200">
                        </div>
                        <div class="form-group">
                            <label>Public Stock</label>
                            <input type="text" placeholder="1000">
                        </div>
                    </div>
                    <div class="btn">
                        <button>Update Medicine Info</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
