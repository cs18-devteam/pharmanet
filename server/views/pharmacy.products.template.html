<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Pharmacy — Product Management</title>
    <style>
      :root {
        --green: #2ecc71;
        --green-dark: #21b76a;
        --yellow: #f1c40f;
        --orange: #e67e22;
        --muted: #f7f7f8;
        --card-bg: #ffffff;
        --text: #2b2b2b;
        --radius: 8px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI",
          Roboto, "Helvetica Neue", Arial;
      }
      html,
      body {
        height: 100%;
        margin: 0;
        background: linear-gradient(180deg, #fbfdf9 0%, #ffffff 100%);
        color: var(--text);
      }
      .container {
        max-width: 1200px;
        margin: 28px auto;
        padding: 18px;
        display: grid;
        grid-template-columns: 380px 1fr;
        gap: 20px;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 8px;
      }
      .logo {
        width: 56px;
        height: 56px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 700;
      }
      h1 {
        font-size: 20px;
        margin: 0;
      }
      .card {
        background: var(--card-bg);
        border-radius: var(--radius);
        box-shadow: 0 6px 18px rgba(20, 30, 40, 0.06);
        padding: 16px;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        margin-bottom: 12px;
      }
      label {
        font-size: 13px;
        margin-bottom: 6px;
        color: #333;
        font-weight: 600;
      }
      input[type="text"],
      input[type="number"],
      select,
      textarea {
        padding: 10px 12px;
        border: 1px solid #e6e6e6;
        border-radius: 8px;
        font-size: 14px;
        background: white;
      }
      textarea {
        min-height: 72px;
        resize: vertical;
      }
      .btn-row {
        display: flex;
        gap: 10px;
        margin-top: 8px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 9px 12px;
        border-radius: 8px;
        border: 0;
        cursor: pointer;
        font-weight: 600;
        font-size: 14px;
        box-shadow: 0 6px 12px rgba(34, 34, 34, 0.04);
      }
      .btn-primary {
        background: linear-gradient(90deg, var(--green), var(--green-dark));
        color: white;
      }
      .btn-warning {
        background: linear-gradient(90deg, var(--yellow), #f39c12);
        color: #2b2b2b;
      }
      .btn-orange {
        background: linear-gradient(90deg, var(--orange), #d35400);
        color: white;
      }
      .btn-ghost {
        background: transparent;
        border: 1px solid #e9e9e9;
        color: #444;
      }
      .small {
        font-size: 13px;
        color: #666;
      }
      .actions {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .search {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .search input {
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid #eee;
        min-width: 220px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 12px;
      }
      th,
      td {
        padding: 10px 12px;
        text-align: left;
        border-bottom: 1px solid #f3f3f3;
        font-size: 14px;
      }
      th {
        font-size: 13px;
        color: #555;
        font-weight: 700;
      }
      tr:hover td {
        background: #fafafa;
      }
      .tag {
        display: inline-block;
        padding: 6px 8px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        color: white;
      }
      .tag-green {
        background: var(--green-dark);
      }
      .tag-yellow {
        background: var(--yellow);
        color: #222;
      }
      .tag-orange {
        background: var(--orange);
      }
      .empty {
        padding: 28px;
        text-align: center;
        color: #777;
      }
      .footer-note {
        font-size: 13px;
        color: #666;
        margin-top: 10px;
      }
      @media (max-width: 980px) {
        .container {
          grid-template-columns: 1fr;
          padding: 12px;
        }
        .logo {
          width: 48px;
          height: 48px;
        }
      }
    </style>

    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    {navbar}

    <div class="container">
      <!-- left: form -->
      <section class="card" aria-labelledby="form-title">
        <form id="product-form" onsubmit="return false;">
          <input type="hidden" id="product-id" value="" />
          <div class="form-group">
            <label for="name">Product name</label>
            <input
              id="name"
              type="text"
              name="name"
              placeholder="e.g. Paracetamol 500mg"
              required
            />
          </div>

          <div class="form-group">
            <label for="sku">SKU / Code</label>
            <input id="sku" type="text" placeholder="e.g. PARA-500" />
          </div>

          <div style="display: flex; gap: 10px">
            <div class="form-group" style="flex: 1">
              <label for="price">Price (USD)</label>
              <input
                name="price"
                id="price"
                type="number"
                min="0"
                step="0.01"
                placeholder="0.00"
              />
            </div>
            <div class="form-group" style="width: 120px">
              <label for="qty">Qty</label>
              <input id="qty" type="number" min="0" placeholder="0" name="stock" />
            </div>
          </div>

          <div class="btn-row">
            <button id="save-btn" class="btn btn-primary">Add product</button>
            <button id="cancel-btn" class="btn btn-ghost" type="button">
              Cancel
            </button>
        </form>


      </section>

      <!-- right: list/search -->
      <section class="card">
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
          "
        >
          <div>
            <h2 style="margin: 0; font-size: 16px">Products</h2>
            <div class="small">All products in inventory</div>
          </div>
          <div class="actions">
            <div class="search">
              <input id="search" placeholder="Search by name or SKU" />
              <button id="clear-search" class="btn btn-ghost" title="Clear">
                Clear
              </button>
            </div>
            <button
              id="new-btn"
              class="btn btn-primary"
              title="Add new product"
              style="margin-left: 10px"
            >
              New
            </button>
          </div>
        </div>

        <div id="table-wrap">
          <table id="products-table" aria-describedby="table-desc">
            <thead>
              <tr>
                <th>Product</th>
                <th>Id</th>
                <th>Price</th>
                <th>Stock</th>
                <th style="width: 120px; text-align: center">Actions</th>
              </tr>
            </thead>
            <tbody id="products-body">
				{products}
            </tbody>
          </table>
          <div id="empty" class="empty" style="display: none">
            No products yet. Add a product using the form.
          </div>
        </div>
      </section>
    </div>


    <script>
        const form = document.getElementById('product-form');

        form.addEventListener("submit" ,async (e)=>{
          e.preventDefault();

          const data = {
            price:100 , 
            stock : 100 , 
            name : "helo",
          };
          const formData = new FormData(form);
          for(const [key , value] of formData.entries()){
            data[key] = value;
          };

          

          const respond = await fetch("/pharmacies/{pharmacyId}/owners/{ownerId}/api/products" , {
            method:"POST",
            body: JSON.stringify(data),
          }); 

          const results = await respond.json();
          console.log(results);
        })


    </script>

  </body>
</html>
