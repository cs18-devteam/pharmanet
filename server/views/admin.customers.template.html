<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Admin — Customers</title>
<style>
	:root{
		--green:#2ecc71; --green-dark:#21b76a; --yellow:#f1c40f0; --orange:#e67e22;
		--bg:linear-gradient(180deg,#fbfdf9 0%, #fff 100%);
		--card:#fff; --muted:#f7f7f8; --text:#222; --radius:10px;
		font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial;
	}
	html,body{height:100%;margin:0;background:var(--bg);color:var(--text)}
	.container{max-width:1200px;margin:24px auto;padding:18px;display:grid;grid-template-columns:380px 1fr;gap:18px}
	.header{grid-column:1/-1;display:flex;justify-content:space-between;align-items:center}
	.logo{width:48px;height:48px;border-radius:10px;background:linear-gradient(135deg,var(--green),var(--orange));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800}
	.card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:0 8px 28px rgba(20,30,40,0.06)}
	label{display:block;font-weight:700;font-size:13px;margin-bottom:6px}
	input,select,textarea{width:100%;padding:9px 10px;border-radius:8px;border:1px solid #eee;background:white;font-size:14px}
	.btn{padding:9px 12px;border-radius:8px;border:0;cursor:pointer;font-weight:700}
	.btn-primary{background:linear-gradient(90deg,var(--green),var(--green-dark));color:#fff}
	.btn-ghost{background:transparent;border:1px solid #eee}
	.btn-danger{background:linear-gradient(90deg,var(--orange),#d35400);color:#fff}
	.small{font-size:13px;color:#666}
	table{width:100%;border-collapse:collapse;margin-top:12px}
	th,td{padding:10px;border-bottom:1px solid #f3f3f3;text-align:left;font-size:14px}
	th{font-weight:800;color:#555}
	.row-actions{display:flex;gap:8px;justify-content:center}
	.search-row{display:flex;gap:8px;align-items:center}
	.overlay{position:fixed;inset:0;background:rgba(10,12,14,0.45);display:none;align-items:center;justify-content:center;z-index:80}
	.overlay.open{display:flex}
	.modal{background:var(--card);border-radius:12px;padding:16px;max-width:720px;width:96%;box-shadow:0 18px 48px rgba(10,12,14,0.25)}
	.toast{position:fixed;right:20px;bottom:20px;background:#111;color:#fff;padding:10px 12px;border-radius:10px;display:none;align-items:center;gap:10px;z-index:90}
	.toast.show{display:flex}
	.undo{background:transparent;border:1px solid rgba(255,255,255,0.2);color:#fff;padding:6px 8px;border-radius:8px;cursor:pointer}
	@media (max-width:980px){ .container{grid-template-columns:1fr;padding:12px} }
</style>
</head>
<body>
	<header class="header">
		<div style="display:flex;gap:12px;align-items:center">
			<div class="logo">ADM</div>
			<div>
				<div style="font-weight:800">Admin • Customers</div>
				<div class="small">Manage customer records — search, edit, delete</div>
			</div>
		</div>
		<div style="display:flex;gap:8px;align-items:center">
			<button id="export" class="btn btn-ghost">Export CSV</button>
			<button id="refresh" class="btn btn-primary">Refresh</button>
		</div>
	</header>

	<!-- left: form -->
	<section class="card" aria-labelledby="form-title">
		<h3 id="form-title" style="margin:0 0 10px">Create / Edit Customer</h3>
		<form id="cust-form" onsubmit="return false;">
			<input type="hidden" id="cust-id" />
			<label for="name">Name</label>
			<input id="name" placeholder="Full name" required />

			<label for="email" style="margin-top:10px">Email</label>
			<input id="email" placeholder="email@example.com" type="email" />

			<label for="phone" style="margin-top:10px">Phone</label>
			<input id="phone" placeholder="+1 555 000 0000" />

			<label for="notes" style="margin-top:10px">Notes</label>
			<textarea id="notes" placeholder="Optional"></textarea>

			<div style="display:flex;gap:8px;margin-top:12px">
				<button id="save" class="btn btn-primary">Add customer</button>
				<button id="cancel" type="button" class="btn btn-ghost">Cancel</button>
				<div style="flex:1"></div>
				<button id="seed" type="button" class="btn btn-ghost">Seed sample</button>
			</div>
		</form>
	</section>

	<!-- right: list -->
	<section class="card">
		<div style="display:flex;justify-content:space-between;align-items:center">
			<div>
				<h3 style="margin:0">Customers</h3>
				<div class="small">All customers in the system</div>
			</div>
			<div>
				<div class="search-row">
					<input id="search" placeholder="Search name, email or phone" style="padding:8px 10px;border-radius:8px;border:1px solid #eee;min-width:260px" />
					<button id="clear-search" class="btn btn-ghost">Clear</button>
					<button id="new" class="btn btn-primary" style="margin-left:8px">New</button>
				</div>
			</div>
		</div>

		<div id="table-wrap">
			<table>
				<thead>
					<tr><th>Name</th><th>Email</th><th>Phone</th><th style="width:160px;text-align:center">Actions</th></tr>
				</thead>
				<tbody id="body"></tbody>
			</table>
			<div id="empty" class="small" style="padding:12px;display:none">No customers found.</div>
		</div>
	</section>

	<!-- detail overlay -->
	<div id="overlay" class="overlay" aria-hidden="true">
		<div class="modal" role="dialog" aria-modal="true">
			<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
				<div>
					<div id="ov-name" style="font-weight:800"></div>
					<div id="ov-email" class="small"></div>
				</div>
				<div style="display:flex;gap:8px;align-items:center">
					<button id="ov-edit" class="btn btn-ghost">Edit</button>
					<button id="ov-close" class="btn btn-ghost">Close</button>
				</div>
			</div>
			<div>
				<div class="small"><strong>Phone:</strong> <span id="ov-phone"></span></div>
				<div style="margin-top:8px"><strong>Notes</strong></div>
				<div id="ov-notes" class="small" style="white-space:pre-wrap"></div>
			</div>
		</div>
	</div>

	<!-- undo toast -->
	<div id="toast" class="toast" role="status" aria-live="polite">
		<div id="toast-text">Customer deleted</div>
		<button id="toast-undo" class="undo">Undo</button>
	</div>

<script>
(() => {
	const KEY = 'pharm_customers';
	// elements
	const form = document.getElementById('cust-form');
	const inputs = {
		id: document.getElementById('cust-id'),
		name: document.getElementById('name'),
		email: document.getElementById('email'),
		phone: document.getElementById('phone'),
		notes: document.getElementById('notes')
	};
	const saveBtn = document.getElementById('save');
	const cancelBtn = document.getElementById('cancel');
	const seedBtn = document.getElementById('seed');
	const newBtn = document.getElementById('new');
	const search = document.getElementById('search');
	const clearSearch = document.getElementById('clear-search');
	const body = document.getElementById('body');
	const empty = document.getElementById('empty');
	const exportBtn = document.getElementById('export');
	const refreshBtn = document.getElementById('refresh');

	const overlay = document.getElementById('overlay');
	const ovName = document.getElementById('ov-name');
	const ovEmail = document.getElementById('ov-email');
	const ovPhone = document.getElementById('ov-phone');
	const ovNotes = document.getElementById('ov-notes');
	const ovEdit = document.getElementById('ov-edit');
	const ovClose = document.getElementById('ov-close');

	const toast = document.getElementById('toast');
	const toastText = document.getElementById('toast-text');
	const toastUndo = document.getElementById('toast-undo');

	let customers = load();
	let lastDeleted = null;
	let undoTimer = null;

	function uid(prefix='c'){ return prefix + Math.random().toString(36).slice(2,9); }

	function load(){
		try { const raw = localStorage.getItem(KEY); if(raw) return JSON.parse(raw); } catch(e){}
		// sample seed
		return [
			{id:'c1', name:'Alice Johnson', email:'alice@example.com', phone:'+1 555-1010', notes:'Loyal customer'},
			{id:'c2', name:'Bob King', email:'bob@example.com', phone:'+1 555-2020', notes:''}
		];
	}
	function save(){ try { localStorage.setItem(KEY, JSON.stringify(customers)); } catch(e){} }

	function render(filter=''){
		const q = (filter || '').trim().toLowerCase();
		body.innerHTML = '';
		const list = customers.filter(c => {
			if(!q) return true;
			return (c.name+' '+(c.email||'')+' '+(c.phone||'')).toLowerCase().includes(q);
		});
		if(list.length === 0){ empty.style.display = 'block'; return; }
		empty.style.display = 'none';
		list.forEach(c => {
			const tr = document.createElement('tr');
			tr.innerHTML = `
				<td><a href="#customer:${c.id}" data-id="${c.id}" style="text-decoration:none;color:inherit">${escape(c.name)}</a></td>
				<td>${escape(c.email||'—')}</td>
				<td>${escape(c.phone||'—')}</td>
				<td style="text-align:center" class="row-actions">
					<button class="btn btn-ghost" data-act="edit" data-id="${c.id}">Edit</button>
					<button class="btn btn-danger" data-act="delete" data-id="${c.id}">Delete</button>
				</td>
			`;
			body.appendChild(tr);
		});
	}

	function escape(s=''){ return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

	function resetForm(){
		inputs.id.value = '';
		form.reset();
		saveBtn.textContent = 'Add customer';
		if(location.hash.startsWith('#edit:')) history.replaceState(null,'', location.pathname + location.search);
	}

	function loadForEdit(id){
		const c = customers.find(x=>x.id===id);
		if(!c) return;
		inputs.id.value = c.id;
		inputs.name.value = c.name;
		inputs.email.value = c.email || '';
		inputs.phone.value = c.phone || '';
		inputs.notes.value = c.notes || '';
		saveBtn.textContent = 'Save changes';
		window.scrollTo({top:0,behavior:'smooth'});
	}

	function showOverlay(id){
		const c = customers.find(x=>x.id===id);
		if(!c) return;
		ovName.textContent = c.name;
		ovEmail.textContent = c.email || '—';
		ovPhone.textContent = c.phone || '—';
		ovNotes.textContent = c.notes || '—';
		ovEdit.dataset.id = c.id;
		overlay.classList.add('open'); overlay.setAttribute('aria-hidden','false');
	}

	function closeOverlay(){
		overlay.classList.remove('open'); overlay.setAttribute('aria-hidden','true');
		if(location.hash.startsWith('#customer:')) history.replaceState(null,'', location.pathname + location.search);
	}

	// form save
	saveBtn.addEventListener('click', () => {
		const name = inputs.name.value.trim();
		if(!name){ alert('Name required'); inputs.name.focus(); return; }
		const payload = {
			id: inputs.id.value || uid(),
			name,
			email: inputs.email.value.trim(),
			phone: inputs.phone.value.trim(),
			notes: inputs.notes.value.trim()
		};
		const idx = customers.findIndex(x=>x.id===payload.id);
		if(idx >= 0) customers[idx] = payload;
		else customers.unshift(payload);
		save();
		resetForm();
		render(search.value);
	});

	cancelBtn.addEventListener('click', resetForm);
	newBtn.addEventListener('click', ()=>{ resetForm(); inputs.name.focus(); });

	// table delegation
	document.getElementById('table-wrap').addEventListener('click', (e) => {
		const btn = e.target.closest('button');
		if(btn){
			const act = btn.getAttribute('data-act');
			const id = btn.getAttribute('data-id');
			if(act === 'edit') loadForEdit(id);
			if(act === 'delete'){
				if(confirm('Delete this customer?')) {
					const idx = customers.findIndex(x=>x.id===id);
					if(idx === -1) return;
					lastDeleted = { item: customers[idx], index: idx };
					customers.splice(idx,1);
					save();
					render(search.value);
					showToast(`${lastDeleted.item.name} deleted`, true);
				}
			}
		}
		const link = e.target.closest('a[data-id]');
		if(link){ const id = link.dataset.id; location.hash = '#customer:' + id; }
	});

	// overlay controls
	ovClose.addEventListener('click', closeOverlay);
	ovEdit.addEventListener('click', (e) => {
		const id = e.currentTarget.dataset.id;
		if(id){ closeOverlay(); loadForEdit(id); window.scrollTo({top:0,behavior:'smooth'}); }
	});

	// hash routing
	window.addEventListener('hashchange', ()=> {
		const h = location.hash || '';
		if(h.startsWith('#customer:')) showOverlay(h.split(':')[1]);
		if(h.startsWith('#edit:')) loadForEdit(h.split(':')[1]);
	});

	// search
	search.addEventListener('input', ()=> render(search.value));
	clearSearch.addEventListener('click', ()=> { search.value=''; render(''); });

	// seed sample
	seedBtn.addEventListener('click', ()=> { customers = load(); save(); render(); });

	// export CSV
	exportBtn.addEventListener('click', ()=> {
		const rows = [['id','name','email','phone','notes']];
		customers.forEach(c => rows.push([c.id,c.name,c.email||'',c.phone||'',c.notes||'']));
		const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
		const blob = new Blob([csv], {type:'text/csv'}); const url = URL.createObjectURL(blob);
		const a = document.createElement('a'); a.href = url; a.download = 'customers.csv'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
	});

	refreshBtn.addEventListener('click', ()=> { customers = load(); render(); showToast('Refreshed', false); });

	// toast + undo
	function showToast(text, allowUndo=false){
		toastText.textContent = text;
		toast.classList.add('show');
		toastUndo.style.display = allowUndo ? 'inline-block' : 'none';
		if(undoTimer) clearTimeout(undoTimer);
		undoTimer = setTimeout(()=> { hideToast(); lastDeleted = null; }, 6000);
	}
	function hideToast(){ toast.classList.remove('show'); if(undoTimer){ clearTimeout(undoTimer); undoTimer = null; } }

	toastUndo.addEventListener('click', ()=> {
		if(!lastDeleted) return;
		customers.splice(lastDeleted.index,0,lastDeleted.item);
		save(); render(search.value);
		showToast('Restore successful', false);
		lastDeleted = null; hideToast();
	});

	// keyboard escape closes overlay
	document.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeOverlay(); });

	// initial
	render();
	// expose for debug
	window.__admin_customers = { customers, save, render };
})();
</script>
</body>
</html>
