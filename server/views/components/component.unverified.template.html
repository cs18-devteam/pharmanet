<div class="unverified-banner">
    <div class="unverified-content">
        <div class="unverified-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
        </div>
        <div class="unverified-message">
            <span class="unverified-text">You are unverified.</span>
            <a href="{verificationpage}" class="unverified-link">Please verify here</a>
        </div>
        <button class="unverified-close" onclick="this.parentElement.parentElement.remove()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
    </div>
</div>

<style>
    .unverified-banner {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: linear-gradient(135deg, #fff3cd 0%, #fff8e1 100%);
        border-bottom: 2px solid #ffc107;
        padding: 12px 16px;
        z-index: 9999;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    }

    .unverified-content {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
    }

    .unverified-icon {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        color: #ff9800;
        width: 24px;
        height: 24px;
    }

    .unverified-message {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 6px;
        color: #856404;
        font-size: 14px;
        font-weight: 500;
        line-height: 1.4;
    }

    .unverified-text {
        font-weight: 600;
    }

    .unverified-link {
        color: #ff6f00;
        text-decoration: none;
        font-weight: 700;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 4px;
        transition: all 0.2s ease;
    }

    .unverified-link:hover {
        background-color: rgba(255, 111, 0, 0.1);
        color: #e65100;
        text-decoration: underline;
    }

    .unverified-close {
        flex-shrink: 0;
        background: none;
        border: none;
        cursor: pointer;
        color: #856404;
        padding: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 4px;
        transition: all 0.2s ease;
        width: 28px;
        height: 28px;
    }

    .unverified-close:hover {
        background-color: rgba(133, 100, 4, 0.1);
        color: #664d03;
    }

    /* Responsive Design */
    @media (max-width: 640px) {
        .unverified-banner {
            padding: 10px 12px;
        }

        .unverified-content {
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
        }

        .unverified-message {
            width: 100%;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
        }

        .unverified-close {
            align-self: flex-end;
            margin-top: -32px;
        }
    }

    /* Ensure body has top padding for banner */
    body {
        padding-top: 50px;
    }
</style>
