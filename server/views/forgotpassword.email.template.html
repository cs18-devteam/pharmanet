{header}
<body class="verify_email">
   <header>
        <nav>
        <div class="logo">
            <img class="logopic" src="/logo/logo.svg" alt="logo">
            <p class="logoname">PharmaNet</p>
        </div>
        
        </nav>
    </header>
    <main class="wrapper">
    <div class="verify-email-container">
        <p class="title">Forgot Password</p>
        <p class="discription">Enter your email address and we'll send you a link to reset your password.</p>
        <p class="second-title">Email Address</p>
        <input type="email" id="email" placeholder="example@gmail.com">
        <button class="verify-button">Send Reset Link <img src=""></button>
         <a href="/login" class="change-email">Back to Login</a>
    </div>
    </main>
    <!-- <script type="module" src="/js/controller/controller.js"></script> -->


    <script>
        try{
            document.querySelector('.verify-button').addEventListener('click' , ()=>{
                const emailInput = document.querySelector('#email');
                const email = emailInput.value.trim();

                // Validate email
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                
                if(!email) {
                    emailInput.classList.add('utility-warn');
                    emailInput.classList.remove('utility-success');
                    Swal?.fire({
                        icon:"error",
                        title:"Email Required",
                        body:"Please enter your email address",
                    });
                    return;
                }

                if(!emailRegex.test(email)) {
                    emailInput.classList.add('utility-warn');
                    emailInput.classList.remove('utility-success');
                    Swal?.fire({
                        icon:"error",
                        title:"Invalid Email",
                        body:"Please enter a valid email address",
                    });
                    return;
                }

                emailInput.classList.remove('utility-warn');
                emailInput.classList.add('utility-success');

                // Send forgot password request
                fetch("/accounts/reset/email" , {
                    method:"POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        email: email,
                    })
                }).then(data=> data.json()).then(data=>{
                    
                    if(data.status == "success"){
                        Swal?.fire({
                            icon:"success",
                            title:"Reset Link Sent",
                            body:"Please check your email for password reset instructions",
                        }).then(()=>{
  
                            window.location.href = `/accounts/${data.data.user.id || "0"}/reset/otp`;
                        })
                    }else{
                        emailInput.classList.add('utility-warn');
                        emailInput.classList.remove('utility-success');
                        Swal?.fire({
                            icon:"error",
                            title:data.message || "Error sending reset link",
                            body:"Please try again or contact support",
                        })
                    }
                }).catch(e=>{
                    console.log(e);
                    Swal?.fire({
                        icon:"error",
                        title:"Internal Server Error",
                        body:"Please try again after some time",
                    })
                })
            })

            // Handle Enter key press
            document.querySelector('#email').addEventListener('keypress', function(e) {
                if(e.key === 'Enter') {
                    document.querySelector('.verify-button').click();
                }
            });

        }catch(e){
            console.log(e);
            Swal?.fire({
                icon:"error",
                title:"Internal Server Error",
                body:e.message,
            })
        }

        </script>
        {footer}

</body>
</html>
