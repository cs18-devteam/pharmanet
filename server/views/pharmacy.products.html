<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Pharmacy — Product Management</title>
	<style>
		:root{
			--green:#2ecc71;
			--green-dark:#21b76a;
			--yellow:#f1c40f;
			--orange:#e67e22;
			--muted:#f7f7f8;
			--card-bg:#ffffff;
			--text:#2b2b2b;
			--radius:8px;
			font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
		}
		html,body{height:100%;margin:0;background:linear-gradient(180deg,#fbfdf9 0%, #ffffff 100%);color:var(--text)}
		.container{max-width:1200px;margin:28px auto;padding:18px;display:grid;grid-template-columns:380px 1fr;gap:20px}
		.header{display:flex;align-items:center;gap:12px;margin-bottom:8px}
		.logo{width:56px;height:56px;border-radius:10px;background:linear-gradient(135deg,var(--green), var(--orange));display:flex;align-items:center;justify-content:center;color:white;font-weight:700}
		h1{font-size:20px;margin:0}
		.card{background:var(--card-bg);border-radius:var(--radius);box-shadow:0 6px 18px rgba(20,30,40,0.06);padding:16px}
		.form-group{display:flex;flex-direction:column;margin-bottom:12px}
		label{font-size:13px;margin-bottom:6px;color:#333;font-weight:600}
		input[type="text"],input[type="number"],select,textarea{
			padding:10px 12px;border:1px solid #e6e6e6;border-radius:8px;font-size:14px;background:white;
		}
		textarea{min-height:72px;resize:vertical}
		.btn-row{display:flex;gap:10px;margin-top:8px}
		.btn{
			display:inline-flex;align-items:center;gap:8px;padding:9px 12px;border-radius:8px;border:0;cursor:pointer;font-weight:600;font-size:14px;
			box-shadow:0 6px 12px rgba(34,34,34,0.04);
		}
		.btn-primary{background:linear-gradient(90deg,var(--green),var(--green-dark));color:white}
		.btn-warning{background:linear-gradient(90deg,var(--yellow),#f39c12);color:#2b2b2b}
		.btn-orange{background:linear-gradient(90deg,var(--orange),#d35400);color:white}
		.btn-ghost{background:transparent;border:1px solid #e9e9e9;color:#444}
		.small{font-size:13px;color:#666}
		.actions{display:flex;gap:8px;align-items:center}
		.search{display:flex;gap:8px;align-items:center}
		.search input{padding:8px 10px;border-radius:8px;border:1px solid #eee;min-width:220px}
		table{width:100%;border-collapse:collapse;margin-top:12px}
		th,td{padding:10px 12px;text-align:left;border-bottom:1px solid #f3f3f3;font-size:14px}
		th{font-size:13px;color:#555;font-weight:700}
		tr:hover td{background:#fafafa}
		.tag{display:inline-block;padding:6px 8px;border-radius:999px;font-size:12px;font-weight:700;color:white}
		.tag-green{background:var(--green-dark)}
		.tag-yellow{background:var(--yellow);color:#222}
		.tag-orange{background:var(--orange)}
		.empty{padding:28px;text-align:center;color:#777}
		.footer-note{font-size:13px;color:#666;margin-top:10px}
		@media (max-width:980px){
			.container{grid-template-columns:1fr; padding:12px}
			.logo{width:48px;height:48px}
		}
	</style>
</head>
<body>
	<div class="container">
		<!-- left: form -->
		<section class="card" aria-labelledby="form-title">
			<div class="header">
				<div class="logo">PN</div>
				<div>
					<h1 id="form-title">Product • Create / Edit</h1>
					<div class="small">Manage pharmacy products — add, update or remove items.</div>
				</div>
			</div>

			<form id="product-form" onsubmit="return false;">
				<input type="hidden" id="product-id" value="" />
				<div class="form-group">
					<label for="name">Product name</label>
					<input id="name" type="text" placeholder="e.g. Paracetamol 500mg" required />
				</div>

				<div class="form-group">
					<label for="sku">SKU / Code</label>
					<input id="sku" type="text" placeholder="e.g. PARA-500" />
				</div>

				<div style="display:flex;gap:10px;">
					<div class="form-group" style="flex:1">
						<label for="price">Price (USD)</label>
						<input id="price" type="number" min="0" step="0.01" placeholder="0.00" />
					</div>
					<div class="form-group" style="width:120px">
						<label for="qty">Qty</label>
						<input id="qty" type="number" min="0" placeholder="0" />
					</div>
				</div>

				<div class="form-group">
					<label for="category">Category</label>
					<select id="category">
						<option value="">— Select —</option>
						<option>Analgesic</option>
						<option>Antibiotic</option>
						<option>Dermatology</option>
						<option>Supplements</option>
						<option>Other</option>
					</select>
				</div>

				<div class="form-group">
					<label for="status">Status</label>
					<select id="status">
						<option value="active">Active</option>
						<option value="low">Low stock</option>
						<option value="discontinued">Discontinued</option>
					</select>
				</div>

				<div class="form-group">
					<label for="notes">Notes</label>
					<textarea id="notes" placeholder="Optional notes"></textarea>
				</div>

				<div class="btn-row">
					<button id="save-btn" class="btn btn-primary">Add product</button>
					<button id="cancel-btn" class="btn btn-ghost" type="button">Cancel</button>
					<div style="flex:1"></div>
					<button id="import-btn" class="btn btn-warning" type="button">Import CSV</button>
				</div>
			</form>

			<div class="footer-note">Tip: Click a row to edit, or use the delete action.</div>
		</section>

		<!-- right: list/search -->
		<section class="card">
			<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
				<div>
					<h2 style="margin:0;font-size:16px">Products</h2>
					<div class="small">All products in inventory</div>
				</div>
				<div class="actions">
					<div class="search">
						<input id="search" placeholder="Search by name or SKU" />
						<button id="clear-search" class="btn btn-ghost" title="Clear">Clear</button>
					</div>
					<button id="new-btn" class="btn btn-primary" title="Add new product" style="margin-left:10px">New</button>
				</div>
			</div>

			<div id="table-wrap">
				<table id="products-table" aria-describedby="table-desc">
					<thead>
						<tr>
							<th>Product</th>
							<th>SKU</th>
							<th>Category</th>
							<th>Price</th>
							<th>Qty</th>
							<th>Status</th>
							<th style="width:120px;text-align:center">Actions</th>
						</tr>
					</thead>
					<tbody id="products-body">
						<!-- populated by JS -->
					</tbody>
				</table>
				<div id="empty" class="empty" style="display:none">No products yet. Add a product using the form.</div>
			</div>
		</section>
	</div>

	<script>
		// Minimal client-side CRUD for demo purposes
		(() => {
			const form = document.getElementById('product-form');
			const inputs = {
				id: document.getElementById('product-id'),
				name: document.getElementById('name'),
				sku: document.getElementById('sku'),
				price: document.getElementById('price'),
				qty: document.getElementById('qty'),
				category: document.getElementById('category'),
				status: document.getElementById('status'),
				notes: document.getElementById('notes')
			};
			const saveBtn = document.getElementById('save-btn');
			const cancelBtn = document.getElementById('cancel-btn');
			const newBtn = document.getElementById('new-btn');
			const searchInput = document.getElementById('search');
			const clearSearch = document.getElementById('clear-search');
			const tbody = document.getElementById('products-body');
			const empty = document.getElementById('empty');

			let products = [
				{ id: 'p1', name:'Paracetamol 500mg', sku:'PARA-500', category:'Analgesic', price:2.5, qty:120, status:'active' },
				{ id: 'p2', name:'Amoxicillin 250mg', sku:'AMOX-250', category:'Antibiotic', price:4.75, qty:30, status:'low' }
			];

			function uid(prefix='id'){ return prefix + Math.random().toString(36).slice(2,9); }

			function renderList(filter=''){
				const f = filter.trim().toLowerCase();
				tbody.innerHTML = '';
				const list = products.filter(p => {
					if(!f) return true;
					return (p.name + ' ' + (p.sku||'') + ' ' + (p.category||'')).toLowerCase().includes(f);
				});
				if(list.length === 0){
					empty.style.display = 'block';
					return;
				}
				empty.style.display = 'none';
				list.forEach(p => {
					const tr = document.createElement('tr');
					tr.innerHTML = `
						<td style="cursor:pointer"><strong>${escapeHtml(p.name)}</strong></td>
						<td>${escapeHtml(p.sku||'—')}</td>
						<td>${escapeHtml(p.category||'—')}</td>
						<td>$${(p.price||0).toFixed(2)}</td>
						<td>${p.qty||0}</td>
						<td>${statusTag(p.status)}</td>
						<td style="text-align:center">
							<button class="btn btn-ghost" data-action="edit" data-id="${p.id}">Edit</button>
							<button class="btn btn-orange" data-action="delete" data-id="${p.id}">Delete</button>
						</td>
					`;
					// click row to edit
					tr.querySelector('td').addEventListener('click', () => loadForEdit(p.id));
					tbody.appendChild(tr);
				});
			}

			function statusTag(s){
				if(s === 'active') return '<span class="tag tag-green">Active</span>';
				if(s === 'low') return '<span class="tag tag-yellow">Low stock</span>';
				return '<span class="tag tag-orange">Disc.</span>';
			}

			function escapeHtml(str=''){ return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

			function resetForm(){
				inputs.id.value = '';
				form.reset();
				saveBtn.textContent = 'Add product';
			}

			function loadForEdit(id){
				const p = products.find(x=>x.id===id);
				if(!p) return;
				inputs.id.value = p.id;
				inputs.name.value = p.name;
				inputs.sku.value = p.sku || '';
				inputs.price.value = p.price || '';
				inputs.qty.value = p.qty || '';
				inputs.category.value = p.category || '';
				inputs.status.value = p.status || 'active';
				inputs.notes.value = p.notes || '';
				saveBtn.textContent = 'Save changes';
				window.scrollTo({top:0,behavior:'smooth'});
			}

			function validate(){
				if(!inputs.name.value.trim()){
					alert('Product name is required.');
					inputs.name.focus();
					return false;
				}
				if(inputs.price.value && Number(inputs.price.value) < 0){
					alert('Price must be >= 0');
					return false;
				}
				return true;
			}

			// events
			saveBtn.addEventListener('click', () => {
				if(!validate()) return;
				const id = inputs.id.value || uid('p');
				const payload = {
					id,
					name: inputs.name.value.trim(),
					sku: inputs.sku.value.trim(),
					price: inputs.price.value ? Number(inputs.price.value) : 0,
					qty: inputs.qty.value ? Number(inputs.qty.value) : 0,
					category: inputs.category.value,
					status: inputs.status.value,
					notes: inputs.notes.value.trim()
				};
				const idx = products.findIndex(x=>x.id===id);
				if(idx >= 0){
					products[idx] = payload;
				} else {
					products.unshift(payload);
				}
				resetForm();
				renderList(searchInput.value);
			});

			cancelBtn.addEventListener('click', resetForm);
			newBtn.addEventListener('click', ()=>{ resetForm(); inputs.name.focus(); });

			// table delegation
			document.getElementById('products-table').addEventListener('click', (e) => {
				const btn = e.target.closest('button');
				if(!btn) return;
				const action = btn.getAttribute('data-action');
				const id = btn.getAttribute('data-id');
				if(action === 'edit') loadForEdit(id);
				if(action === 'delete'){
					if(confirm('Delete this product? This cannot be undone.')) {
						products = products.filter(p=>p.id!==id);
						renderList(searchInput.value);
					}
				}
			});

			searchInput.addEventListener('input', () => renderList(searchInput.value));
			clearSearch.addEventListener('click', () => { searchInput.value=''; renderList(''); });

			// initial render
			renderList();

			// optional: expose data in window for debugging
			window.__pharm_products = {
				getAll: ()=>products,
				reset: ()=>{ products = []; renderList(); }
			};
		})();
	</script>
</body>
</html>
