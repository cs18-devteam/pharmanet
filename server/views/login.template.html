<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PharmaNet Login</title>
  <link rel="stylesheet" href="/css/style.css">

  <style>
        .success{
            animation: animateFade 2s ease forwards;
        }

        .congrats{
            position: fixed;
            top: 100%;
            width: 100%;
            height: 100%;
            left: 0;
            opacity: 0;
            z-index: -10;
            transition: all 2s ease;
            color: #888;
            display: flex;
            align-items: center;
            justify-content: center;

        }

        .congrats > span{
            color: transparent;
            background-image: linear-gradient(var(--color-green-01) , var(--color-green-02));
            background-clip: text;
        }

        .success .congrats {
            top: 0;
            z-index: 10;
            opacity: 1;
        }

        @keyframes animateFade{
            100%{
                opacity: 0; 
                transform: translateY(-100px); 
            }
        }

    </style>


</head>
<body class="login">
  <div class="login-container">
      <div class="left-panel">
        <div class="image-wrapper">
          <img src="/logo/logo-default.png" alt="PharmaNet Logo">
          <img src="/images/login Image.png" alt="Medicine Illustration">
          <div class="quote">“ Take Control of Your Medication Journey ”</div>
        </div>
      </div>

      <div class="right-panel">
        <div id = "toggle-placeholder"> </div>
        <div class="logo">
          <img src="/images/Rectangle.svg" alt="PharmaNet Logo">
        </div>
        <h1>Welcome Back To<br/>Pharmanet</h1>

        <form id="loginForm" method="post" action="/login">
          <label>Email</label>
          <input type="email" name="email" placeholder="Example@Gmail.Com" required>
          <label>Password</label>
          <input type="password" name="password" placeholder="**********" required>
          <button type="submit">Log In</button>
        </form>

        <div class="links">
          <a href="#">Forgot password ?</a>
          <p>Don't You Have An Account ?
            <a href="/signup" class="signup-btn">Sign Up</a>
          </p>
        </div>

        <div class="footer">
          <span>Help</span>
          <span>Support</span>
          <span>Contacts</span>
          <a href="/system/login">login as admin</a>
        </div>
      </div>
    </div>

      <div class="congrats">
        Welcome to <span>Pharmanet</span>
    </div>


    <script>
        const form = document.getElementById('loginForm');
        form.addEventListener('submit' ,async (e)=>{
            try{

                
                e.preventDefault(e);
                
                const data = {};
                const formData = new FormData(form);
                for(const [key , value] of formData.entries()){
                    data[key] = value;
                }
                
                const respond = await fetch("/login" , {
                    method:"POST",
                    headers:{
                        "Content-Type" : "application/json",
                    },
                    body : JSON.stringify(data),
                });
                
                const result = await respond.json();
                console.log(result);

                document.body.classList.add('success');
                setTimeout(()=>{
                    console.log(result.data.id);
                    window.location.href = `http://localhost:3000/{url}`;
                } , 3000)


                
            }catch(error){
                alert(error.message);
                console.log(error);
            }
            


            
        })


    </script>

</body>
</html>
