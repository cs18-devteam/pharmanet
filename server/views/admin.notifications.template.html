
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Notification Management</title>
  <style>
    body {
      font-family: "Poppins", sans-serif;
      background: #fefcf3;
      color: #333;
      margin: 0;
      padding: 0;
    }

    header {
      background: linear-gradient(90deg, #4caf50, #ffb300, #ff7043);
      padding: 15px;
      color: #fff;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .container {
      max-width: 900px;
      margin: 30px auto;
      background: white;
      border-radius: 10px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
      padding: 25px;
    }

    .form-section {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .form-section input, 
    .form-section textarea {
      width: 100%;
      padding: 8px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 0.95rem;
    }

    .form-section button {
      background: linear-gradient(90deg, #4caf50, #ffb300);
      border: none;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
      margin-top: 5px;
    }

    .form-section button:hover {
      opacity: 0.8;
    }

    .search-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
    }

    .search-bar input {
      flex: 1;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 0.95rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th, td {
      text-align: left;
      padding: 12px;
      border-bottom: 1px solid #ddd;
    }

    th {
      background-color: #ffb300;
      color: white;
    }

    tr:hover {
      background-color: #f6f6f6;
    }

    .actions button {
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      margin-right: 5px;
      color: white;
      transition: 0.3s;
    }

    .edit-btn {
      background-color: #4caf50;
    }

    .delete-btn {
      background-color: #ff7043;
    }

    .edit-btn:hover, .delete-btn:hover {
      opacity: 0.8;
    }

    .empty {
      text-align: center;
      color: #999;
      padding: 20px;
    }
  </style>
</head>
<body>

  <header>Admin Notification Management</header>

  <div class="container">
    <div class="form-section">
      <input type="text" id="notifTitle" placeholder="Notification Title" />
      <textarea id="notifMessage" rows="2" placeholder="Notification Message"></textarea>
      <button onclick="addNotification()">Add Notification</button>
    </div>

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search notifications..." onkeyup="searchNotifications()">
    </div>

    <table id="notifTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Title</th>
          <th>Message</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="notifBody">
        <tr class="empty"><td colspan="4">No notifications available.</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    let notifications = [];
    let editingIndex = -1;

    function renderTable() {
      const tbody = document.getElementById('notifBody');
      tbody.innerHTML = '';

      if (notifications.length === 0) {
        tbody.innerHTML = '<tr class="empty"><td colspan="4">No notifications available.</td></tr>';
        return;
      }

      notifications.forEach((notif, index) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${index + 1}</td>
          <td>${notif.title}</td>
          <td>${notif.message}</td>
          <td class="actions">
            <button class="edit-btn" onclick="editNotification(${index})">Edit</button>
            <button class="delete-btn" onclick="deleteNotification(${index})">Delete</button>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    function addNotification() {
      const title = document.getElementById('notifTitle').value.trim();
      const message = document.getElementById('notifMessage').value.trim();

      if (!title || !message) {
        alert('Please enter both title and message.');
        return;
      }

      if (editingIndex >= 0) {
        notifications[editingIndex] = { title, message };
        editingIndex = -1;
      } else {
        notifications.push({ title, message });
      }

      document.getElementById('notifTitle').value = '';
      document.getElementById('notifMessage').value = '';
      renderTable();
    }

    function editNotification(index) {
      const notif = notifications[index];
      document.getElementById('notifTitle').value = notif.title;
      document.getElementById('notifMessage').value = notif.message;
      editingIndex = index;
    }

    function deleteNotification(index) {
      if (confirm('Are you sure you want to delete this notification?')) {
        notifications.splice(index, 1);
        renderTable();
      }
    }

    function searchNotifications() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const rows = document.querySelectorAll('#notifBody tr');
      rows.forEach(row => {
        const title = row.children[1]?.textContent.toLowerCase() || '';
        const message = row.children[2]?.textContent.toLowerCase() || '';
        if (title.includes(query) || message.includes(query)) {
          row.style.display = '';
        } else {
          row.style.display = 'none';
        }
      });
    }
  </script>
</body>
</html>
