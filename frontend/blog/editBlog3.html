          <textarea id="content" rows="6">Hypertension, or high blood pressure, affects millions of people worldwide. Understanding its causes and treatment options is essential for prevention and management.

What is Hypertension?
Blood pressure is the force of blood pushing against artery walls. Hypertension occurs when this pressure is consistently too high (140/90 mmHg or higher).

Risk Factors
Several factors increase the risk of developing hypertension:

Age (risk increases with age)
Family history
Obesity
High sodium diet
Excessive alcohol consumption
Sedentary lifestyle
Chronic stress
Lifestyle Changes
Before medication, lifestyle modifications can significantly reduce blood pressure:

**Reduce Sodium**: Limit to less than 2,300mg per day.
**Exercise Regularly**: Aim for 150 minutes of moderate activity weekly.
**Maintain Healthy Weight**: Even small weight loss can help.
**Limit Alcohol**: No more than 1-2 drinks per day.
**Manage Stress**: Practice meditation, yoga, or deep breathing.
**Eat Heart-Healthy Foods**: Focus on fruits, vegetables, and whole grains.
Medications
If lifestyle changes aren't enough, several medication classes can help:

ACE inhibitors
Beta-blockers
Calcium channel blockers
Diuretics
Combination medications
Regular monitoring and working with your healthcare provider is key to managing hypertension effectively.</textarea>
