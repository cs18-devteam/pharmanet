<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Pharmanet — Order Details</title>
	<style>
		:root{
			--green:#2ecc71; --green-2:#21b76a; --yellow:#f1c40f; --orange:#e67e22;
			--bg:#fbfdf9; --card:#fff; --muted:#f4f6f7; --text:#263238; --radius:10px;
			font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial;
		}
		html,body{height:100%;margin:0;background:linear-gradient(180deg,var(--bg),#fff);color:var(--text)}
		.container{max-width:980px;margin:28px auto;padding:18px;display:flex;flex-direction:column;gap:14px}
		.header{display:flex;justify-content:space-between;align-items:center;gap:12px}
		.logo{width:48px;height:48px;border-radius:10px;background:linear-gradient(135deg,var(--green),var(--orange));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800}
		h1{margin:0;font-size:20px}
		.card{background:var(--card);border-radius:var(--radius);padding:18px;box-shadow:0 10px 28px rgba(20,30,40,0.06)}
		.meta{color:#666;font-size:14px}
		.section{display:flex;gap:18px;flex-wrap:wrap}
		.left{flex:1;min-width:280px}
		.right{width:300px;min-width:220px}
		table{width:100%;border-collapse:collapse;margin-top:8px}
		th,td{padding:10px;border-bottom:1px solid #f3f5f6;text-align:left}
		th{font-size:13px;color:#555}
		.tag{display:inline-block;padding:6px 8px;border-radius:999px;font-weight:700;color:#fff;font-size:12px}
		.tag-success{background:var(--green)}
		.tag-warn{background:var(--yellow);color:#222}
		.tag-danger{background:var(--orange)}
		.actions{display:flex;gap:8px;margin-top:12px}
		.btn{padding:9px 12px;border-radius:8px;border:0;cursor:pointer;font-weight:700}
		.btn-primary{background:linear-gradient(90deg,var(--green),var(--green-2));color:#fff}
		.btn-ghost{background:transparent;border:1px solid #eee}
		.btn-danger{background:linear-gradient(90deg,var(--orange),#d35400);color:#fff}
		.empty{padding:28px;text-align:center;color:#666}
		.toast{position:fixed;right:20px;bottom:20px;background:#111;color:#fff;padding:10px 12px;border-radius:10px;display:none;align-items:center;gap:10px;z-index:90}
		.toast.show{display:flex}
		.undo{background:transparent;border:1px solid rgba(255,255,255,0.2);color:#fff;padding:6px 8px;border-radius:8px;cursor:pointer}
		@media (max-width:760px){ .right{width:100%} .section{flex-direction:column} }
	</style>
</head>
<body>
	<div class="container">
		<header class="header">
			<div style="display:flex;gap:12px;align-items:center">
				<div class="logo">PN</div>
				<div>
					<h1>Order details</h1>
					<div class="meta" id="subtitle">View your order and status</div>
				</div>
			</div>
			<div style="display:flex;gap:8px;align-items:center">
				<button id="back" class="btn btn-ghost">Back</button>
				<button id="print" class="btn btn-ghost">Print</button>
			</div>
		</header>

		<main class="card" id="card">
			<div class="section">
				<div class="left">
					<h2 id="order-title" style="margin:0 0 6px">Order — <span id="order-id">—</span></h2>
					<div class="meta" id="order-meta">—</div>

					<div style="margin-top:14px">
						<table>
							<thead><tr><th>Item</th><th style="width:80px">Qty</th><th style="width:120px">Line</th></tr></thead>
							<tbody id="items-body"></tbody>
						</table>
					</div>

					<div style="margin-top:14px">
						<div style="font-weight:800">Customer & Shipping</div>
						<div class="meta" id="customer-name" style="margin-top:6px">—</div>
						<div class="meta" id="shipping" style="margin-top:6px">—</div>
						<div style="margin-top:10px"><strong>Notes</strong></div>
						<div class="meta" id="notes" style="white-space:pre-wrap">—</div>
					</div>
				</div>

				<div class="right">
					<div style="display:flex;justify-content:space-between;align-items:center">
						<div style="font-weight:800">Summary</div>
						<div id="status-tag"></div>
					</div>

					<div style="margin-top:10px" class="meta">
						<div>Subtotal: <strong id="subtotal">$0.00</strong></div>
						<div style="margin-top:6px">Tax: <strong id="tax">$0.00</strong></div>
						<div style="margin-top:6px">Shipping: <strong id="shipping-cost">$0.00</strong></div>
						<div style="margin-top:6px">Total: <strong id="total">$0.00</strong></div>
					</div>

					<div class="actions" role="toolbar" aria-label="Order actions">
						<button id="reorder" class="btn btn-primary">Reorder</button>
						<button id="cancel" class="btn btn-danger">Cancel</button>
					</div>
				</div>
			</div>
		</main>

		<div id="not-found" class="empty" style="display:none">Order not found.</div>
	</div>

	<div id="toast" class="toast" role="status" aria-live="polite">
		<div id="toast-text">Action</div>
		<button id="toast-undo" class="undo">Undo</button>
	</div>

<script>
(() => {
	const KEY_ORDERS = 'pharm_orders';
	const KEY_CART = 'pharm_cart';

	function getRequestedId(){
		const h = (location.hash || '');
		if(h.startsWith('#order:')) return h.split(':')[1];
		const params = new URLSearchParams(location.search);
		if(params.has('id')) return params.get('id');
		// fallback to first order
		const arr = loadOrders();
		return arr.length ? arr[0].id : null;
	}

	function loadOrders(){
		try {
			const raw = localStorage.getItem(KEY_ORDERS);
			if(raw) return JSON.parse(raw);
		} catch(e){}
		// sample fallback
		return [
			{ id:'ORD-1001', date:'2025-02-10', customer:'Alice J', address:'123 Main St, City', items:[{name:'Paracetamol 500mg',qty:2,price:2.5},{name:'Vitamin D 1000IU',qty:1,price:8}], subtotal:13.0, tax:0.0, shipping:2.5, total:15.5, payment:'Card', status:'pending', notes:'Leave at reception' },
			{ id:'ORD-1000', date:'2025-01-29', customer:'Bob K', address:'456 Elm St', items:[{name:'Vitamin D 1000IU',qty:1,price:8}], subtotal:8.0, tax:0.0, shipping:0.0, total:8.0, payment:'Card', status:'completed', notes:'' }
		];
	}

	function saveOrders(arr){ try { localStorage.setItem(KEY_ORDERS, JSON.stringify(arr)); } catch(e){} }

	function loadCart(){ try { return JSON.parse(localStorage.getItem(KEY_CART)) || []; } catch(e){ return []; } }
	function saveCart(c){ try { localStorage.setItem(KEY_CART, JSON.stringify(c)); } catch(e){} }

	// elements
	const orderIdEl = document.getElementById('order-id');
	const orderTitle = document.getElementById('order-title');
	const orderMeta = document.getElementById('order-meta');
	const itemsBody = document.getElementById('items-body');
	const customerName = document.getElementById('customer-name');
	const shippingEl = document.getElementById('shipping');
	const notesEl = document.getElementById('notes');
	const subtotalEl = document.getElementById('subtotal');
	const taxEl = document.getElementById('tax');
	const shippingCostEl = document.getElementById('shipping-cost');
	const totalEl = document.getElementById('total');
	const statusTag = document.getElementById('status-tag');
	const notFound = document.getElementById('not-found');
	const card = document.getElementById('card');

	const backBtn = document.getElementById('back');
	const printBtn = document.getElementById('print');
	const reorderBtn = document.getElementById('reorder');
	const cancelBtn = document.getElementById('cancel');

	const toast = document.getElementById('toast');
	const toastText = document.getElementById('toast-text');
	const toastUndo = document.getElementById('toast-undo');

	let orders = loadOrders();
	let current = null;
	let lastAction = null;
	let undoTimer = null;

	function findOrder(id){ return orders.find(o => o.id === id); }

	function statusHtml(s){
		if(s === 'pending') return '<span class="tag tag-warn">Pending</span>';
		if(s === 'completed') return '<span class="tag tag-success">Completed</span>';
		return '<span class="tag tag-danger">Cancelled</span>';
	}

	function renderOrder(id){
		orders = loadOrders(); // reload
		const o = findOrder(id);
		if(!o){ card.style.display='none'; notFound.style.display='block'; return; }
		current = o;
		card.style.display='block'; notFound.style.display='none';

		orderIdEl.textContent = o.id;
		orderMeta.textContent = `${o.date} • Payment: ${o.payment}`;
		customerName.textContent = `${o.customer}`;
		shippingEl.textContent = o.address || '—';
		notesEl.textContent = o.notes || '—';
		subtotalEl.textContent = '$' + ((o.subtotal||0).toFixed(2));
		taxEl.textContent = '$' + ((o.tax||0).toFixed(2));
		shippingCostEl.textContent = '$' + ((o.shipping||0).toFixed(2));
		totalEl.textContent = '$' + ((o.total||0).toFixed(2));
		statusTag.innerHTML = statusHtml(o.status);

		itemsBody.innerHTML = '';
		(o.items || []).forEach(it => {
			const tr = document.createElement('tr');
			tr.innerHTML = `<td>${escapeHtml(it.name)}</td><td style="text-align:center">${it.qty}</td><td style="text-align:right">$${((it.price||0)*it.qty).toFixed(2)}</td>`;
			itemsBody.appendChild(tr);
		});

		// toggle cancel button for non-pending orders
		cancelBtn.disabled = o.status !== 'pending';
		// update URL hash for deep-linking
		if(!location.hash.startsWith('#order:')) history.replaceState(null,'', location.pathname + location.search + '#order:' + o.id);
	}

	function escapeHtml(s=''){ return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

	// actions
	function showToast(text, allowUndo=false){
		toastText.textContent = text;
		toast.classList.add('show');
		toastUndo.style.display = allowUndo ? 'inline-block' : 'none';
		if(undoTimer) clearTimeout(undoTimer);
		undoTimer = setTimeout(()=> { toast.classList.remove('show'); lastAction = null; undoTimer = null; }, 6000);
	}

	function changeStatus(newStatus, label){
		if(!current) return;
		const idx = orders.findIndex(o => o.id === current.id);
		if(idx === -1) return;
		const prev = JSON.parse(JSON.stringify(orders[idx]));
		orders[idx].status = newStatus;
		saveOrders(orders);
		renderOrder(current.id);
		lastAction = { type:'status', id: current.id, prev };
		showToast(`${label} applied`, true);
	}

	// reorder: add items to cart and navigate to cart
	function reorder(){
		if(!current) return;
		let cart = loadCart();
		(current.items || []).forEach(it => {
			const exists = cart.find(c => c.name === it.name);
			if(exists) exists.qty = (exists.qty || 0) + it.qty;
			else cart.push({ name: it.name, sku: '', price: it.price, qty: it.qty });
		});
		saveCart(cart);
		showToast('Items added to cart', false);
		// optional: navigate to cart page
		setTimeout(()=> { location.href = '/customer.orders.template.html'; }, 800);
	}

	// undo from toast
	toastUndo.addEventListener('click', () => {
		if(!lastAction) return;
		if(lastAction.type === 'status'){
			const idx = orders.findIndex(o => o.id === lastAction.id);
			if(idx !== -1){
				orders[idx] = lastAction.prev;
				saveOrders(orders);
				renderOrder(lastAction.id);
				showToast('Action undone', false);
			}
		}
		lastAction = null;
		toast.classList.remove('show');
	});

	// UI wiring
	backBtn.addEventListener('click', ()=> {
		if(document.referrer) history.back();
		else location.href = '/customer.orders.template.html';
	});
	printBtn.addEventListener('click', ()=> window.print());
	reorderBtn.addEventListener('click', () => reorder());
	cancelBtn.addEventListener('click', () => {
		if(!current) return;
		if(!confirm('Cancel this order?')) return;
		changeStatus('cancelled','Cancelled');
	});

	// routing: listen to hash changes
	window.addEventListener('hashchange', () => {
		const id = getRequestedId();
		renderOrder(id);
	});

	// initial
	const rid = getRequestedId();
	renderOrder(rid);

	// expose for debugging
	window.__order_view = { orders, renderOrder, changeStatus, reorder };

})();
</script>
</body>
</html>
