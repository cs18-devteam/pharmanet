<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Admin — Transaction Detail</title>
<style>
	:root{
		--green:#2ecc71; --yellow:#f1c40f; --orange:#e67e22;
		--bg:#fbfdf9; --card:#fff; --muted:#f6f7f8; --text:#222; --radius:10px;
		font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial;
	}
	html,body{height:100%;margin:0;background:linear-gradient(180deg,var(--bg),#fff);color:var(--text)}
	.container{max-width:980px;margin:24px auto;padding:18px;display:flex;flex-direction:column;gap:12px}
	.header{display:flex;justify-content:space-between;align-items:center;gap:12px}
	.logo{width:44px;height:44px;border-radius:8px;background:linear-gradient(135deg,var(--green),var(--orange));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800}
	.card{background:var(--card);border-radius:var(--radius);padding:18px;box-shadow:0 12px 36px rgba(20,30,40,0.06)}
	.meta{color:#666;font-size:14px}
	.section{display:flex;gap:18px;flex-wrap:wrap}
	.left{flex:1;min-width:280px}
	.right{width:280px}
	table{width:100%;border-collapse:collapse;margin-top:8px}
	th,td{padding:8px 10px;border-bottom:1px solid #f3f5f6;text-align:left}
	th{font-size:13px;color:#555}
	.tag{display:inline-block;padding:6px 8px;border-radius:999px;font-weight:700;color:#fff;font-size:12px}
	.tag-success{background:var(--green)}
	.tag-warn{background:var(--yellow);color:#222}
	.tag-danger{background:var(--orange)}
	.actions{display:flex;gap:8px}
	.btn{padding:8px 10px;border-radius:8px;border:0;cursor:pointer;font-weight:700}
	.btn-primary{background:linear-gradient(90deg,var(--green),#21b76a);color:#fff}
	.btn-ghost{background:transparent;border:1px solid #eee}
	.btn-danger{background:linear-gradient(90deg,var(--orange),#d35400);color:#fff}
	.empty{padding:28px;text-align:center;color:#666}
	.toast{position:fixed;right:20px;bottom:20px;background:#111;color:#fff;padding:10px 12px;border-radius:10px;display:none;align-items:center;gap:10px;z-index:90}
	.toast.show{display:flex}
	.undo{background:transparent;border:1px solid rgba(255,255,255,0.2);color:#fff;padding:6px 8px;border-radius:8px;cursor:pointer}
	@media (max-width:760px){ .right{width:100%} .section{flex-direction:column} }
</style>
</head>
<body>
	<div class="container">
		<div class="header">
			<div style="display:flex;gap:12px;align-items:center">
				<div class="logo">ADM</div>
				<div>
					<div style="font-weight:800">Transaction detail</div>
					<div class="meta" id="meta-sub">Admin view • view transaction details</div>
				</div>
			</div>
			<div style="display:flex;gap:8px;align-items:center">
				<button id="back" class="btn btn-ghost">Back to list</button>
				<button id="print" class="btn btn-ghost">Print</button>
				<button id="export" class="btn btn-ghost">Export</button>
			</div>
		</div>

		<main class="card" id="card">
			<div class="section">
				<div class="left">
					<h2 id="title" style="margin:0 0 6px">Loading…</h2>
					<div class="meta" id="sub">—</div>

					<div style="margin-top:12px">
						<table>
							<thead><tr><th>Txn ID</th><th>Date</th><th>Payment</th></tr></thead>
							<tbody>
								<tr><td id="txn-id">—</td><td id="txn-date">—</td><td id="txn-payment">—</td></tr>
							</tbody>
						</table>
					</div>

					<div style="margin-top:14px">
						<div style="font-weight:800;margin-bottom:8px">Items</div>
						<table id="items-table">
							<thead><tr><th>Item</th><th style="width:80px">Qty</th><th style="width:110px">Line</th></tr></thead>
							<tbody id="items-body"></tbody>
						</table>
					</div>

					<div style="margin-top:14px">
						<div style="font-weight:800;margin-bottom:6px">Customer</div>
						<div class="meta" id="customer">—</div>
						<div style="margin-top:10px"><strong>Notes</strong></div>
						<div class="meta" id="notes" style="white-space:pre-wrap">—</div>
					</div>
				</div>

				<div class="right">
					<div style="display:flex;justify-content:space-between;align-items:center">
						<div style="font-weight:800">Summary</div>
						<div id="status-tag"></div>
					</div>

					<div style="margin-top:10px" class="meta">
						<div>Subtotal: <strong id="subtotal">$0.00</strong></div>
						<div style="margin-top:6px">Tax: <strong id="tax">$0.00</strong></div>
						<div style="margin-top:6px">Total: <strong id="total">$0.00</strong></div>
					</div>

					<div style="margin-top:12px" class="actions">
						<button id="refund" class="btn btn-ghost">Refund</button>
						<button id="cancel" class="btn btn-danger">Cancel</button>
					</div>
				</div>
			</div>
		</main>

		<div id="empty" class="empty" style="display:none">Transaction not found.</div>
	</div>

	<div id="toast" class="toast" role="status" aria-live="polite">
		<div id="toast-text">Action</div>
		<button id="toast-undo" class="undo">Undo</button>
	</div>

<script>
(() => {
	const KEY = 'pharm_txns';
	const params = new URLSearchParams(location.search);
	function getRequestedId(){
		if(location.hash && location.hash.startsWith('#txn:')) return location.hash.split(':')[1];
		if(params.has('id')) return params.get('id');
		// fallback to first txn
		const txns = loadTxns(); return txns.length ? txns[0].id : null;
	}

	function loadTxns(){
		try { const raw = localStorage.getItem(KEY); if(raw) return JSON.parse(raw); } catch(e){}
		return [
			{ id:'t1', date:'2025-01-15', txn:'TXN-1001', customer:'Alice J', items:[{name:'Paracetamol 500mg',qty:2,price:2.5},{name:'Vitamin D 1000IU',qty:1,price:2.0}], subtotal:7.0,tax:0.0,total:7.0,payment:'Card',status:'completed',notes:'Pickup at counter' },
			{ id:'t2', date:'2025-02-09', txn:'TXN-1002', customer:'Bob K', items:[{name:'Amoxicillin 250mg',qty:1,price:4.75}], subtotal:4.75,tax:0.0,total:4.75,payment:'Cash',status:'completed',notes:'' }
		];
	}
	function saveTxns(arr){ try { localStorage.setItem(KEY, JSON.stringify(arr)); } catch(e){} }

	// elements
	const title = document.getElementById('title');
	const sub = document.getElementById('sub');
	const txnIdEl = document.getElementById('txn-id');
	const txnDateEl = document.getElementById('txn-date');
	const txnPaymentEl = document.getElementById('txn-payment');
	const itemsBody = document.getElementById('items-body');
	const customerEl = document.getElementById('customer');
	const notesEl = document.getElementById('notes');
	const subtotalEl = document.getElementById('subtotal');
	const taxEl = document.getElementById('tax');
	const totalEl = document.getElementById('total');
	const statusTag = document.getElementById('status-tag');
	const empty = document.getElementById('empty');

	const backBtn = document.getElementById('back');
	const printBtn = document.getElementById('print');
	const exportBtn = document.getElementById('export');
	const refundBtn = document.getElementById('refund');
	const cancelBtn = document.getElementById('cancel');

	const toast = document.getElementById('toast');
	const toastText = document.getElementById('toast-text');
	const toastUndo = document.getElementById('toast-undo');

	let transactions = loadTxns();
	let current = null;
	let lastAction = null;
	let undoTimer = null;

	function findTxn(id){ return transactions.find(t=>t.id === id || t.txn === id); }

	function renderTxn(id){
		const t = findTxn(id);
		if(!t){ document.querySelector('main.card').style.display='none'; empty.style.display='block'; return; }
		current = t;
		document.querySelector('main.card').style.display='block'; empty.style.display='none';
		title.textContent = t.txn;
		sub.textContent = `${t.date} • ${t.customer}`;
		txnIdEl.textContent = t.txn;
		txnDateEl.textContent = t.date;
		txnPaymentEl.textContent = t.payment;
		customerEl.textContent = t.customer;
		notesEl.textContent = t.notes || '—';
		subtotalEl.textContent = '$' + (t.subtotal||0).toFixed(2);
		taxEl.textContent = '$' + (t.tax||0).toFixed(2);
		totalEl.textContent = '$' + (t.total||0).toFixed(2);
		statusTag.innerHTML = statusHtml(t.status);
		// items
		itemsBody.innerHTML = '';
		(t.items || []).forEach(it => {
			const tr = document.createElement('tr');
			tr.innerHTML = `<td>${escapeHtml(it.name)}</td><td style="text-align:center">${it.qty}</td><td style="text-align:right">$${((it.price||0)*it.qty).toFixed(2)}</td>`;
			itemsBody.appendChild(tr);
		});
		// update URL with hash
		if(!location.hash.startsWith('#txn:')) history.replaceState(null,'', location.pathname + location.search + '#txn:' + t.id);
	}

	function statusHtml(s){
		if(s === 'completed') return '<span class="tag tag-success">Completed</span>';
		if(s === 'pending') return '<span class="tag tag-warn">Pending</span>';
		return '<span class="tag tag-danger">Refunded</span>';
	}

	function escapeHtml(s=''){ return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

	// actions
	function changeStatus(newStatus, label){
		if(!current) return;
		const idx = transactions.findIndex(x=>x.id === current.id);
		if(idx === -1) return;
		const prev = JSON.parse(JSON.stringify(transactions[idx]));
		transactions[idx].status = newStatus;
		saveTxns(transactions);
		renderTxn(current.id);
		lastAction = { type:'status', id: current.id, prev };
		showToast(`${label} applied to ${prev.txn}`, true);
		undoTimer = setTimeout(()=> { lastAction = null; hideToast(); }, 6000);
	}

	function showToast(text, allowUndo=false){
		toastText.textContent = text;
		toast.classList.add('show');
		toastUndo.style.display = allowUndo ? 'inline-block' : 'none';
		if(undoTimer) clearTimeout(undoTimer);
	}

	function hideToast(){
		toast.classList.remove('show');
		if(undoTimer){ clearTimeout(undoTimer); undoTimer = null; }
	}

	toastUndo.addEventListener('click', () => {
		if(!lastAction) return;
		if(lastAction.type === 'status'){
			const idx = transactions.findIndex(x=>x.id === lastAction.id);
			if(idx !== -1){
				transactions[idx] = lastAction.prev;
				saveTxns(transactions);
				renderTxn(lastAction.id);
				showToast(`Action undone for ${lastAction.prev.txn}`, false);
			}
		}
		lastAction = null;
		hideToast();
	});

	// UI wiring
	backBtn.addEventListener('click', ()=> {
		if(document.referrer) history.back();
		else location.href = '/admin.transactions.transaction.template.html';
	});
	printBtn.addEventListener('click', ()=> window.print());
	exportBtn.addEventListener('click', () => {
		if(!current) return;
		const json = JSON.stringify(current, null, 2);
		const blob = new Blob([json], {type:'application/json'});
		const url = URL.createObjectURL(blob);
		const a = document.createElement('a'); a.href = url; a.download = `${current.txn}.json`; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
	});

	refundBtn.addEventListener('click', ()=> {
		if(!current) return;
		if(confirm('Mark this transaction as refunded?')) changeStatus('refunded','Refund');
	});
	cancelBtn.addEventListener('click', ()=> {
		if(!current) return;
		if(confirm('Cancel this transaction?')) changeStatus('cancelled','Cancel');
	});

	// hash/query routing
	window.addEventListener('hashchange', ()=> {
		const id = getRequestedId();
		renderTxn(id);
	});

	// keyboard escape to clear hash
	document.addEventListener('keydown', (e) => { if(e.key === 'Escape'){ if(location.hash) history.replaceState(null,'', location.pathname + location.search); } });

	// initial load
	const rid = getRequestedId();
	renderTxn(rid);

	// expose simple API
	window.__admin_txn_view = { transactions, renderTxn, changeStatus };

})();
</script>
</body>
</html>
