<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href = "/css/style.css">
</head>
<body class="signup">
    <header>

        <nav>
        <div class="logo">
            <img class="logopic" src="/public/logo/logo.svg" alt="logo">
            <p class="logoname">PharmaNet</p>
        </div>


        <div id="toggle-placeholder"></div>
        

        </nav>


    <div class = "container">
    <div class = "signupImage">
        <img src="/public/signup/signup.jpg" alt="signup image">
        <div class="signupText">"Take Control of Your Medication Journey"</div>
    </div>
    <div class = "signupForm">
    <form id="form" autocomplete="off" action="/signup" method="post">
     
    <h1 class="signupTitle">Get Start Now</h1>
    <p class="signupMoto" >Your Digital Journey To Seamless Prescriptions, Smarter Inventory, And Happier Patients Begins Here.</p>
    <div class="nameFields">
    
    <div>
    <label for="fName">First Name</label><br>
    <input type="text" id="fName" name="firstname" placeholder="Chathura"/><br>
    </div>

    <div>
    <label for="lName">Last Name</label><br>
    <input type="text" id="lName" name="lastname" placeholder="Priyashan"/><br>
    </div>     

    </div>
   
    <label for="email">Email</label><br>
    <input type="text" id="email" name="email" placeholder="Example@Gmail.com"/><br>
    <span id="feedbackEmail"></span><br>
    
    <label for="birthDay">BirthDay</label><br>
    <input type="text" id="birthDay" name="Input" placeholder="2003/07/11"/><br>
    <span id="feedbackBirthDay"></span><br>
    
    <label for="password">Password</label><br>
    <input type="password" id="password" name="password" placeholder="********"/><br>

    <label for="confirmPassword">Confirm Password</label><br>
    <input type="password" id="confirmPassword" name="confirmpassword" placeholder="********"/><br>
    
    <button type="submit" id="submitButton">Create Account</button>
    <a type="submit" id="forgetPassword">Do you need any help ?</a><br>
    
    <div style="text-align: center;">
    <p class="haveAcc" style="display: inline-block; margin-right: 10px;">I Have An Account</p>
    <a href="/login.html"  class="logInButton" style="display: inline-block;">Log In</a>
    </div>


  </form>
  
    </div>
    </div>
    
        
      
    </header>

  <!-- <script src="signup.js"></script>   -->
    
</body>
</html>
