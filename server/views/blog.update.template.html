<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Pharmanet — Edit Blog</title>
	<style>
		:root{--green:#27ae60;--yellow:#f1c40f;--orange:#e67e22;--card:#fff;--text:#222;--radius:10px;font-family:Inter,system-ui,Arial}
		html,body{margin:0;background:linear-gradient(180deg,#fbfdf9,#fff);color:var(--text)} 
		.container{max-width:1000px;margin:28px auto;padding:18px;display:grid;grid-template-columns:1fr 360px;gap:18px}
		.header{grid-column:1/-1;display:flex;justify-content:space-between;align-items:center;}
		.card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:0 8px 28px rgba(20,30,40,0.06)}
		label{display:block;font-weight:700;margin:8px 0 6px}
		input[type="text"],select,textarea{width:100%;padding:10px;border-radius:8px;border:1px solid #eee;font-size:14px}
		textarea{min-height:220px;resize:vertical}
		.controls{display:flex;gap:8px;margin-top:12px}
		.btn{padding:9px 12px;border-radius:8px;border:0;cursor:pointer;font-weight:700}
		.btn-primary{background:linear-gradient(90deg,var(--green),#21b76a);color:#fff}
		.btn-ghost{background:transparent;border:1px solid #eee}
		.small{font-size:13px;color:#666}
		.preview{border:1px dashed #eee;padding:12px;border-radius:8px;background:#fafafa}
		.image-preview{width:100%;height:180px;object-fit:cover;border-radius:8px;border:1px solid #eee}
		.meta{font-size:13px;color:#666;margin-top:6px}
		@media(max-width:900px){ .container{grid-template-columns:1fr;padding:12px} .image-preview{height:160px} }
	</style>
</head>
<body>
	<div class="container">
		<header class="header">
			<div>
				<div style="font-weight:800">Edit blog post</div>
				<div class="small">Create or update an article</div>
			</div>
			<div style="display:flex;gap:8px;align-items:center">
				<button id="back" class="btn btn-ghost">Back</button>
				<button id="save" class="btn btn-primary">Save</button>
			</div>
		</header>

		<!-- main form -->
		<section class="card" aria-labelledby="form-title">
			<h3 id="form-title" style="margin:0 0 6px">Post</h3>
			<form id="post-form" onsubmit="return false;">
				<input type="hidden" id="post-id" />
				<label>Title</label>
				<input id="title" type="text" placeholder="Article title" required />

				<label>Category</label>
				<select id="category">
					<option value="">— Select —</option>
					<option>Health Tips</option>
					<option>Medicines</option>
					<option>Guides</option>
					<option>Wellness</option>
				</select>

				<label>Tags (comma separated)</label>
				<input id="tags" placeholder="e.g. fever,children" />

				<label>Excerpt</label>
				<textarea id="excerpt" placeholder="Short summary"></textarea>

				<label>Body</label>
				<textarea id="body" placeholder="Write the article content here..."></textarea>

				<div style="display:flex;gap:8px;align-items:center;margin-top:10px">
					<button id="toggle-preview" class="btn btn-ghost" type="button">Toggle preview</button>
					<div class="meta" style="margin-left:8px">Preview supports basic formatting (line breaks, **bold**, *italic*)</div>
				</div>
				<div id="body-preview" class="preview" style="display:none;margin-top:8px"></div>
			</form>
		</section>

		<!-- sidebar -->
		<aside class="card">
			<h4 style="margin:0 0 8px">Settings</h4>

			<label>Status</label>
			<select id="status">
				<option value="draft">Draft</option>
				<option value="published">Published</option>
			</select>

			<label style="margin-top:10px">Featured image</label>
			<input id="image-input" type="file" accept="image/*" />
			<img id="image-preview" class="image-preview" src="" alt="preview" style="display:none;margin-top:8px" />

			<div class="meta" style="margin-top:12px">Publish date will be set automatically when publishing.</div>

			<div class="controls" style="margin-top:14px">
				<button id="publish" class="btn btn-primary">Publish</button>
				<button id="delete" class="btn btn-ghost">Delete</button>
			</div>
		</aside>
	</div>

	<script>
		(() => {
			const KEY = 'pharm_blog_posts';
			const form = document.getElementById('post-form');
			const inputs = {
				id: document.getElementById('post-id'),
				title: document.getElementById('title'),
				category: document.getElementById('category'),
				tags: document.getElementById('tags'),
				excerpt: document.getElementById('excerpt'),
				body: document.getElementById('body'),
				status: document.getElementById('status'),
				imageInput: document.getElementById('image-input'),
				imagePreview: document.getElementById('image-preview')
			};
			const saveBtn = document.getElementById('save');
			const backBtn = document.getElementById('back');
			const publishBtn = document.getElementById('publish');
			const deleteBtn = document.getElementById('delete');
			const togglePreviewBtn = document.getElementById('toggle-preview');
			const bodyPreview = document.getElementById('body-preview');

			let posts = loadPosts();
			let current = null;

			function uid(prefix='b'){ return prefix + Math.random().toString(36).slice(2,9); }

			function loadPosts(){
				try { const raw = localStorage.getItem(KEY); if(raw) return JSON.parse(raw); } catch(e){}
				return [];
			}
			function savePosts(){ try { localStorage.setItem(KEY, JSON.stringify(posts)); } catch(e){} }

			function getRequestedId(){
				const h = location.hash || '';
				if(h.startsWith('#post:')) return h.split(':')[1];
				const params = new URLSearchParams(location.search);
				if(params.has('id')) return params.get('id');
				return null;
			}

			function find(id){ return posts.find(p=>p.id===id); }

			function populate(id){
				if(!id) return;
				const p = find(id);
				if(!p) return;
				current = p;
				inputs.id.value = p.id;
				inputs.title.value = p.title || '';
				inputs.category.value = p.category || '';
				inputs.tags.value = (p.tags||[]).join(',');
				inputs.excerpt.value = p.excerpt || '';
				inputs.body.value = p.body || '';
				inputs.status.value = p.status || 'draft';
				if(p.image) { inputs.imagePreview.src = p.image; inputs.imagePreview.style.display = 'block'; }
				else { inputs.imagePreview.style.display = 'none'; }
			}

			function renderPreview(){
				const raw = inputs.body.value || '';
				let html = escapeHtml(raw)
					.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
					.replace(/\*(.*?)\*/g,'<em>$1</em>')
					.replace(/\n/g,'<br>');
				bodyPreview.innerHTML = html;
			}

			function escapeHtml(s=''){ return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

			// image input
			inputs.imageInput.addEventListener('change', (e) => {
				const f = e.target.files && e.target.files[0];
				if(!f) return;
				const reader = new FileReader();
				reader.onload = () => {
					inputs.imagePreview.src = reader.result;
					inputs.imagePreview.style.display = 'block';
				};
				reader.readAsDataURL(f);
			});

			// save/create
			saveBtn.addEventListener('click', () => {
				if(!inputs.title.value.trim()){ alert('Title required'); inputs.title.focus(); return; }
				const pid = inputs.id.value || uid();
				const post = {
					id: pid,
					title: inputs.title.value.trim(),
					category: inputs.category.value,
					tags: inputs.tags.value.split(',').map(s=>s.trim()).filter(Boolean),
					excerpt: inputs.excerpt.value.trim(),
					body: inputs.body.value,
					status: inputs.status.value,
					image: inputs.imagePreview.src || '',
					updated: new Date().toISOString()
				};
				const idx = posts.findIndex(x=>x.id===pid);
				if(idx >= 0) posts[idx] = post; else posts.unshift(post);
				savePosts();
				alert('Saved');
				location.href = '/customer.blogs.template.html';
			});

			// publish
			publishBtn.addEventListener('click', () => {
				if(!inputs.title.value.trim()){ alert('Title required'); inputs.title.focus(); return; }
				inputs.status.value = 'published';
				const pid = inputs.id.value || uid();
				const post = {
					id: pid,
					title: inputs.title.value.trim(),
					category: inputs.category.value,
					tags: inputs.tags.value.split(',').map(s=>s.trim()).filter(Boolean),
					excerpt: inputs.excerpt.value.trim(),
					body: inputs.body.value,
					status: 'published',
					image: inputs.imagePreview.src || '',
					published: new Date().toISOString(),
					updated: new Date().toISOString()
				};
				const idx = posts.findIndex(x=>x.id===pid);
				if(idx >= 0) posts[idx] = post; else posts.unshift(post);
				savePosts();
				alert('Published');
				location.href = '/customer.blogs.template.html';
			});

			// delete
			deleteBtn.addEventListener('click', () => {
				const id = inputs.id.value;
				if(!id) { alert('Nothing to delete'); return; }
				if(!confirm('Delete this post?')) return;
				posts = posts.filter(p=>p.id!==id);
				savePosts();
				alert('Deleted');
				location.href = '/customer.blogs.template.html';
			});

			// back
			backBtn.addEventListener('click', ()=> {
				if(document.referrer) history.back();
				else location.href = '/customer.blogs.template.html';
			});

			// preview toggle
			togglePreviewBtn.addEventListener('click', () => {
				if(bodyPreview.style.display === 'none'){ renderPreview(); bodyPreview.style.display = 'block'; togglePreviewBtn.textContent = 'Hide preview'; }
				else { bodyPreview.style.display = 'none'; togglePreviewBtn.textContent = 'Toggle preview'; }
			});
			// live preview update while visible
			inputs.body.addEventListener('input', ()=> { if(bodyPreview.style.display !== 'none') renderPreview(); });

			// hash/query routing
			window.addEventListener('hashchange', ()=> {
				const id = getRequestedId();
				populate(id);
			});

			function getRequestedId(){ const h = location.hash||''; if(h.startsWith('#post:')) return h.split(':')[1]; const p = new URLSearchParams(location.search); return p.get('id'); }

			// initial populate
			const rid = getRequestedId();
			if(rid) populate(rid);

			// expose minimal API for debugging
			window.__blog_edit = { posts, savePosts, populate };

		})();
	</script>
</body>
</html>
