<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        *{
            font-size: 18px;
            color: #666;
            text-decoration: none;
            font-family: sans-serif;
            text-transform: capitalize;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        [data-view='product'] .product{
            background-color: black;
            color: #fff;
        }
        [data-view='staff'] .staff{
            background-color: black;
            color: #fff;
        }
        [data-view='blog'] .blog{
            background-color: black;
            color: #fff;
        }
        [data-view='medicine'] .medicine{
            background-color: black;
            color: #fff;
        }
        
        .container{
            width: 800px;
            margin: 0 auto;
            padding-top: 30px;
        }

        h1, h4{
            /* color : black; */
            color:transparent;
            background-image: linear-gradient( to  right ,rgb(5, 175, 90) , rgb(0, 100, 50));
            background-clip: text;
        }

        h4{
            font-weight: 400;
            color:rgb(5, 175, 90);
        }

        h1{
            font-size: 36px;
        }

        .top{
            width: 800px;
            height: 100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0 auto;
        }

        .top a {
            padding: 10px 20px;
            border: 1px solid #666;
            border-radius: 30px;
        }

        .action-bar{
            width: 600px;
            display: flex;
            justify-content: space-between;
            align-content: center;
            margin: 0 auto;
        }

        .create{
            background-color: rgb(50, 158, 0);
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            height: fit-content;
        }

        .btn{
            padding: 10px 20px;
            border: 1px solid green;
            color: green;
            border-radius: 10px;
            margin: 5px;
        }

        .items{
            padding-top: 50px ;
        }

        .item{
            display: flex;
            width: 600px;
            justify-content: space-between;
            margin: 1px auto;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.25);
            padding: 20px 0;

        }
        .details .name{
            font-size: 14px;
            opacity: .5;
        }
        .details .value{
            font-size: 24px;
            opacity: 1;
            color: black;
            font-weight: 300;
        }

        .group{
            margin: 10px;


        }

        .group input{
            width: 100%;
        }

        form{
            width: 600px;
            margin: 10px auto;
        }

        form label{
            color: black;
        }

        form input{
            height: 40px;
            border: 1px solid rgba(0, 0, 0, 0.2);
            border-radius: 5px;
            margin: 10px 0;
        }

        select {
            width: 100%;
            height: 40px;
            border: 1px solid rgba(0, 0, 0, 0.2);
            border-radius: 5px;
            margin: 10px 0;
            padding: 0 10px;
            background: white;
        }
        
        .action-btns {
            display: flex;
            gap: 10px;
        }
        
        .action-btns .btn {
            text-decoration: none;
            display: inline-block;
            min-width: 120px;
            text-align: center;
        }

    </style>
</head>
<body data-view="products">

    <div class="container">
        

        
        <div class="top">
            <a href="/admin/products" class="product">products</a>
            <a href="/admin/medicines" class="medicine">medicines</a>
            <a href="/admin/staff" class="staff">staff</a>
            <a href="/admin/blogs" class="blogs">blogs</a>
        </div>
        
  

        <div class="action-bar">
            <div>
                <h1>Create New Medicine</h1>
            </div>
        </div>

        <form action="/admin/products/create" method="POST" id="form">
            <div class="group">
                <label for="geneticName">Generic Name</label><br>
                <input type="text" id="geneticName" name="geneticName" required>
            </div>

            <div class="group">
                <label for="serialNumber">Serial Number</label><br>
                <input type="text" id="serialNumber" name="serialNumber" required>
            </div>

            <div class="group">
                <label for="registrationNo">Registration Number</label><br>
                <input type="text" id="registrationNo" name="registrationNo" required>
            </div>

            <div class="group">
                <label for="agentCode">Agent Code</label><br>
                <input type="text" id="agentCode" name="agentCode">
            </div>

            <div class="group">
                <label for="category">Category</label><br>
                <select name="category" id="category" required>
                    <option value="">Select Category</option>
                    <option value="Antibiotics">Antibiotics</option>
                    <option value="Analgesics">Analgesics</option>
                    <option value="Antivirals">Antivirals</option>
                    <option value="Antifungals">Antifungals</option>
                    <option value="Cardiovascular">Cardiovascular</option>
                    <option value="Respiratory">Respiratory</option>
                    <option value="Gastrointestinal">Gastrointestinal</option>
                    <option value="Vaccines">Vaccines</option>
                </select>
            </div>

            <div class="group">
                <label for="schedule">Schedule</label><br>
                <select name="schedule" id="schedule" required>
                    <option value="">Select Schedule</option>
                    <option value="I">Schedule I</option>
                    <option value="II">Schedule II</option>
                    <option value="III">Schedule III</option>
                    <option value="IV">Schedule IV</option>
                    <option value="V">Schedule V</option>
                    <option value="OTC">Over-the-counter (OTC)</option>
                    <option value="RX">Prescription only (Rx)</option>
                </select>
            </div>

            <div class="group">
                <label for="country">Country of Origin</label><br>
                <input type="text" id="country" name="country">
            </div>

            <div class="action-btns" style="margin-top: 20px;">
                <button type="submit" class="btn" style="background: #329e00; color: white;">Save Medicine</button>
                <a href="/admin/products" class="btn">Cancel</a>
            </div>
        </form>
    </div>

    <script>

        const data = {};
        const form = document.getElementById('form');
        let processing = false;
        form.addEventListener('submit' ,async (e)=>{
            if(processing) return;
            processing = true;
            
            e.preventDefault();
            e.target.style.opacity = 0.1;
            const formData = new FormData(form);
            for(const [key , value] of formData.entries()){
                data[key] = value;
            }

            const respond = await  fetch('/admin/products/create' , {
                method:"POST" , 
                body:JSON.stringify(data),
            })

            const results = await respond.json();

            if(results.status == "success"){
                window.location.href = `/admin/products/${results.data[0].id}`
            }else{
                window.location.href = "/admin/products"
            }






        })


    </script>
        
</body>
</html>
