<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <title> </title>
</head>
<body class="adminDashboard">
<div class="container">
    <div class="container-1">
    <div class="sideBar">
    <div class="logo">
      <img class="logopic" src="/logo/logo.svg" alt="logo">
      <div>
        <h3>System Admin</h3>
        <p>Management System</p>
      </div>
    </div>

    <ul class="menu">
      <a href="/admin/" >Dashboard</a>
      <a href="/admin/{adminId}/pharmacies">Pharmacies</a>
      <a href="/admin/{adminId}/medicines">Medicines</a>
      <a href="/admin/{adminId}/customers">Customers</a>
      <a href="/admin/{adminId}/products">Products</a>
      <a href="/admin/{adminId}/transactions">Transactions</a>
      <a href="/admin/{adminId}/notifications">Notifications</a>
      <a href="/admin/{adminId}/analytics">Analytics</a>
    </ul>

    <div class="menuItem">
        <span class="text1">Settings</span><br>
        <span class="text2">Sign Out</span>
    </div>
  </div>
  </div>

  <div class="container-2">
  <div class="main">
    <header>
      <input type="text" placeholder="Search medicines, pharmacies, users..." />
      <div class="user-section">
        <span class="bell"></span>
        <div class="admin">AD</div>
      </div>
    </header>

    <section class="dashboard">
      <!-- Medicine Management UI (black & white theme) -->
      <style>
        /* scoped black & white UI */
        .med-ui{background:#000;color:#fff;padding:18px;border-radius:8px;font-family:Inter,Arial, sans-serif}
        .med-ui h2{margin:0 0 8px;font-size:20px}
        .med-grid{display:grid;grid-template-columns:320px 1fr;gap:16px;margin-top:12px}
        .med-form{background:#0b0b0b;padding:12px;border-radius:8px;border:1px solid #222}
        .med-form label{display:block;font-size:13px;margin:8px 0 6px;color:#ddd}
        .med-form input, .med-form select, .med-form textarea{width:100%;padding:8px;border-radius:6px;background:#111;border:1px solid #222;color:#fff}
        .med-form .btn-row{display:flex;gap:8px;margin-top:10px}
        .btn{padding:8px 10px;border-radius:6px;border:0;cursor:pointer;font-weight:700}
        .btn-w{background:#fff;color:#000}
        .btn-ghost-w{background:transparent;border:1px solid #444;color:#fff}
        .med-list{background:#0b0b0b;padding:12px;border-radius:8px;border:1px solid #222;overflow:auto}
        .search-row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
        .search-row input{flex:1;padding:8px;border-radius:6px;border:1px solid #222;background:#111;color:#fff}
        table{width:100%;border-collapse:collapse;color:#fff}
        th,td{padding:8px;border-bottom:1px solid #222;text-align:left;font-size:14px}
        th{color:#bbb;font-weight:700}
        tr:hover td{background:#070707}
        .tag{display:inline-block;padding:4px 8px;border-radius:999px;font-size:12px}
        .tag-qty{background:#111;color:#fff;border:1px solid #444}
        .actions button{margin-left:6px}
        .toast{position:fixed;right:20px;bottom:20px;background:#111;color:#fff;padding:10px 12px;border-radius:8px;border:1px solid #333;display:none}
        .toast.show{display:flex}
        @media(max-width:820px){ .med-grid{grid-template-columns:1fr} }
      </style>

      <div class="med-ui">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <h2>Medicines — Management</h2>
          <div style="font-size:13px;color:#aaa">Black & White admin UI</div>
        </div>

        <div class="med-grid">
          <!-- form -->
          <div class="med-form">
            <form id="med-form" onsubmit="return false;">
              <input type="hidden" id="med-id" />
              <label for="med-name">Name</label>
              <input id="med-name" placeholder="e.g. Paracetamol 500mg" required />

              <label for="med-sku">SKU</label>
              <input id="med-sku" placeholder="e.g. PARA-500" />

              <label for="med-price">Price (USD)</label>
              <input id="med-price" type="number" min="0" step="0.01" />

              <label for="med-qty">Quantity</label>
              <input id="med-qty" type="number" min="0" />

              <label for="med-category">Category</label>
              <select id="med-category">
                <option value="">— Select —</option>
                <option>Analgesic</option><option>Antibiotic</option><option>Dermatology</option><option>Supplements</option><option>Other</option>
              </select>

              <label for="med-notes">Notes</label>
              <textarea id="med-notes"></textarea>

              <div class="btn-row">
                <button id="save-med" class="btn btn-w">Save</button>
                <button id="cancel-med" class="btn btn-ghost-w" type="button">Cancel</button>
                <button id="seed-med" class="btn btn-ghost-w" type="button">Seed</button>
              </div>
            </form>
          </div>

          <!-- list -->
          <div class="med-list">
            <div class="search-row">
              <input id="med-search" placeholder="Search by name or SKU" />
              <button id="clear-search" class="btn btn-ghost-w">Clear</button>
              <button id="new-med" class="btn btn-w">New</button>
            </div>

            <table aria-live="polite">
              <thead>
                <tr><th>Product</th><th>SKU</th><th>Price</th><th>Qty</th><th style="width:160px;text-align:center">Actions</th></tr>
              </thead>
              <tbody id="med-body"></tbody>
            </table>
            <div id="med-empty" class="small" style="padding:10px;color:#aaa;display:none">No medicines found.</div>
          </div>
        </div>
      </div>

      <div id="med-toast" class="toast" role="status" aria-live="polite"><span id="med-toast-text"></span></div>

      <script>
        (() => {
          const KEY = 'pharm_medicines';
          const form = document.getElementById('med-form');
          const inputs = {
            id: document.getElementById('med-id'),
            name: document.getElementById('med-name'),
            sku: document.getElementById('med-sku'),
            price: document.getElementById('med-price'),
            qty: document.getElementById('med-qty'),
            category: document.getElementById('med-category'),
            notes: document.getElementById('med-notes')
          };
          const saveBtn = document.getElementById('save-med');
          const cancelBtn = document.getElementById('cancel-med');
          const seedBtn = document.getElementById('seed-med');
          const newBtn = document.getElementById('new-med');
          const search = document.getElementById('med-search');
          const clearSearch = document.getElementById('clear-search');
          const tbody = document.getElementById('med-body');
          const empty = document.getElementById('med-empty');
          const toast = document.getElementById('med-toast');
          const toastText = document.getElementById('med-toast-text');

          let meds = load();
          let lastDeleted = null;
          function uid(p='m'){return p + Math.random().toString(36).slice(2,9);}

          function load(){ try { const raw = localStorage.getItem(KEY); if(raw) return JSON.parse(raw); } catch(e){} return [
            {id:'m1', name:'Paracetamol 500mg', sku:'PARA-500', price:2.5, qty:120, category:'Analgesic', notes:''},
            {id:'m2', name:'Amoxicillin 250mg', sku:'AMOX-250', price:4.75, qty:30, category:'Antibiotic', notes:''}
          ]; }

          function save(){ try { localStorage.setItem(KEY, JSON.stringify(meds)); } catch(e){} }

          function render(filter=''){
            const q = (filter||'').trim().toLowerCase();
            tbody.innerHTML = '';
            const list = meds.filter(m => {
              if(!q) return true;
              return (m.name + ' ' + (m.sku||'') + ' ' + (m.category||'')).toLowerCase().includes(q);
            });
            if(list.length === 0){ empty.style.display = 'block'; return; } else empty.style.display = 'none';
            list.forEach(m => {
              const tr = document.createElement('tr');
              tr.innerHTML = `
                <td><strong>${escape(m.name)}</strong><div style="color:#9b9b9b;font-size:12px">${escape(m.category||'')}</div></td>
                <td>${escape(m.sku||'—')}</td>
                <td>$${(m.price||0).toFixed(2)}</td>
                <td><span class="tag tag-qty">${m.qty||0}</span></td>
                <td style="text-align:center">
                  <button class="btn btn-ghost-w" data-act="edit" data-id="${m.id}">Edit</button>
                  <button class="btn btn-ghost-w" data-act="delete" data-id="${m.id}">Delete</button>
                </td>
              `;
              tbody.appendChild(tr);
            });
          }

          function escape(s=''){ return String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

          function resetForm(){ inputs.id.value=''; form.reset(); saveBtn.textContent='Save'; }

          function loadForEdit(id){
            const m = meds.find(x=>x.id===id); if(!m) return;
            inputs.id.value = m.id; inputs.name.value = m.name; inputs.sku.value = m.sku||''; inputs.price.value = m.price||''; inputs.qty.value = m.qty||''; inputs.category.value = m.category||''; inputs.notes.value = m.notes||'';
            saveBtn.textContent = 'Update';
            window.scrollTo({top:0,behavior:'smooth'});
          }

          saveBtn.addEventListener('click', () => {
            const name = inputs.name.value.trim();
            if(!name){ alert('Name required'); inputs.name.focus(); return; }
            const payload = {
              id: inputs.id.value || uid(),
              name,
              sku: inputs.sku.value.trim(),
              price: inputs.price.value ? Number(inputs.price.value) : 0,
              qty: inputs.qty.value ? Number(inputs.qty.value) : 0,
              category: inputs.category.value,
              notes: inputs.notes.value.trim()
            };
            const idx = meds.findIndex(x=>x.id===payload.id);
            if(idx>=0) meds[idx] = payload; else meds.unshift(payload);
            save(); resetForm(); render(search.value); showToast('Saved');
          });

          cancelBtn.addEventListener('click', resetForm);
          newBtn.addEventListener('click', ()=> { resetForm(); inputs.name.focus(); });

          seedBtn.addEventListener('click', ()=> { meds = load(); save(); render(); showToast('Seeded sample data'); });

          document.querySelector('.med-list').addEventListener('click', (e) => {
            const btn = e.target.closest('button');
            if(!btn) return;
            const act = btn.getAttribute('data-act');
            const id = btn.getAttribute('data-id');
            if(act === 'edit') loadForEdit(id);
            if(act === 'delete'){
              if(confirm('Delete this medicine?')) {
                const idx = meds.findIndex(x=>x.id===id);
                if(idx === -1) return;
                lastDeleted = { item: meds[idx], index: idx };
                meds.splice(idx,1); save(); render(search.value); showToast('Deleted');
              }
            }
          });

          search.addEventListener('input', ()=> render(search.value));
          clearSearch.addEventListener('click', ()=> { search.value=''; render(''); });

          // toast
          function showToast(txt, timeout=2000){
            toastText.textContent = txt; toast.classList.add('show');
            setTimeout(()=> toast.classList.remove('show'), timeout);
          }

          // initial render
          render();

          // expose for debug
          window.__admin_meds = { meds, render, save, loadForEdit };
        })();
      </script>
    </section>

  </div>
  </div>
  </div>   
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- <script src="/js/controller/admin/admin.dashboard.client.controller.js"></script> -->
</body>
</html>
